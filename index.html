                                                        </td>
                                                        <td className="p-4 text-right">
                                                            <div className="font-black text-slate-900 text-base">₹{item.price}</div>
                                                            {Number(item.purchasePrice) > 0 && <div className="text-[10px] text-slate-400 font-bold mt-0.5">COST: ₹{item.purchasePrice}</div>}
                                                        </td>
                                                        <td className="p-4 text-center">
                                                            <div className="flex justify-center gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
                                                                <button onClick={() => openInvModal(item)} className="text-slate-400 hover:text-indigo-600 hover:bg-indigo-50 p-2 rounded-lg transition-colors" title="Edit Item">
                                                                    <svg xmlns="http://www.w3.org/2000/svg" className="h-4 w-4" viewBox="0 0 20 20" fill="currentColor"><path d="M13.586 3.586a2 2 0 112.828 2.828l-.793.793-2.828-2.828.793-.793zM11.379 5.793L3 14.172V17h2.828l8.38-8.379-2.83-2.828z" /></svg>
                                                                </button>
                                                                <button onClick={() => deleteInventoryItem(item.id, item.name)} className="text-slate-400 hover:text-red-600 hover:bg-red-50 p-2 rounded-lg transition-colors" title="Delete Item">
                                                                    <svg xmlns="http://www.w3.org/2000/svg" className="h-4 w-4" viewBox="0 0 20 20" fill="currentColor"><path fillRule="evenodd" d="M9 2a1 1 0 00-.894.553L7.382 4H4a1 1 0 000 2v10a2 2 0 002 2h8a2 2 0 002-2V6a1 1 0 100-2h-3.382l-.724-1.447A1 1 0 0011 2H9zM7 8a1 1 0 012 0v6a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v6a1 1 0 102 0V8a1 1 0 00-1-1z" clipRule="evenodd" /></svg>
                                                                </button>
                                                            </div>
                                                        </td>
                                                    </tr>
                                                ))
                                            )}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}

                        {/* -------------------- TAB: EXPENSES -------------------- */}
                        {activeTab === 'expenses' && (
                            <div className="w-full max-w-5xl mx-auto bg-white p-6 md:p-8 rounded-3xl shadow-sm border border-slate-200">
                                <div className="flex justify-between items-center border-b border-slate-100 pb-5 mb-6">
                                    <div>
                                        <h2 className="text-2xl font-black text-slate-900 tracking-tight">Shop Expenses</h2>
                                        <p className="text-sm text-slate-500 font-medium mt-1">Log your daily store expenses efficiently.</p>
                                    </div>
                                    <span className="bg-slate-100 border border-slate-200 text-slate-600 font-bold px-4 py-1.5 rounded-full text-xs">{expenses.length} Records</span>
                                </div>
                                
                                <div className="bg-slate-50 p-6 rounded-2xl border border-slate-200 mb-8 flex flex-col md:flex-row gap-4 items-end">
                                    <div className="w-full md:w-40">
                                        <ModernInput label="Date" type="date" value={expDate} onChange={e=>setExpDate(e.target.value)} />
                                    </div>
                                    <div className="flex-1 w-full">
                                        <ModernInput label="Description" type="text" placeholder="e.g., Tea, Transport" value={expDesc} onChange={e=>setExpDesc(e.target.value)} />
                                    </div>
                                    <div className="w-full md:w-36">
                                        <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1.5 ml-1">Method</label>
                                        <select value={expMode} onChange={e=>setExpMode(e.target.value)} className="w-full p-3 bg-white border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none transition-all text-sm font-bold text-slate-800 shadow-sm cursor-pointer">
                                            <option value="Cash">Cash</option>
                                            <option value="Bank">Bank/UPI</option>
                                        </select>
                                    </div>
                                    <div className="w-full md:w-32">
                                        <ModernInput label="Amount (₹)" type="number" min="0" placeholder="150" value={expAmount} onChange={e=>setExpAmount(e.target.value)} />
                                    </div>
                                    <button onClick={handleAddExpense} className="w-full md:w-auto bg-slate-900 hover:bg-slate-800 text-white font-bold py-3.5 px-6 rounded-xl transition-colors flex items-center justify-center gap-2">
                                        <Icons.Plus className="w-4 h-4" /> Add
                                    </button>
                                </div>

                                <div className="overflow-x-auto max-h-[600px] border border-slate-200 rounded-2xl">
                                    <table className="w-full text-left border-collapse">
                                        <thead className="sticky top-0 bg-white shadow-sm border-b border-slate-200 text-xs uppercase tracking-wider text-slate-500 z-10">
                                            <tr>
                                                <th className="p-4 font-bold w-32">Date</th>
                                                <th className="p-4 font-bold">Description</th>
                                                <th className="p-4 font-bold text-right w-40">Amount (₹)</th>
                                                <th className="p-4 font-bold text-center w-24">Action</th>
                                            </tr>
                                        </thead>
                                        <tbody className="bg-white divide-y divide-slate-100">
                                            {expenses.length === 0 ? (
                                                <tr><td colSpan="4" className="p-8 text-center text-slate-400 font-medium">No expenses recorded yet.</td></tr>
                                            ) : (
                                                expenses.map((exp) => (
                                                    <tr key={exp.id} className="hover:bg-slate-50 transition-colors group">
                                                        <td className="p-4 font-medium text-slate-500">{exp.date.split('-').reverse().join('-')}</td>
                                                        <td className="p-4 font-bold text-slate-800">{exp.description}</td>
                                                        <td className="p-4 text-right">
                                                            <div className="font-black text-slate-900">₹ {exp.amount}</div>
                                                            <div className="text-[10px] font-bold text-slate-400 mt-0.5 uppercase tracking-wider">
                                                                {exp.mode}
                                                            </div>
                                                        </td>
                                                        <td className="p-4 text-center">
                                                            <button onClick={() => handleDeleteExpense(exp.id)} className="text-slate-400 hover:text-red-600 hover:bg-red-50 p-2 rounded-lg transition-colors opacity-0 group-hover:opacity-100" title="Delete">
                                                                <svg xmlns="http://www.w3.org/2000/svg" className="h-4 w-4" viewBox="0 0 20 20" fill="currentColor"><path fillRule="evenodd" d="M9 2a1 1 0 00-.894.553L7.382 4H4a1 1 0 000 2v10a2 2 0 002 2h8a2 2 0 002-2V6a1 1 0 100-2h-3.382l-.724-1.447A1 1 0 0011 2H9zM7 8a1 1 0 012 0v6a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v6a1 1 0 102 0V8a1 1 0 00-1-1z" clipRule="evenodd" /></svg>
                                                            </button>
                                                        </td>
                                                    </tr>
                                                ))
                                            )}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}

                        {/* -------------------- TAB: REPORTS -------------------- */}
                        {activeTab === 'reports' && (
                            <div className="w-full max-w-6xl mx-auto bg-white p-6 md:p-8 rounded-3xl shadow-sm border border-slate-200 print:border-none print:shadow-none print:p-0">
                                
                                <div className="hidden print:block text-center mb-6 border-b-2 border-slate-900 pb-4">
                                    <h1 className="text-2xl font-black tracking-widest text-slate-900 uppercase">LOOKSTYLO FASHION</h1>
                                    <h2 className="text-lg font-bold mt-1 text-slate-700">Financial Report</h2>
                                    <p className="text-xs font-bold mt-2 text-slate-500 uppercase tracking-widest">Period: {periodLabel} | Type: {reportFilter}</p>
                                </div>

                                <div className="flex flex-col xl:flex-row justify-between items-start xl:items-end gap-6 border-b border-slate-100 pb-6 mb-8 no-print">
                                    <div>
                                        <h2 className="text-2xl font-black text-slate-900 tracking-tight">Reports & Analytics</h2>
                                        <p className="text-sm text-slate-500 font-medium mt-1">Track your financial performance for {periodLabel}.</p>
                                    </div>
                                    <div className="flex flex-wrap items-center gap-3 w-full xl:w-auto">
                                        <div className="bg-slate-50 p-1.5 rounded-xl border border-slate-200 flex items-center gap-1.5 flex-wrap flex-1 xl:flex-none">
                                            <select value={reportType} onChange={e=>setReportType(e.target.value)} className="p-2.5 bg-white border border-slate-200 rounded-lg outline-none focus:ring-2 focus:ring-indigo-500/20 font-bold text-slate-800 cursor-pointer text-sm min-w-[100px]">
                                                <option value="daily">Daily</option>
                                                <option value="monthly">Monthly</option>
                                                <option value="yearly">Yearly</option>
                                            </select>
                                            
                                            {reportType === 'daily' && <input type="date" value={reportDate} onChange={e=>setReportDate(e.target.value)} className="p-2.5 bg-white border border-slate-200 rounded-lg outline-none focus:ring-2 focus:ring-indigo-500/20 font-bold text-slate-800 text-sm" />}
                                            {reportType === 'monthly' && <input type="month" value={reportMonth} onChange={e=>setReportMonth(e.target.value)} className="p-2.5 bg-white border border-slate-200 rounded-lg outline-none focus:ring-2 focus:ring-indigo-500/20 font-bold text-slate-800 text-sm" />}
                                            {reportType === 'yearly' && (
                                                <select value={reportYear} onChange={e=>setReportYear(e.target.value)} className="p-2.5 bg-white border border-slate-200 rounded-lg outline-none focus:ring-2 focus:ring-indigo-500/20 font-bold text-slate-800 cursor-pointer text-sm">
                                                    {[...Array(11)].map((_, i) => {
                                                        const y = new Date().getFullYear() - 5 + i;
                                                        return <option key={y} value={y}>{y}</option>;
                                                    })}
                                                </select>
                                            )}
                                            
                                            <div className="h-6 w-px bg-slate-300 mx-1"></div>
                                            <select value={reportFilter} onChange={e=>setReportFilter(e.target.value)} className="p-2.5 bg-white border border-slate-200 rounded-lg outline-none focus:ring-2 focus:ring-indigo-500/20 font-bold text-slate-800 cursor-pointer text-sm min-w-[120px]">
                                                <option value="All">All Invoices</option>
                                                <option value="GST">GST Only</option>
                                                <option value="Non-GST">Non-GST Only</option>
                                            </select>
                                        </div>
                                        <div className="flex gap-2 w-full xl:w-auto">
                                            <button onClick={exportCustomerData} className="flex-1 xl:flex-none bg-indigo-50 border border-indigo-200 hover:bg-indigo-100 text-indigo-700 font-bold py-2.5 px-4 rounded-xl transition-colors flex items-center justify-center gap-2 text-sm shadow-sm">
                                                <Icons.Users className="w-4 h-4" /> Period Customers
                                            </button>
                                            <button onClick={exportToCSV} className="flex-1 xl:flex-none bg-white border border-slate-200 hover:bg-slate-50 text-slate-800 font-bold py-2.5 px-4 rounded-xl transition-colors flex items-center justify-center gap-2 text-sm shadow-sm">
                                                <Icons.Download className="w-4 h-4" /> Sales CSV
                                            </button>
                                            <button onClick={() => window.print()} className="flex-1 xl:flex-none bg-slate-900 hover:bg-slate-800 text-white font-bold py-2.5 px-4 rounded-xl transition-colors flex items-center justify-center gap-2 text-sm shadow-sm">
                                                <Icons.Print className="w-4 h-4" /> Print
                                            </button>
                                        </div>
                                    </div>
                                </div>

                                <div className={`grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mb-8 print:gap-4`}>
                                    <div className="bg-slate-50 p-6 rounded-2xl border border-slate-200 flex flex-col justify-center">
                                        <span className="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-1">Total Sales</span>
                                        <span className="text-2xl font-black text-slate-900">₹ {totalReportSales.toLocaleString('en-IN', {minimumFractionDigits:2})}</span>
                                    </div>
                                    <div className="bg-emerald-50 p-6 rounded-2xl border border-emerald-100 flex flex-col justify-center">
                                        <span className="text-[10px] font-bold text-emerald-600 uppercase tracking-widest mb-1">Total Collections</span>
                                        <span className="text-2xl font-black text-emerald-800">₹ {(totalReportCash + totalReportGpay + totalReportAdvance).toLocaleString('en-IN', {minimumFractionDigits:2})}</span>
                                    </div>
                                    <div className="bg-amber-50 p-6 rounded-2xl border border-amber-100 flex flex-col justify-center">
                                        <span className="text-[10px] font-bold text-amber-600 uppercase tracking-widest mb-1">Total Pending</span>
                                        <span className="text-2xl font-black text-amber-800">₹ {totalReportBalance.toLocaleString('en-IN', {minimumFractionDigits:2})}</span>
                                    </div>
                                    <div className="bg-red-50 p-6 rounded-2xl border border-red-100 flex flex-col justify-center">
                                        <span className="text-[10px] font-bold text-red-600 uppercase tracking-widest mb-1">Total Expenses</span>
                                        <span className="text-2xl font-black text-red-800">₹ {totalReportExpenses.toLocaleString('en-IN', {minimumFractionDigits:2})}</span>
                                    </div>
                                </div>

                                <div className="border border-slate-200 rounded-2xl overflow-hidden print:border-none">
                                    <div className="bg-slate-50 px-6 py-4 border-b border-slate-200 flex justify-between items-center print:hidden">
                                        <h3 className="font-bold text-slate-800 uppercase tracking-wider text-xs">Invoice Register</h3>
                                        <span className="text-xs font-bold text-slate-600 bg-white border border-slate-200 px-3 py-1 rounded-full">{reportBills.length} Entry(s)</span>
                                    </div>
                                    <div className="overflow-x-auto max-h-[600px] print:max-h-none print:overflow-visible">
                                        <table className="w-full text-left border-collapse">
                                            <thead className="sticky top-0 bg-white shadow-sm print:shadow-none print:border-b-2 print:border-slate-800 z-10">
                                                <tr className="text-xs uppercase tracking-wider text-slate-500 print:text-slate-800">
                                                    <th className="p-4 font-bold border-b border-slate-200">Date</th>
                                                    <th className="p-4 font-bold border-b border-slate-200">Invoice ID</th>
                                                    <th className="p-4 font-bold text-center border-b border-slate-200">Type</th>
                                                    <th className="p-4 font-bold border-b border-slate-200">Customer</th>
                                                    <th className="p-4 font-bold text-right border-b border-slate-200">Total</th>
                                                    <th className="p-4 font-bold text-right border-b border-slate-200">Paid</th>
                                                    <th className="p-4 font-bold text-right border-b border-slate-200">Balance</th>
                                                    <th className="p-4 font-bold text-center border-b border-slate-200 no-print w-40">Action</th>
                                                </tr>
                                            </thead>
                                            <tbody className="bg-white divide-y divide-slate-100 print:divide-slate-200">
                                                {reportBills.length === 0 ? (
                                                    <tr><td colSpan="8" className="p-10 text-center text-slate-400 font-medium">No activity in this period.</td></tr>
                                                ) : (
                                                    reportBills.slice().reverse().map(bill => (
                                                        <tr key={bill.id} className="hover:bg-slate-50 transition-colors print:break-inside-avoid group">
                                                            <td className="p-4 text-sm font-medium text-slate-500 print:text-slate-800">{bill.date.split('-').reverse().join('-')}</td>
                                                            <td className="p-4 font-mono text-sm font-bold text-slate-900">{bill.id}</td>
                                                            <td className="p-4 text-center">
                                                                <span className={`text-[10px] font-bold px-2.5 py-1 rounded-md print:border print:border-slate-300 print:bg-transparent ${bill.type === 'GST' ? 'bg-slate-800 text-white' : 'bg-slate-100 text-slate-600'}`}>{bill.type || 'Non-GST'}</span>
                                                            </td>
                                                            <td className="p-4 text-sm font-bold text-slate-700 uppercase">{bill.customer}</td>
                                                            <td className="p-4 text-sm font-black text-right text-slate-900">₹ {bill.total}</td>
                                                            <td className="p-4 text-sm font-bold text-right text-emerald-600">₹ {(bill.cash + bill.gpay + bill.advance)}</td>
                                                            <td className="p-4 text-sm font-black text-right text-amber-600">₹ {bill.balance}</td>
                                                            <td className="p-4 text-center no-print">
                                                                <div className="flex justify-center gap-1 opacity-100 xl:opacity-0 xl:group-hover:opacity-100 transition-opacity">
                                                                    {bill.balance > 0 && (
                                                                        <button onClick={() => sendReminderWhatsApp(bill)} className="text-emerald-500 hover:text-emerald-700 hover:bg-emerald-50 p-2 rounded-lg transition-colors" title="Send WhatsApp Reminder">
                                                                            <WhatsAppIcon className="h-4 w-4" />
                                                                        </button>
                                                                    )}
                                                                    {bill.balance <= 0 && bill.total > 0 && (
                                                                        <button onClick={() => sendThankYouWhatsApp(bill)} className="text-slate-400 hover:text-slate-800 hover:bg-slate-100 p-2 rounded-lg transition-colors" title="Send Thank You WhatsApp">
                                                                            <Icons.CheckCircle className="h-4 w-4" />
                                                                        </button>
                                                                    )}
                                                                    {/* ✨ Delivery Update Button */}
                                                                    <button onClick={() => setDeliveryActionBill(bill)} className="text-blue-500 hover:text-blue-700 hover:bg-blue-50 p-2 rounded-lg transition-colors" title="Send Delivery Update">
                                                                        <Icons.Truck className="h-4 w-4" />
                                                                    </button>

                                                                    <button onClick={() => handleEditBill(bill)} className="text-slate-400 hover:text-indigo-600 hover:bg-indigo-50 p-2 rounded-lg transition-colors" title="Edit Full Bill">
                                                                        <svg xmlns="http://www.w3.org/2000/svg" className="h-4 w-4" viewBox="0 0 20 20" fill="currentColor"><path d="M13.586 3.586a2 2 0 112.828 2.828l-.793.793-2.828-2.828.793-.793zM11.379 5.793L3 14.172V17h2.828l8.38-8.379-2.83-2.828z" /></svg>
                                                                    </button>
                                                                    <button onClick={() => openPaymentModal(bill)} className="text-slate-400 hover:text-emerald-600 hover:bg-emerald-50 p-2 rounded-lg transition-colors" title="Update Payment Only">
                                                                        <Icons.Cash className="h-4 w-4" />
                                                                    </button>
                                                                    <button onClick={() => deleteBill(bill.id)} className="text-slate-400 hover:text-red-600 hover:bg-red-50 p-2 rounded-lg transition-colors" title="Delete Bill">
                                                                        <svg xmlns="http://www.w3.org/2000/svg" className="h-4 w-4" viewBox="0 0 20 20" fill="currentColor"><path fillRule="evenodd" d="M9 2a1 1 0 00-.894.553L7.382 4H4a1 1 0 000 2v10a2 2 0 002 2h8a2 2 0 002-2V6a1 1 0 100-2h-3.382l-.724-1.447A1 1 0 0011 2H9zM7 8a1 1 0 012 0v6a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v6a1 1 0 102 0V8a1 1 0 00-1-1z" clipRule="evenodd" /></svg>
                                                                    </button>
                                                                </div>
                                                            </td>
                                                        </tr>
                                                    ))
                                                )}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* -------------------- TAB: GENERATOR -------------------- */}
                        {activeTab === 'generator' && (
                            <>
                                <div className="w-full lg:w-[40%] bg-white p-6 md:p-8 rounded-3xl shadow-sm border border-slate-200 h-fit space-y-6 no-print">
                                    <h2 className="text-2xl font-black text-slate-900 border-b border-slate-100 pb-4">Label Creator</h2>
                                    <div className="space-y-5">
                                        <ModernInput label="Order ID / Tracking" type="text" value={orderId} onChange={(e) => setOrderId(e.target.value)} className="uppercase" />
                                        <ModernInput label="Customer Name (TO)" type="text" value={toName} onChange={(e) => setToName(e.target.value)} className="uppercase" />
                                        <div>
                                            <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1.5 ml-1">Delivery Address (TO)</label>
                                            <textarea rows="4" value={toAddress} onChange={(e) => setToAddress(e.target.value)} className="w-full p-4 bg-white border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none transition-all text-sm font-bold text-slate-800 shadow-sm uppercase resize-none"></textarea>
                                        </div>
                                        <ModernInput label="Phone Number(s)" type="text" value={toPhone} onChange={(e) => setToPhone(e.target.value)} className="uppercase font-mono" />
                                        
                                        <div className="pt-4 grid grid-cols-1 md:grid-cols-2 gap-4">
                                            <button onClick={handlePrint} className="w-full bg-slate-900 hover:bg-slate-800 text-white font-bold py-4 rounded-xl shadow-md transition-all flex items-center justify-center gap-2">
                                                <Icons.Print className="w-4 h-4" /> Print Label
                                            </button>
                                            <button onClick={handleSave} className="w-full bg-white border border-slate-200 hover:bg-slate-50 text-slate-800 font-bold py-4 rounded-xl shadow-sm transition-all flex items-center justify-center gap-2">
                                                <Icons.Save className="w-4 h-4" /> Save Details
                                            </button>
                                        </div>
                                    </div>
                                </div>
                                <div className="w-full lg:w-[60%] flex justify-center bg-slate-50 p-6 md:p-8 rounded-3xl border border-slate-200 print-section print:overflow-visible print:h-auto print:block print:p-0 print:bg-white print:border-none">
                                    <div className="a5-container hover:shadow-xl transition-shadow">
                                        <LabelContent orderId={orderId} toName={toName} toAddress={toAddress} toPhone={toPhone} logoUrl={logoUrl} />
                                    </div>
                                </div>
                            </>
                        )}

                        {/* -------------------- TAB: SCANNER -------------------- */}
                        {activeTab === 'scanner' && (
                            <div className="w-full max-w-5xl mx-auto flex flex-col gap-8">
                                <div className="bg-white p-8 rounded-3xl shadow-sm border border-slate-200 flex flex-col items-center">
                                    <div className="w-16 h-16 bg-slate-100 rounded-2xl flex items-center justify-center mb-6 border border-slate-200">
                                        <Icons.Camera className="w-8 h-8 text-slate-800" />
                                    </div>
                                    <h2 className="text-2xl font-black text-slate-900 mb-8 text-center">Dispatch Scanner</h2>
                                    
                                    {!scanResult && (
                                        <div className={`w-full max-w-md p-6 rounded-[2rem] border-2 ${awaitingTrackingFor ? 'bg-amber-50 border-amber-200' : 'bg-slate-50 border-slate-200'}`}>
                                            <h3 className={`text-center font-bold text-sm uppercase tracking-widest mb-6 ${awaitingTrackingFor ? 'text-amber-700' : 'text-slate-500'}`}>
                                                {awaitingTrackingFor ? `Scan Tracking For: ${awaitingTrackingFor.id}` : `Scan Order QR Code`}
                                            </h3>
                                            
                                            <div id="reader" className="w-full rounded-2xl overflow-hidden min-h-[250px] shadow-sm bg-white relative"></div>

                                            <div className="mt-8 border-t border-slate-200 pt-6">
                                                <h4 className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-3 flex items-center justify-center gap-2">
                                                    Or Manual Entry
                                                </h4>
                                                <form onSubmit={(e) => { e.preventDefault(); processScan(manualCode); setManualCode(''); }} className="flex gap-2">
                                                    <input type="text" value={manualCode} onChange={e=>setManualCode(e.target.value)} placeholder="Enter ID..." className="flex-1 p-3 bg-white border border-slate-300 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500/50 text-sm font-mono shadow-sm" />
                                                    <button type="submit" className="bg-slate-900 hover:bg-slate-800 text-white font-bold px-5 py-3 rounded-xl transition-colors shadow-sm">Submit</button>
                                                </form>
                                            </div>

                                            {awaitingTrackingFor && (
                                                <button onClick={() => setAwaitingTrackingFor(null)} className="mt-6 w-full bg-white border border-red-200 hover:bg-red-50 text-red-600 py-3 rounded-xl font-bold transition-colors">
                                                    Cancel Scan
                                                </button>
                                            )}
                                        </div>
                                    )}

                                    {scanResult && (
                                        <div className="w-full max-w-md mt-2 bg-white p-8 rounded-[2rem] border border-slate-200 shadow-lg animate-fade-in">
                                            <div className="flex items-center gap-4 mb-6 pb-6 border-b border-slate-100">
                                                <div className="w-12 h-12 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center">
                                                    <Icons.CheckCircle className="w-6 h-6" />
                                                </div>
                                                <div>
                                                    <h3 className="font-black text-xl text-slate-900">Scan Success</h3>
                                                    <p className="text-xs font-bold text-slate-500 uppercase tracking-wider mt-0.5">Order Located</p>
                                                </div>
                                            </div>
                                            <div className="bg-slate-50 p-5 rounded-2xl border border-slate-100 space-y-4 mb-8">
                                                <p className="text-sm flex flex-col"><span className="text-slate-400 font-bold uppercase text-[10px] tracking-widest mb-1">Order ID</span> <strong className="text-xl font-black font-mono text-slate-900">{scanResult.id}</strong></p>
                                                <p className="text-sm flex flex-col"><span className="text-slate-400 font-bold uppercase text-[10px] tracking-widest mb-1">Customer</span> <strong className="text-base text-slate-800 uppercase font-bold">{scanResult.name}</strong></p>
                                                <p className="text-sm flex flex-col"><span className="text-slate-400 font-bold uppercase text-[10px] tracking-widest mb-1">Phone</span> <strong className="text-base text-slate-800 font-bold">{scanResult.phone}</strong></p>
                                            </div>
                                            
                                            <div className="flex flex-col gap-3">
                                                <button onClick={() => handleDeliveryAction(scanResult, 'dispatch_today')} className="w-full bg-slate-900 hover:bg-slate-800 text-white font-bold py-4 px-4 rounded-xl shadow-md transition-transform transform hover:-translate-y-0.5 flex items-center justify-center gap-2">
                                                    <Icons.Package className="w-4 h-4" /> Dispatch Today
                                                </button>
                                                <button onClick={() => handleDeliveryAction(scanResult, 'dispatch_tomorrow')} className="w-full bg-white border border-slate-200 hover:bg-slate-50 text-slate-700 font-bold py-4 px-4 rounded-xl transition-all flex items-center justify-center gap-2">
                                                    <Icons.Clock className="w-4 h-4" /> Dispatch Tomorrow
                                                </button>
                                                <button onClick={() => handleDeliveryAction(scanResult, 'out_for_delivery')} className="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 px-4 rounded-xl shadow-md transition-all flex items-center justify-center gap-2">
                                                    <Icons.Truck className="w-4 h-4" />
                                                    Out For Delivery
                                                </button>
                                                <div className="flex gap-3 pt-3 mt-1 border-t border-slate-100">
                                                    <button onClick={syncToGoogleSheets} className="flex-1 bg-white hover:bg-slate-50 text-indigo-600 border border-indigo-200 font-bold py-3 px-4 rounded-xl transition-colors flex items-center justify-center gap-2 text-sm">
                                                        <Icons.Upload className="w-4 h-4" /> Sync
                                                    </button>
                                                    <button onClick={() => setScanResult(null)} className="flex-1 bg-white hover:bg-slate-50 text-slate-600 border border-slate-200 font-bold py-3 px-4 rounded-xl transition-colors flex items-center justify-center gap-2 text-sm">
                                                        <Icons.Refresh className="w-4 h-4" /> Next
                                                    </button>
                                                </div>
                                            </div>
                                            
                                            {syncStatus && <p className={`mt-6 text-center text-xs font-bold uppercase tracking-wider py-3 rounded-xl ${syncStatus.includes('Successfully') ? 'bg-emerald-50 text-emerald-600 border border-emerald-100' : 'bg-red-50 text-red-500 border border-red-100'}`}>{syncStatus}</p>}
                                        </div>
                                    )}
                                </div>

                                {/* Database UI */}
                                <div className="bg-white p-6 md:p-8 rounded-3xl shadow-sm border border-slate-200">
                                    <div className="flex justify-between items-center border-b border-slate-100 pb-5 mb-5">
                                        <h3 className="text-xl font-black text-slate-900">Scan History</h3>
                                        <button onClick={clearScanDatabase} className="text-xs font-bold text-red-500 bg-red-50 px-4 py-2 rounded-xl hover:bg-red-100 transition-colors">Clear Data</button>
                                    </div>
                                    <div className="overflow-x-auto max-h-[400px]">
                                        <table className="w-full text-left border-collapse">
                                            <thead className="sticky top-0 bg-white shadow-sm z-10">
                                                <tr className="border-b border-slate-200 text-[10px] uppercase tracking-widest text-slate-500">
                                                    <th className="p-4 font-bold">Timestamp</th>
                                                    <th className="p-4 font-bold">Order ID</th>
                                                    <th className="p-4 font-bold">Customer</th>
                                                    <th className="p-4 font-bold">Phone</th>
                                                    <th className="p-4 font-bold">Tracking</th>
                                                    <th className="p-4 font-bold text-center">Action</th>
                                                </tr>
                                            </thead>
                                            <tbody className="bg-white divide-y divide-slate-100">
                                                {savedScans.length === 0 ? (
                                                    <tr><td colSpan="6" className="p-10 text-center text-slate-400 font-medium">No scan logs available.</td></tr>
                                                ) : (
                                                    savedScans.map(scan => (
                                                        <tr key={scan.scanId} className="hover:bg-slate-50 transition-colors group">
                                                            <td className="p-4 text-xs font-medium text-slate-500">{scan.scanDate}</td>
                                                            <td className="p-4 font-mono text-sm font-black text-slate-800">{scan.id}</td>
                                                            <td className="p-4 text-sm font-bold text-slate-700 uppercase">{scan.name}</td>
                                                            <td className="p-4 text-sm font-medium text-slate-600">{scan.phone || '-'}</td>
                                                            <td className="p-4 font-mono text-xs font-bold text-indigo-600">{scan.trackingId || <span className="text-slate-400 font-normal italic">Pending</span>}</td>
                                                            <td className="p-4 text-center">
                                                                <button onClick={() => deleteScan(scan.scanId)} className="text-slate-400 hover:text-red-600 hover:bg-red-50 p-2 rounded-lg transition-colors opacity-0 group-hover:opacity-100" title="Delete">
                                                                    <svg xmlns="http://www.w3.org/2000/svg" className="h-4 w-4 mx-auto" viewBox="0 0 20 20" fill="currentColor"><path fillRule="evenodd" d="M9 2a1 1 0 00-.894.553L7.382 4H4a1 1 0 000 2v10a2 2 0 002 2h8a2 2 0 002-2V6a1 1 0 100-2h-3.382l-.724-1.447A1 1 0 0011 2H9zM7 8a1 1 0 012 0v6a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v6a1 1 0 102 0V8a1 1 0 00-1-1z" clipRule="evenodd" /></svg>
                                                                </button>
                                                            </td>
                                                        </tr>
                                                    ))
                                                )}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* -------------------- TAB: SETTINGS -------------------- */}
                        {activeTab === 'settings' && (
                            <div className="w-full max-w-3xl mx-auto bg-white p-6 md:p-10 rounded-3xl shadow-sm border border-slate-200">
                                <div className="flex items-center gap-5 border-b border-slate-100 pb-8 mb-8">
                                    <div className="w-14 h-14 bg-slate-100 rounded-2xl flex items-center justify-center border border-slate-200">
                                        <Icons.Cog className="w-7 h-7 text-slate-700" />
                                    </div>
                                    <div>
                                        <h2 className="text-2xl font-black text-slate-900 tracking-tight">System Configuration</h2>
                                        <p className="text-sm text-slate-500 font-medium mt-1">Manage application preferences and security.</p>
                                    </div>
                                </div>
                                <div className="space-y-8">
                                    
                                    {/* Store Profile */}
                                    <div className="bg-slate-50 p-6 rounded-2xl border border-slate-200">
                                        <h3 className="text-sm font-black text-slate-800 uppercase tracking-widest mb-5">Brand Identity</h3>
                                        <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2 ml-1">Store Logo</label>
                                        <div className="flex gap-5 items-center">
                                            <div className="w-20 h-20 bg-white border border-slate-300 rounded-2xl flex items-center justify-center overflow-hidden shrink-0 p-2 shadow-sm">
                                                {logoUrl ? <img src={logoUrl} alt="Logo" className="w-full h-full object-contain" /> : <StoreLogo className="w-10 h-10 text-slate-300" />}
                                            </div>
                                            <div className="flex-1 space-y-3">
                                                <input type="file" accept="image/*" onChange={handleLogoUpload} className="block w-full text-sm text-slate-500 file:mr-4 file:py-2.5 file:px-5 file:rounded-xl file:border-0 file:text-xs file:font-bold file:uppercase file:tracking-wider file:bg-white file:border file:border-slate-200 file:text-slate-700 hover:file:bg-slate-50 cursor-pointer" />
                                                <div className="flex flex-col sm:flex-row items-start sm:items-center gap-2">
                                                    <span className="text-[10px] text-slate-400 font-bold uppercase shrink-0">Or Image URL:</span>
                                                    <input type="text" value={logoUrl} onChange={e => { setLogoUrl(e.target.value); localStorage.setItem('logoUrl', e.target.value); }} placeholder="https://..." className="w-full flex-1 p-2.5 bg-white border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500/20 text-xs font-mono text-slate-700" />
                                                </div>
                                            </div>
                                        </div>
                                    </div>

                                    {/* App Lock Credentials */}
                                    <div className="bg-slate-50 p-6 rounded-2xl border border-slate-200">
                                        <h3 className="text-sm font-black text-slate-800 uppercase tracking-widest mb-5">Access Control</h3>
                                        <div className="flex flex-col md:flex-row gap-5 items-end">
                                            <div className="flex-1 w-full">
                                                <ModernInput label="Admin User ID" type="text" value={newAuthId} onChange={e=>setNewAuthId(e.target.value)} className="bg-white" />
                                            </div>
                                            <div className="flex-1 w-full">
                                                <ModernInput label="Master Password" type="password" value={newAuthPass} onChange={e=>setNewAuthPass(e.target.value)} className="bg-white font-mono tracking-widest" />
                                            </div>
                                            <button onClick={updateAuth} className="w-full md:w-auto bg-slate-900 hover:bg-slate-800 text-white font-bold py-3.5 px-6 rounded-xl transition-colors shadow-sm text-sm">
                                                Update Security
                                            </button>
                                        </div>
                                    </div>

                                    {/* WhatsApp Preferences */}
                                    <div className="bg-slate-50 p-6 rounded-2xl border border-slate-200">
                                        <h3 className="text-sm font-black text-slate-800 uppercase tracking-widest mb-5">WhatsApp Preferences</h3>
                                        <div>
                                            <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2 ml-1">Preferred App</label>
                                            <select value={waPreference} onChange={e => { setWaPreference(e.target.value); localStorage.setItem('waPreference', e.target.value); }} className="w-full p-4 bg-white border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500/20 outline-none transition-all font-bold text-sm text-slate-700 shadow-sm cursor-pointer">
                                                <option value="w4b_force">WhatsApp Business (Recommended)</option>
                                                <option value="standard">Standard WhatsApp (wa.me)</option>
                                            </select>
                                            <p className="text-[11px] text-slate-400 mt-2 ml-1">Select "WhatsApp Business" to force devices to open the dedicated business app rather than standard WhatsApp.</p>
                                        </div>
                                    </div>

                                    {/* Integrations */}
                                    <div className="bg-slate-50 p-6 rounded-2xl border border-slate-200 space-y-5">
                                        <h3 className="text-sm font-black text-slate-800 uppercase tracking-widest mb-2">Integrations</h3>
                                        <div>
                                            <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2 ml-1">Google Sheets Webhook URL</label>
                                            <textarea rows="2" value={sheetUrl} onChange={e => { setSheetUrl(e.target.value); localStorage.setItem('googleSheetUrl', e.target.value); }} placeholder="https://script.google.com/macros/s/..." className="w-full p-4 bg-white border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500/20 outline-none transition-all font-mono text-[11px] text-slate-700 shadow-sm resize-none"></textarea>
                                        </div>
                                        <div>
                                            <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2 ml-1">Backend Server URL</label>
                                            <input type="text" value={serverUrl} onChange={e => { setServerUrl(e.target.value); localStorage.setItem('serverUrl', e.target.value); }} placeholder="/api/save-label" className="w-full p-4 bg-white border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500/20 outline-none transition-all font-mono text-[11px] text-slate-700 shadow-sm" />
                                        </div>
                                        <button onClick={() => showNotification('Integrations Saved Successfully!')} className="w-full bg-indigo-50 text-indigo-700 hover:bg-indigo-100 font-bold py-3 px-4 rounded-xl transition-colors border border-indigo-200 text-sm">
                                            Test Connections
                                        </button>
                                    </div>

                                    {/* Backup & Restore */}
                                    <div className="bg-slate-50 p-6 rounded-2xl border border-slate-200">
                                        <h3 className="text-sm font-black text-slate-800 uppercase tracking-widest mb-2">Data Management</h3>
                                        <p className="text-xs text-slate-500 font-medium mb-5">Export your database for safe keeping or import to a new device.</p>
                                        <div className="flex flex-col sm:flex-row gap-4">
                                            <button onClick={exportData} className="flex-1 bg-white border border-slate-300 hover:bg-slate-50 text-slate-800 font-bold py-3.5 px-4 rounded-xl transition-colors shadow-sm flex items-center justify-center gap-2">
                                                <Icons.Download className="w-4 h-4" /> Download Backup
                                            </button>
                                            <div className="flex-1 relative">
                                                <input type="file" accept=".json" onChange={importData} className="absolute inset-0 w-full h-full opacity-0 cursor-pointer" />
                                                <button className="w-full bg-white border border-slate-300 hover:bg-slate-50 text-slate-800 font-bold py-3.5 px-4 rounded-xl transition-colors shadow-sm flex items-center justify-center gap-2 pointer-events-none">
                                                    <Icons.Upload className="w-4 h-4" /> Restore Data
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                    
                                </div>
                            </div>
                        )}
                    </main>

                    <footer className="w-full text-center py-6 text-slate-400 text-[10px] font-black uppercase tracking-[0.2em] no-print">
                        Powered by Shariff Enterprises
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
