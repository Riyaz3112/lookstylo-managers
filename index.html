                                                                Number(item.stock) <= 0 ? 'bg-red-100 text-red-700' : Number(item.stock) <= 5 ? 'bg-amber-100 text-amber-700' : 'bg-emerald-100 text-emerald-700'
                                                            }`}>
                                                                {item.stock} {Number(item.stock) <= 5 && '⚠️'}
                                                            </span>
                                                        </td>
                                                        <td className="p-4 text-right">
                                                            <div className="font-black text-slate-800 text-base">₹{item.price}</div>
                                                            {Number(item.purchasePrice) > 0 && <div className="text-[10px] text-slate-400 font-medium mt-0.5">Cost: ₹{item.purchasePrice}</div>}
                                                        </td>
                                                        <td className="p-4 text-center">
                                                            <div className="flex justify-center gap-2 opacity-0 group-hover:opacity-100 transition-opacity">
                                                                <button onClick={() => openInvModal(item)} className="text-blue-500 hover:text-blue-700 hover:bg-blue-50 p-2 rounded transition-colors" title="Edit Item">
                                                                    <svg xmlns="http://www.w3.org/2000/svg" className="h-4 w-4" viewBox="0 0 20 20" fill="currentColor"><path d="M13.586 3.586a2 2 0 112.828 2.828l-.793.793-2.828-2.828.793-.793zM11.379 5.793L3 14.172V17h2.828l8.38-8.379-2.83-2.828z" /></svg>
                                                                </button>
                                                                <button onClick={() => deleteInventoryItem(item.id, item.name)} className="text-red-500 hover:text-red-700 hover:bg-red-50 p-2 rounded transition-colors" title="Delete Item">
                                                                    <svg xmlns="http://www.w3.org/2000/svg" className="h-4 w-4" viewBox="0 0 20 20" fill="currentColor"><path fillRule="evenodd" d="M9 2a1 1 0 00-.894.553L7.382 4H4a1 1 0 000 2v10a2 2 0 002 2h8a2 2 0 002-2V6a1 1 0 100-2h-3.382l-.724-1.447A1 1 0 0011 2H9zM7 8a1 1 0 012 0v6a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v6a1 1 0 102 0V8a1 1 0 00-1-1z" clipRule="evenodd" /></svg>
                                                                </button>
                                                            </div>
                                                        </td>
                                                    </tr>
                                                ))
                                            )}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}

                        {/* -------------------- TAB: EXPENSES -------------------- */}
                        {activeTab === 'expenses' && (
                            <div className="w-full max-w-5xl mx-auto bg-white p-8 rounded-3xl shadow-xl shadow-slate-200/50 border border-slate-100">
                                <div className="flex justify-between items-center border-b border-slate-100 pb-4 mb-6">
                                    <div>
                                        <h2 className="text-3xl font-extrabold text-slate-800">Shop Expenses</h2>
                                        <p className="text-sm text-slate-500 font-medium mt-1">Log your daily store expenses (Rent, Tea, Transport, etc.).</p>
                                    </div>
                                    <span className="bg-red-50 text-red-600 font-bold px-3 py-1 rounded-lg text-sm">{expenses.length} Records</span>
                                </div>
                                
                                <div className="bg-slate-50 p-6 rounded-2xl border border-slate-200 mb-8 flex flex-col md:flex-row gap-4 items-end">
                                    <div className="w-full md:w-40">
                                        <ModernInput label="Date" type="date" value={expDate} onChange={e=>setExpDate(e.target.value)} />
                                    </div>
                                    <div className="flex-1 w-full">
                                        <ModernInput label="Expense Description" type="text" placeholder="e.g., Tea, Shop Rent, Transport" value={expDesc} onChange={e=>setExpDesc(e.target.value)} />
                                    </div>
                                    <div className="w-full md:w-32">
                                        <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1.5 ml-1">Paid Via</label>
                                        <select value={expMode} onChange={e=>setExpMode(e.target.value)} className="w-full p-3 bg-white border border-slate-200 rounded-xl focus:ring-4 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none transition-all text-sm font-bold text-slate-700 shadow-sm cursor-pointer">
                                            <option value="Cash">💵 Cash</option>
                                            <option value="Bank">🏦 Bank/UPI</option>
                                        </select>
                                    </div>
                                    <div className="w-full md:w-36">
                                        <ModernInput label="Amount (₹)" type="number" min="0" placeholder="e.g., 150" value={expAmount} onChange={e=>setExpAmount(e.target.value)} />
                                    </div>
                                    <button onClick={handleAddExpense} className="w-full md:w-auto bg-red-500 hover:bg-red-600 text-white font-bold py-3.5 px-6 rounded-xl shadow-lg shadow-red-200 transition-transform transform hover:-translate-y-0.5">
                                        ➕ Add Expense
                                    </button>
                                </div>

                                <div className="overflow-x-auto max-h-[500px] border border-slate-200 rounded-2xl">
                                    <table className="w-full text-left border-collapse">
                                        <thead className="sticky top-0 bg-white shadow-sm border-b border-slate-200 text-xs uppercase tracking-wider text-slate-500">
                                            <tr>
                                                <th className="p-4 font-bold w-32">Date</th>
                                                <th className="p-4 font-bold">Description</th>
                                                <th className="p-4 font-bold text-right w-40">Amount (₹)</th>
                                                <th className="p-4 font-bold text-center w-24">Action</th>
                                            </tr>
                                        </thead>
                                        <tbody className="bg-white divide-y divide-slate-100">
                                            {expenses.length === 0 ? (
                                                <tr><td colSpan="4" className="p-8 text-center text-slate-400 font-medium">No expenses recorded yet.</td></tr>
                                            ) : (
                                                expenses.map((exp) => (
                                                    <tr key={exp.id} className="hover:bg-slate-50 transition-colors">
                                                        <td className="p-4 font-medium text-slate-600">{exp.date.split('-').reverse().join('-')}</td>
                                                        <td className="p-4 font-medium text-slate-800">{exp.description}</td>
                                                        <td className="p-4 font-bold text-red-600 text-right">
                                                            ₹ {exp.amount}
                                                            <span className={`block text-[10px] font-normal mt-0.5 ${exp.mode === 'Bank' ? 'text-blue-500' : 'text-emerald-500'}`}>
                                                                {exp.mode === 'Bank' ? '🏦 Bank/UPI' : '💵 Cash'}
                                                            </span>
                                                        </td>
                                                        <td className="p-4 text-center">
                                                            <button onClick={() => handleDeleteExpense(exp.id)} className="text-red-500 hover:text-red-700 hover:bg-red-50 p-1.5 rounded transition-colors" title="Delete Expense">
                                                                <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5 mx-auto" viewBox="0 0 20 20" fill="currentColor"><path fillRule="evenodd" d="M9 2a1 1 0 00-.894.553L7.382 4H4a1 1 0 000 2v10a2 2 0 002 2h8a2 2 0 002-2V6a1 1 0 100-2h-3.382l-.724-1.447A1 1 0 0011 2H9zM7 8a1 1 0 012 0v6a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v6a1 1 0 102 0V8a1 1 0 00-1-1z" clipRule="evenodd" /></svg>
                                                            </button>
                                                        </td>
                                                    </tr>
                                                ))
                                            )}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}

                        {/* -------------------- TAB: REPORTS -------------------- */}
                        {activeTab === 'reports' && (
                            <div className="w-full max-w-5xl mx-auto bg-white p-8 rounded-3xl shadow-xl shadow-slate-200/50 border border-slate-100 print:shadow-none print:border-none print:p-0 print:max-w-full">
                                
                                <div className="hidden print:block text-center mb-6 border-b-2 border-gray-800 pb-4">
                                    <h1 className="text-3xl font-extrabold tracking-wider text-gray-900 uppercase">LOOKSTYLO FASHION</h1>
                                    <h2 className="text-xl font-bold mt-2">Sales Report</h2>
                                    <p className="text-sm font-medium mt-1 text-gray-600">Period: {periodLabel} | Type: {reportFilter === 'All' ? 'All Bills' : reportFilter + ' Bills'}</p>
                                </div>

                                <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 border-b border-slate-100 pb-6 mb-6 no-print">
                                    <div>
                                        <h2 className="text-3xl font-extrabold text-slate-800">Sales Reports</h2>
                                        <p className="text-sm text-slate-500 font-medium mt-1">Track your cash and G-Pay collections for {periodLabel}.</p>
                                    </div>
                                    <div className="flex flex-wrap items-center gap-3">
                                        <div className="bg-slate-50 p-2 rounded-2xl border border-slate-200 shadow-sm flex items-center gap-3 flex-wrap">
                                            <select value={reportType} onChange={e=>setReportType(e.target.value)} className="p-2 bg-white border border-slate-200 rounded-lg outline-none focus:ring-2 focus:ring-indigo-500/50 font-bold text-slate-700 cursor-pointer">
                                                <option value="daily">Daily</option>
                                                <option value="monthly">Monthly</option>
                                                <option value="yearly">Yearly</option>
                                            </select>
                                            
                                            {reportType === 'daily' && (
                                                <input type="date" value={reportDate} onChange={e=>setReportDate(e.target.value)} className="p-2 bg-white border border-slate-200 rounded-lg outline-none focus:ring-2 focus:ring-indigo-500/50 font-bold text-indigo-700" />
                                            )}
                                            {reportType === 'monthly' && (
                                                <input type="month" value={reportMonth} onChange={e=>setReportMonth(e.target.value)} className="p-2 bg-white border border-slate-200 rounded-lg outline-none focus:ring-2 focus:ring-indigo-500/50 font-bold text-indigo-700" />
                                            )}
                                            {reportType === 'yearly' && (
                                                <select value={reportYear} onChange={e=>setReportYear(e.target.value)} className="p-2 bg-white border border-slate-200 rounded-lg outline-none focus:ring-2 focus:ring-indigo-500/50 font-bold text-indigo-700 cursor-pointer">
                                                    {[...Array(11)].map((_, i) => {
                                                        const y = new Date().getFullYear() - 5 + i;
                                                        return <option key={y} value={y}>{y}</option>;
                                                    })}
                                                </select>
                                            )}
                                            
                                            <div className="h-6 w-px bg-slate-300 mx-1"></div>
                                            <select value={reportFilter} onChange={e=>setReportFilter(e.target.value)} className="p-2 bg-white border border-slate-200 rounded-lg outline-none focus:ring-2 focus:ring-indigo-500/50 font-bold text-purple-700 cursor-pointer">
                                                <option value="All">All Bills</option>
                                                <option value="GST">GST Only</option>
                                                <option value="Non-GST">Non-GST Only</option>
                                            </select>
                                        </div>
                                        <button onClick={exportToCSV} className="bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-2.5 px-5 rounded-2xl shadow-sm transition-transform transform hover:-translate-y-0.5 flex items-center gap-2">
                                            <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}><path strokeLinecap="round" strokeLinejoin="round" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" /></svg>
                                            Export Excel
                                        </button>
                                        <button onClick={() => window.print()} className="bg-slate-800 hover:bg-slate-900 text-white font-bold py-2.5 px-5 rounded-2xl shadow-sm transition-transform transform hover:-translate-y-0.5 flex items-center gap-2">
                                            <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}><path strokeLinecap="round" strokeLinejoin="round" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z" /></svg>
                                            Print Report
                                        </button>
                                    </div>
                                </div>

                                <div className={`grid grid-cols-1 md:grid-cols-3 gap-6 mb-8 print:gap-4`}>
                                    <div className="bg-indigo-50 p-5 rounded-2xl border border-indigo-100 flex flex-col justify-center">
                                        <span className="text-xs font-bold text-indigo-500 uppercase tracking-wider mb-1">Total Sales</span>
                                        <span className="text-3xl font-black text-indigo-700">₹ {totalReportSales.toFixed(2)}</span>
                                    </div>
                                    
                                    <div className="bg-emerald-50 p-5 rounded-2xl border border-emerald-100 flex flex-col justify-center">
                                        <span className="text-xs font-bold text-emerald-600 uppercase tracking-wider mb-1">Total Paid In</span>
                                        <span className="text-2xl font-black text-emerald-700">₹ {(totalReportCash + totalReportGpay + totalReportAdvance).toFixed(2)}</span>
                                    </div>
                                    
                                    <div className="bg-red-50 p-5 rounded-2xl border border-red-100 flex flex-col justify-center">
                                        <span className="text-xs font-bold text-red-600 uppercase tracking-wider mb-1">Total Expenses</span>
                                        <span className="text-2xl font-black text-red-700">₹ {totalReportExpenses.toFixed(2)}</span>
                                    </div>

                                    {reportFilter === 'All' && (
                                        <>
                                            <div className="bg-purple-50 p-5 rounded-2xl border border-purple-100 flex flex-col justify-center">
                                                <span className="text-xs font-bold text-purple-600 uppercase tracking-wider mb-1">GST Sales</span>
                                                <span className="text-xl font-black text-purple-700">₹ {totalGSTSales.toFixed(2)}</span>
                                            </div>
                                            <div className="bg-slate-50 p-5 rounded-2xl border border-slate-200 flex flex-col justify-center">
                                                <span className="text-xs font-bold text-slate-600 uppercase tracking-wider mb-1">Non-GST Sales</span>
                                                <span className="text-xl font-black text-slate-700">₹ {totalNonGSTSales.toFixed(2)}</span>
                                            </div>
                                        </>
                                    )}

                                    <div className="bg-amber-50 p-5 rounded-2xl border border-amber-100 flex flex-col justify-center">
                                        <span className="text-xs font-bold text-amber-600 uppercase tracking-wider mb-1">Pending Balance</span>
                                        <span className="text-xl font-black text-amber-700">₹ {totalReportBalance.toFixed(2)}</span>
                                    </div>
                                </div>

                                <div className="border border-slate-200 rounded-2xl overflow-hidden shadow-sm print:border-none print:shadow-none">
                                    <div className="bg-slate-50/80 px-5 py-4 border-b border-slate-200 flex justify-between items-center print:bg-transparent print:px-0">
                                        <h3 className="font-bold text-slate-700 uppercase tracking-wider text-xs">Invoices Breakdown</h3>
                                        <span className="text-xs font-semibold text-indigo-500 bg-indigo-50 px-2 py-1 rounded-md print:hidden">{reportBills.length} Bill(s)</span>
                                    </div>
                                    <div className="overflow-x-auto max-h-[500px] print:max-h-none print:overflow-visible">
                                        <table className="w-full text-left border-collapse">
                                            <thead className="sticky top-0 bg-white shadow-sm print:shadow-none print:border-b-2 print:border-gray-800">
                                                <tr className="border-b border-slate-200 text-xs uppercase tracking-wider text-slate-500 print:text-black">
                                                    <th className="p-4 font-bold">Date</th>
                                                    <th className="p-4 font-bold">Invoice ID</th>
                                                    <th className="p-4 font-bold text-center">Type</th>
                                                    <th className="p-4 font-bold">Customer</th>
                                                    <th className="p-4 font-bold text-right">Total</th>
                                                    <th className="p-4 font-bold text-right">Paid</th>
                                                    <th className="p-4 font-bold text-right">Balance</th>
                                                    <th className="p-4 font-bold text-center no-print">Action</th>
                                                </tr>
                                            </thead>
                                            <tbody className="bg-white divide-y divide-slate-100 print:divide-gray-300">
                                                {reportBills.length === 0 ? (
                                                    <tr><td colSpan="8" className="p-8 text-center text-slate-400 font-medium">No bills recorded for this period.</td></tr>
                                                ) : (
                                                    reportBills.slice().reverse().map(bill => (
                                                        <tr key={bill.id} className="hover:bg-slate-50 transition-colors print:break-inside-avoid">
                                                            <td className="p-4 text-xs font-medium text-slate-500 print:text-black">{bill.date.split('-').reverse().join('-')}</td>
                                                            <td className="p-4 font-mono text-sm font-bold text-slate-700 print:text-black">{bill.id}</td>
                                                            <td className="p-4 text-center">
                                                                <span className={`text-[10px] font-bold px-2 py-1 rounded-md print:p-0 print:text-black ${bill.type === 'GST' ? 'bg-purple-100 text-purple-700' : 'bg-slate-100 text-slate-600'}`}>{bill.type || 'Non-GST'}</span>
                                                            </td>
                                                            <td className="p-4 text-sm font-medium text-slate-600 print:text-black">{bill.customer}</td>
                                                            <td className="p-4 text-sm font-bold text-right text-slate-800 print:text-black">₹ {bill.total}</td>
                                                            <td className="p-4 text-sm font-medium text-right text-emerald-600 print:text-black">₹ {(bill.cash + bill.gpay + bill.advance)}</td>
                                                            <td className="p-4 text-sm font-bold text-right text-amber-600 print:text-black">₹ {bill.balance}</td>
                                                            <td className="p-4 text-center no-print">
                                                                <div className="flex justify-center gap-1">
                                                                    {bill.balance > 0 && (
                                                                        <button onClick={() => sendReminderWhatsApp(bill)} className="text-emerald-500 hover:text-emerald-700 hover:bg-emerald-50 p-1.5 rounded transition-colors" title="Send WhatsApp Reminder">
                                                                            <WhatsAppIcon className="h-5 w-5 mx-auto" />
                                                                        </button>
                                                                    )}
                                                                    {bill.balance <= 0 && bill.total > 0 && (
                                                                        <button onClick={() => sendThankYouWhatsApp(bill)} className="text-pink-500 hover:text-pink-700 hover:bg-pink-50 p-1.5 rounded transition-colors" title="Send Thank You WhatsApp">
                                                                            <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5 mx-auto" viewBox="0 0 20 20" fill="currentColor"><path fillRule="evenodd" d="M3.172 5.172a4 4 0 015.656 0L10 6.343l1.172-1.171a4 4 0 115.656 5.656L10 17.657l-6.828-6.829a4 4 0 010-5.656z" clipRule="evenodd" /></svg>
                                                                        </button>
                                                                    )}
                                                                    <button onClick={() => handleEditBill(bill)} className="text-blue-500 hover:text-blue-700 hover:bg-blue-50 p-1.5 rounded transition-colors" title="Edit Full Bill">
                                                                        <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5 mx-auto" viewBox="0 0 20 20" fill="currentColor"><path d="M13.586 3.586a2 2 0 112.828 2.828l-.793.793-2.828-2.828.793-.793zM11.379 5.793L3 14.172V17h2.828l8.38-8.379-2.83-2.828z" /></svg>
                                                                    </button>
                                                                    <button onClick={() => openPaymentModal(bill)} className="text-emerald-500 hover:text-emerald-700 hover:bg-emerald-50 p-1.5 rounded transition-colors" title="Update Payment Only">
                                                                        <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5 mx-auto" viewBox="0 0 20 20" fill="currentColor"><path d="M4 4a2 2 0 00-2 2v1h16V6a2 2 0 00-2-2H4z" /><path fillRule="evenodd" d="M18 9H2v5a2 2 0 002 2h12a2 2 0 002-2V9zM4 13a1 1 0 011-1h1a1 1 0 110 2H5a1 1 0 01-1-1zm5-1a1 1 0 100 2h1a1 1 0 100-2H9z" clipRule="evenodd" /></svg>
                                                                    </button>
                                                                    <button onClick={() => deleteBill(bill.id)} className="text-red-500 hover:text-red-700 hover:bg-red-50 p-1.5 rounded transition-colors" title="Delete Bill">
                                                                        <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5 mx-auto" viewBox="0 0 20 20" fill="currentColor"><path fillRule="evenodd" d="M9 2a1 1 0 00-.894.553L7.382 4H4a1 1 0 000 2v10a2 2 0 002 2h8a2 2 0 002-2V6a1 1 0 100-2h-3.382l-.724-1.447A1 1 0 0011 2H9zM7 8a1 1 0 012 0v6a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v6a1 1 0 102 0V8a1 1 0 00-1-1z" clipRule="evenodd" /></svg>
                                                                    </button>
                                                                </div>
                                                            </td>
                                                        </tr>
                                                    ))
                                                )}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* -------------------- TAB: GENERATOR (Label Only) -------------------- */}
                        {activeTab === 'generator' && (
                            <>
                                <div className="w-full lg:w-[40%] bg-white p-8 rounded-3xl shadow-xl shadow-slate-200/50 border border-slate-100 h-fit space-y-6 no-print">
                                    <h2 className="text-3xl font-extrabold bg-clip-text text-transparent bg-gradient-to-r from-blue-600 to-indigo-600 mb-2 border-b border-slate-100 pb-4">Manual Label Creator</h2>
                                    <div className="space-y-5">
                                        <ModernInput label="Order ID / Tracking" type="text" value={orderId} onChange={(e) => setOrderId(e.target.value)} className="uppercase" />
                                        <ModernInput label="Customer Name (TO)" type="text" value={toName} onChange={(e) => setToName(e.target.value)} className="uppercase" />
                                        <div>
                                            <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1.5 ml-1">Delivery Address (TO)</label>
                                            <textarea rows="4" value={toAddress} onChange={(e) => setToAddress(e.target.value)} className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-4 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none transition-all text-sm font-medium text-slate-800 shadow-sm uppercase resize-none"></textarea>
                                        </div>
                                        <ModernInput label="Phone Number(s)" type="text" value={toPhone} onChange={(e) => setToPhone(e.target.value)} className="uppercase font-mono" />
                                        
                                        <div className="pt-4 grid grid-cols-1 md:grid-cols-2 gap-4">
                                            <button onClick={handlePrint} className="w-full bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 text-white font-bold py-3.5 px-4 rounded-xl shadow-lg shadow-blue-200 transition-all transform hover:-translate-y-0.5">🖨️ Print Label</button>
                                            <button onClick={handleSave} className="w-full bg-slate-800 hover:bg-slate-900 text-white font-bold py-3.5 px-4 rounded-xl shadow-lg transition-all transform hover:-translate-y-0.5">💾 Save Details</button>
                                        </div>
                                    </div>
                                </div>
                                <div className="w-full lg:w-[60%] flex justify-center bg-slate-200/50 p-6 md:p-8 rounded-3xl border border-slate-200 shadow-inner print-section print:overflow-visible print:h-auto print:block print:p-0 print:bg-white print:border-none print:shadow-none">
                                    <div className="a5-container hover:shadow-2xl transition-shadow">
                                        <LabelContent orderId={orderId} toName={toName} toAddress={toAddress} toPhone={toPhone} logoUrl={logoUrl} />
                                    </div>
                                </div>
                            </>
                        )}

                        {/* -------------------- TAB: SCANNER -------------------- */}
                        {activeTab === 'scanner' && (
                            <div className="w-full max-w-5xl mx-auto flex flex-col gap-8">
                                {/* Scanner UI */}
                                <div className="bg-white p-8 rounded-3xl shadow-xl shadow-slate-200/50 border border-slate-100 flex flex-col items-center">
                                    <div className="w-16 h-16 bg-indigo-50 rounded-2xl flex items-center justify-center mb-6 shadow-inner">
                                        <span className="text-3xl">📷</span>
                                    </div>
                                    <h2 className="text-3xl font-extrabold text-slate-800 mb-8 text-center">Dispatch Scanner</h2>
                                    
                                    {!scanResult && (
                                        <div className={`w-full max-w-md p-6 rounded-3xl border-2 border-dashed ${awaitingTrackingFor ? 'bg-amber-50 border-amber-300' : 'bg-slate-50 border-slate-300'}`}>
                                            <h3 className={`text-center font-bold text-lg mb-4 ${awaitingTrackingFor ? 'text-amber-800' : 'text-slate-700'}`}>
                                                {awaitingTrackingFor ? `Scan Courier Tracking Barcode for Order: ${awaitingTrackingFor.id}` : `Step 1: Scan Order QR Code`}
                                            </h3>
                                            <div id="reader" className="w-full rounded-2xl overflow-hidden min-h-[250px] shadow-inner bg-white"></div>
                                            {awaitingTrackingFor && (
                                                <button onClick={() => setAwaitingTrackingFor(null)} className="mt-6 w-full bg-red-100 hover:bg-red-200 text-red-700 py-3 rounded-xl font-bold transition-colors">
                                                    Cancel Tracking Scan
                                                </button>
                                            )}
                                        </div>
                                    )}

                                    {scanResult && (
                                        <div className="w-full max-w-md mt-2 bg-indigo-50 p-6 rounded-3xl border border-indigo-100 shadow-sm animate-fade-in">
                                            <div className="flex items-center gap-3 mb-4">
                                                <div className="w-10 h-10 bg-indigo-100 text-indigo-600 rounded-full flex items-center justify-center font-black text-xl">✓</div>
                                                <h3 className="font-bold text-xl text-indigo-800">Order Scanned!</h3>
                                            </div>
                                            <div className="bg-white p-4 rounded-xl border border-indigo-100 space-y-3 mb-6 shadow-sm">
                                                <p className="text-sm"><span className="text-slate-500 font-medium uppercase text-xs tracking-wider block mb-0.5">Order ID</span> <strong className="text-lg font-mono text-slate-800">{scanResult.id}</strong></p>
                                                <p className="text-sm"><span className="text-slate-500 font-medium uppercase text-xs tracking-wider block mb-0.5">Customer</span> <strong className="text-slate-800 uppercase">{scanResult.name}</strong></p>
                                                <p className="text-sm"><span className="text-slate-500 font-medium uppercase text-xs tracking-wider block mb-0.5">Phone</span> <strong className="text-slate-800">{scanResult.phone}</strong></p>
                                            </div>
                                            
                                            <div className="flex flex-col gap-3">
                                                <p className="text-xs font-bold text-slate-500 text-center uppercase mb-1">Select Action:</p>
                                                <button onClick={() => handleDispatchToday(scanResult)} className="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3.5 px-4 rounded-xl shadow-md transition-transform transform hover:-translate-y-0.5 flex items-center justify-center gap-2">
                                                    📦 Dispatch Today (Next Scan Tracking)
                                                </button>
                                                <button onClick={() => handleDispatchTomorrow(scanResult)} className="w-full bg-amber-500 hover:bg-amber-600 text-white font-bold py-3 px-4 rounded-xl shadow-md transition-transform transform hover:-translate-y-0.5 flex items-center justify-center gap-2">
                                                    ⏳ Dispatch Tomorrow
                                                </button>
                                                <div className="flex gap-3 pt-2 border-t border-indigo-200 mt-2">
                                                    <button onClick={syncToGoogleSheets} className="flex-1 bg-white hover:bg-slate-50 text-indigo-600 border border-indigo-200 font-bold py-2.5 px-4 rounded-xl shadow-sm transition-colors">
                                                        💾 Sync to Sheets
                                                    </button>
                                                    <button onClick={() => setScanResult(null)} className="flex-1 bg-slate-800 hover:bg-slate-900 text-white font-bold py-2.5 px-4 rounded-xl shadow-md transition-colors">
                                                        🔄 Scan Next
                                                    </button>
                                                </div>
                                            </div>
                                            
                                            {syncStatus && <p className={`mt-4 text-center text-sm font-bold bg-white py-2 rounded-lg ${syncStatus.includes('Successfully') ? 'text-emerald-600 border border-emerald-100' : 'text-red-500 border border-red-100'}`}>{syncStatus}</p>}
                                        </div>
                                    )}
                                </div>

                                {/* Database UI */}
                                <div className="bg-white p-8 rounded-3xl shadow-xl shadow-slate-200/50 border border-slate-100">
                                    <div className="flex justify-between items-center border-b border-slate-100 pb-4 mb-4">
                                        <h3 className="text-2xl font-extrabold text-slate-800">Scanned Database</h3>
                                        <button onClick={clearScanDatabase} className="text-xs font-bold text-red-500 bg-red-50 px-3 py-1.5 rounded-lg hover:bg-red-100 transition-colors">Clear History</button>
                                    </div>
                                    <div className="overflow-x-auto max-h-[400px]">
                                        <table className="w-full text-left border-collapse">
                                            <thead className="sticky top-0 bg-white shadow-sm">
                                                <tr className="border-b border-slate-200 text-xs uppercase tracking-wider text-slate-500">
                                                    <th className="p-4 font-bold">Date & Time</th>
                                                    <th className="p-4 font-bold">Order ID</th>
                                                    <th className="p-4 font-bold">Customer</th>
                                                    <th className="p-4 font-bold">Phone</th>
                                                    <th className="p-4 font-bold">Tracking ID</th>
                                                    <th className="p-4 font-bold text-center">Action</th>
                                                </tr>
                                            </thead>
                                            <tbody className="bg-white divide-y divide-slate-100">
                                                {savedScans.length === 0 ? (
                                                    <tr><td colSpan="6" className="p-8 text-center text-slate-400 font-medium">No scans recorded yet.</td></tr>
                                                ) : (
                                                    savedScans.map(scan => (
                                                        <tr key={scan.scanId} className="hover:bg-slate-50 transition-colors">
                                                            <td className="p-4 text-xs font-medium text-slate-500">{scan.scanDate}</td>
                                                            <td className="p-4 font-mono text-sm font-bold text-slate-700">{scan.id}</td>
                                                            <td className="p-4 text-sm font-medium text-slate-600 uppercase">{scan.name}</td>
                                                            <td className="p-4 text-sm font-medium text-slate-600">{scan.phone || '-'}</td>
                                                            <td className="p-4 font-mono text-sm font-bold text-indigo-600">{scan.trackingId || <span className="text-slate-400 font-normal italic text-xs">Pending</span>}</td>
                                                            <td className="p-4 text-center">
                                                                <button onClick={() => deleteScan(scan.scanId)} className="text-red-500 hover:text-red-700 hover:bg-red-50 p-1.5 rounded transition-colors" title="Delete Scan">
                                                                    <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5 mx-auto" viewBox="0 0 20 20" fill="currentColor"><path fillRule="evenodd" d="M9 2a1 1 0 00-.894.553L7.382 4H4a1 1 0 000 2v10a2 2 0 002 2h8a2 2 0 002-2V6a1 1 0 100-2h-3.382l-.724-1.447A1 1 0 0011 2H9zM7 8a1 1 0 012 0v6a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v6a1 1 0 102 0V8a1 1 0 00-1-1z" clipRule="evenodd" /></svg>
                                                                </button>
                                                            </td>
                                                        </tr>
                                                    ))
                                                )}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* -------------------- TAB: SETTINGS -------------------- */}
                        {activeTab === 'settings' && (
                            <div className="w-full max-w-3xl mx-auto bg-white p-8 rounded-3xl shadow-xl shadow-slate-200/50 border border-slate-100">
                                <div className="flex items-center gap-4 border-b border-slate-100 pb-6 mb-6">
                                    <div className="w-12 h-12 bg-slate-100 rounded-xl flex items-center justify-center text-2xl">⚙️</div>
                                    <div>
                                        <h2 className="text-3xl font-extrabold text-slate-800">System Settings</h2>
                                        <p className="text-sm text-slate-500 font-medium">Configure webhooks and backend connections.</p>
                                    </div>
                                </div>
                                <div className="space-y-6">
                                    <div>
                                        <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2 ml-1">Store Logo</label>
                                        <div className="flex gap-4 items-center">
                                            <div className="w-16 h-16 bg-slate-100 border-2 border-dashed border-slate-300 rounded-xl flex items-center justify-center overflow-hidden shrink-0 p-1">
                                                {logoUrl ? <img src={logoUrl} alt="Logo" className="w-full h-full object-contain" /> : <StoreLogo className="w-10 h-10 text-slate-400" />}
                                            </div>
                                            <div className="flex-1 space-y-2">
                                                <input type="file" accept="image/*" onChange={handleLogoUpload} className="block w-full text-sm text-slate-500 file:mr-4 file:py-2.5 file:px-4 file:rounded-xl file:border-0 file:text-sm file:font-bold file:bg-indigo-50 file:text-indigo-700 hover:file:bg-indigo-100 cursor-pointer" />
                                                <div className="flex items-center gap-2">
                                                    <span className="text-xs text-slate-400 font-bold uppercase shrink-0">OR PASTE URL:</span>
                                                    <input type="text" value={logoUrl} onChange={e => { setLogoUrl(e.target.value); localStorage.setItem('logoUrl', e.target.value); }} placeholder="https://example.com/logo.png" className="flex-1 p-2 bg-slate-50 border border-slate-200 rounded-lg outline-none focus:ring-2 focus:ring-indigo-500/20 text-xs font-mono text-slate-700" />
                                                </div>
                                            </div>
                                        </div>
                                        <p className="text-[11px] text-slate-400 mt-2 ml-1">Upload an image file from your device, or paste a direct image link. This will instantly appear on the app header and all printed bills.</p>
                                    </div>

                                    {/* ✨ NEW APP LOCK CREDENTIALS SECTION */}
                                    <div className="pt-6 border-t border-slate-100">
                                        <h3 className="text-lg font-extrabold text-slate-800 mb-4">App Lock & Security</h3>
                                        <p className="text-sm text-slate-500 mb-4">Change the User ID and Password required to open the billing app.</p>
                                        <div className="flex flex-col md:flex-row gap-4 items-end">
                                            <div className="flex-1 w-full">
                                                <ModernInput label="User ID" type="text" value={newAuthId} onChange={e=>setNewAuthId(e.target.value)} />
                                            </div>
                                            <div className="flex-1 w-full">
                                                <ModernInput label="Password" type="text" value={newAuthPass} onChange={e=>setNewAuthPass(e.target.value)} />
                                            </div>
                                            <button onClick={updateAuth} className="w-full md:w-auto bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3.5 px-6 rounded-xl shadow-lg shadow-indigo-200 transition-transform transform hover:-translate-y-0.5">
                                                Update Credentials
                                            </button>
                                        </div>
                                    </div>

                                    {/* ✨ NEW GPAY QR UPLOAD SECTION */}
                                    <div className="pt-4 border-t border-slate-100">
                                        <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2 ml-1">GPay / UPI QR Scan</label>
                                        <div className="flex gap-4 items-center">
                                            <div className="w-16 h-16 bg-blue-50 border-2 border-dashed border-blue-300 rounded-xl flex items-center justify-center overflow-hidden shrink-0 p-1">
                                                {gpayQrUrl ? <img src={gpayQrUrl} alt="GPay QR" className="w-full h-full object-contain" /> : <span className="text-2xl text-blue-300">📱</span>}
                                            </div>
                                            <div className="flex-1 space-y-2">
                                                <input type="file" accept="image/*" onChange={handleGpayQrUpload} className="block w-full text-sm text-slate-500 file:mr-4 file:py-2.5 file:px-4 file:rounded-xl file:border-0 file:text-sm file:font-bold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 cursor-pointer" />
                                                <p className="text-[10px] text-slate-400 mt-1">Upload your custom GPay / PhonePe QR scan image (e.g., your <strong className="text-slate-600">gpay scan.jpeg</strong>). It will automatically pop up when you enter an amount in the GPay section.</p>
                                            </div>
                                        </div>
                                    </div>

                                    <div className="pt-4 border-t border-slate-100">
                                        <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2 ml-1">Google Apps Script Webhook URL</label>
                                        <textarea rows="3" value={sheetUrl} onChange={e => { setSheetUrl(e.target.value); localStorage.setItem('googleSheetUrl', e.target.value); }} placeholder="https://script.google.com/macros/s/..." className="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl focus:ring-4 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none transition-all font-mono text-xs text-slate-700 shadow-inner resize-none"></textarea>
                                        <p className="text-[11px] text-slate-400 mt-2 ml-1">Used to automatically log scanned packages into a Google Sheet.</p>
                                    </div>
                                    <div>
                                        <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2 ml-1">Backend Server URL (Node API)</label>
                                        <textarea rows="2" value={serverUrl} onChange={e => { setServerUrl(e.target.value); localStorage.setItem('serverUrl', e.target.value); }} placeholder="/api/save-label" className="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl focus:ring-4 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none transition-all font-mono text-xs text-slate-700 shadow-inner resize-none"></textarea>
                                    </div>
                                    <div className="pt-4 border-t border-slate-100">
                                        <button onClick={() => showNotification('Settings Saved to Browser Storage Successfully!')} className="w-full bg-slate-800 hover:bg-slate-900 text-white font-bold py-4 px-4 rounded-xl transition-transform transform hover:-translate-y-0.5 shadow-lg flex justify-center items-center gap-2">
                                            <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fillRule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clipRule="evenodd" /></svg>
                                            Save & Test Connection
                                        </button>
                                    </div>

                                    {/* DATA BACKUP & RESTORE */}
                                    <div className="pt-6 border-t border-slate-100">
                                        <h3 className="text-lg font-extrabold text-slate-800 mb-4">Data Backup & Restore</h3>
                                        <p className="text-sm text-slate-500 mb-4">Export your data from your previous app and import it here to restore all your bills and expenses.</p>
                                        <div className="flex gap-4">
                                            <button onClick={exportData} className="flex-1 bg-indigo-100 hover:bg-indigo-200 text-indigo-700 font-bold py-3 px-4 rounded-xl transition-colors">
                                                📥 Export Backup
                                            </button>
                                            <div className="flex-1 relative">
                                                <input type="file" accept=".json" onChange={importData} className="absolute inset-0 w-full h-full opacity-0 cursor-pointer" />
                                                <button className="w-full bg-emerald-100 hover:bg-emerald-200 text-emerald-700 font-bold py-3 px-4 rounded-xl transition-colors pointer-events-none">
                                                    📤 Import Backup
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                    
                                </div>
                            </div>
                        )}
                    </main>

                    <footer className="w-full text-center py-4 text-slate-400 text-xs font-bold uppercase tracking-widest no-print border-t border-slate-200 mt-auto bg-slate-50">
                        Powered by Shariff Enterprises
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
