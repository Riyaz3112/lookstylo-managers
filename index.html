    <style>
        body { background-color: #f8fafc; font-family: 'Outfit', sans-serif; }
        
        .a5-container {
            width: 148mm; height: 210mm; background: white;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            margin: 0 auto; padding: 8mm; box-sizing: border-box;
            position: relative; display: flex; flex-direction: column;
            color: black; overflow: hidden; border-radius: 8px;
            border: 1px solid #e2e8f0;
        }

        .paid-seal {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%) rotate(-15deg);

            font-size: 60px; font-weight: 900; padding: 10px 30px;
            border-radius: 15px; opacity: 0.15; pointer-events: none;
            text-transform: uppercase; letter-spacing: 5px; z-index: 50;

            .print\:flex { display: flex !important; }
            .paid-seal { opacity: 0.2 !important; border-width: 4px !important; }
        }
        
        .text-brand-red { color: #d32f2f; }
        .text-brand-blue { color: #1976d2; }
        input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }

        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
        
        @keyframes blob {
            0% { transform: translate(0px, 0px) scale(1); }
            33% { transform: translate(30px, -50px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
            100% { transform: translate(0px, 0px) scale(1); }

        .animate-blob { animation: blob 7s infinite; }
        .animation-delay-2000 { animation-delay: 2s; }
        .animation-delay-4000 { animation-delay: 4s; }
        
        /* Modern Select Arrow override */
        select { -webkit-appearance: none; -moz-appearance: none; appearance: none; background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%2364748b' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e"); background-repeat: no-repeat; background-position: right 1rem center; background-size: 1em; padding-right: 2.5rem !important; }

<body class="text-slate-800 antialiased selection:bg-indigo-200 selection:text-indigo-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const generateSafeId = () => {
            if (typeof crypto !== 'undefined' && crypto.randomUUID) return crypto.randomUUID();
            return 'id-' + Math.random().toString(36).substr(2, 9) + '-' + Date.now();
        };

        const compressImage = (file, maxWidth = 800, quality = 0.7) => {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let width = img.width;
                        let height = img.height;
                        
                        if (width > maxWidth) {
                            height = Math.round(height * maxWidth / width);
                            width = maxWidth;
                        }
                        
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        resolve(canvas.toDataURL('image/jpeg', quality));
                    };
                    img.onerror = () => resolve(event.target.result); 
                };
            });
        };

        const setupPWA = () => {
            const iconSvg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%234f46e5"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>`;
            const manifestJSON = { "name": "LOOKSTYLO FASHION", "short_name": "Lookstylo", "start_url": window.location.href, "display": "standalone", "background_color": "#f8fafc", "theme_color": "#0f172a", "icons": [ { "src": "data:image/svg+xml;charset=utf-8," + encodeURIComponent(iconSvg), "sizes": "192x192", "type": "image/svg+xml", "purpose": "any maskable" }, { "src": "data:image/svg+xml;charset=utf-8," + encodeURIComponent(iconSvg), "sizes": "512x512", "type": "image/svg+xml", "purpose": "any maskable" } ] };
            const blob = new Blob([JSON.stringify(manifestJSON)], {type: 'application/json'});
            document.getElementById('dynamic-manifest').setAttribute('href', URL.createObjectURL(blob));
        };
        setupPWA();

        // --- Professional SVG Icons ---
        const StoreLogo = ({ className = "w-5 h-5" }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path><line x1="3" y1="6" x2="21" y2="6"></line><path d="M16 10a4 4 0 0 1-8 0"></path></svg>;
        const InstagramIcon = ({ className = "w-5 h-5" }) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line></svg>;
        const WhatsAppIcon = ({ className = "w-5 h-5" }) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>;
        const Icons = {
            Package: ({ className="w-5 h-5" }) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="16.5" y1="9.4" x2="7.5" y2="4.21"></line><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg>,
            Camera: ({ className="w-5 h-5" }) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg>,
            Plus: ({ className="w-5 h-5" }) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>,
            Download: ({ className="w-5 h-5" }) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>,
            Upload: ({ className="w-5 h-5" }) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>,
            Print: ({ className="w-5 h-5" }) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 6 2 18 2 18 9"></polyline><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path><rect x="6" y="14" width="12" height="8"></rect></svg>,
            Save: ({ className="w-5 h-5" }) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>,
            Refresh: ({ className="w-5 h-5" }) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>,
            Cog: ({ className="w-5 h-5" }) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>,
            CheckCircle: ({ className="w-5 h-5" }) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>,
            Clock: ({ className="w-5 h-5" }) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>,
            Chart: ({ className="w-5 h-5" }) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></svg>,
            CreditCard: ({ className="w-5 h-5" }) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="1" y="4" width="22" height="16" rx="2" ry="2"></rect><line x1="1" y1="10" x2="23" y2="10"></line></svg>,
            Bank: ({ className="w-5 h-5" }) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="10" width="18" height="10" rx="2" ry="2"></rect><path d="M3 10l9-6 9 6"></path><path d="M8 20v-4"></path><path d="M12 20v-4"></path><path d="M16 20v-4"></path></svg>,
            Cash: ({ className="w-5 h-5" }) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="6" width="20" height="12" rx="2"></rect><circle cx="12" cy="12" r="2"></circle><path d="M6 12h.01M18 12h.01"></path></svg>,
            Users: ({ className="w-5 h-5" }) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>,
            Truck: ({ className="w-5 h-5" }) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="1" y="3" width="15" height="13"></rect><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"></polygon><circle cx="5.5" cy="18.5" r="2.5"></circle><circle cx="18.5" cy="18.5" r="2.5"></circle></svg>
        };

        const Barcode = ({ value }) => {
            const ref = useRef(null);
            useEffect(() => { if (ref.current && value) JsBarcode(ref.current, value, { format: "CODE128", displayValue: true, fontSize: 20, fontOptions: "bold", textMargin: 5, height: 60, margin: 0 }); }, [value]);
            return <canvas ref={ref}></canvas>;
        };

        const QRCodeRender = ({ data, size = 120 }) => {
            const ref = useRef(null);
            useEffect(() => { if (ref.current && data) { ref.current.innerHTML = ""; new QRCode(ref.current, { text: data, width: size, height: size, colorDark: "#000000", colorLight: "#ffffff", correctLevel: QRCode.CorrectLevel.M }); } }, [data, size]);
            return <div ref={ref} className="border border-gray-200 p-1 bg-white inline-block"></div>;
        };

        const TabButton = ({ id, label, activeTab, setActiveTab }) => (
            <button 
                onClick={() => setActiveTab(id)} 
                className={`px-5 py-2.5 rounded-full font-semibold text-sm transition-all duration-300 whitespace-nowrap ${
                    activeTab === id 
                        ? 'bg-white text-indigo-900 shadow-md transform scale-105' 
                        : 'text-indigo-100 hover:bg-white/10 hover:text-white border border-transparent'
                }`}
            >
                {label}
            </button>
        );

        const ModernInput = ({ label, ...props }) => (
            <div className="flex flex-col">
                <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1.5 ml-1">{label}</label>
                <input 
                    {...props} 
                    onWheel={(e) => e.target.type === 'number' && e.target.blur()} 
                    className={`w-full px-4 py-3 bg-white border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none transition-all text-sm font-medium text-slate-800 shadow-sm placeholder-slate-400 ${props.className || ''}`} 
                />
            </div>
        );

        const LabelContent = ({ orderId, toName, toAddress, toPhone, billName, billAddress, billPhone, copyLabel, logoUrl }) => (
            <div className="border-2 border-gray-900 flex-grow flex flex-col text-black bg-white box-border w-full h-full p-4 relative">
                {copyLabel && <div className="absolute top-0 right-0 bg-indigo-600 text-white text-[9px] px-2 py-0.5 font-bold uppercase z-10">{copyLabel}</div>}
                <div className="flex items-center justify-between border-b-2 border-gray-900 pb-4 mb-4">
                    <div className="w-1/4 flex flex-col items-start justify-center">
                        {logoUrl ? <img src={logoUrl} alt="Logo" className="w-24 object-contain" /> : <StoreLogo className="w-16 h-16 text-gray-900" />}
                    </div>
                    <div className="text-center flex-1 px-2">
                        {!logoUrl && <div className="text-brand-red font-extrabold text-3xl tracking-wide uppercase">LOOKSTYLO FASHION</div>}
                        <div className="text-brand-blue font-bold text-xl tracking-wider uppercase mt-1">SHARIEF ENTERPRISES</div>
                    </div>
                    <div className="w-1/4 flex justify-end">
                        <QRCodeRender data={JSON.stringify({ id: orderId, name: toName, phone: toPhone })} size={120} />
                    </div>
                </div>

                <div className="flex-grow flex flex-col">
                    <div className="mb-6">
                        <h3 className="font-extrabold text-2xl uppercase mb-1">FROM:</h3>
                        <div className="font-bold text-lg leading-snug uppercase">LOOKSTYLO FASHION,<br/>SHOP NO 02, OPPOSITE POST OFFICE<br/>PAKKIRITHAKA JOLARPATTAI - 635851.<br/>📞 8680857511</div>
                    </div>
                    
                    <div className="mb-4">
                        <h3 className="font-extrabold text-2xl uppercase mb-1">TO,</h3>
                        <div className="font-bold text-lg leading-snug uppercase">
                            {toName || ' '}<br/>
                            {toAddress ? toAddress.split('\n').map((line, i) => <React.Fragment key={i}>{line}<br/></React.Fragment>) : ' '}<br/>
                            {toPhone ? `📞 ${toPhone}` : ' '}
                        </div>
                    </div>

                    {(billName || billAddress || billPhone) && (
                        <div className="mb-4 pt-4 border-t border-dashed border-gray-400">
                            <h3 className="font-extrabold text-xl uppercase mb-1">BILL TO,</h3>
                            <div className="font-bold text-md leading-snug uppercase text-gray-700">
                                {billName || ' '}<br/>{billAddress ? billAddress.split('\n').map((line, i) => <React.Fragment key={i}>{line}<br/></React.Fragment>) : ' '}<br/>{billPhone || ' '}
                            </div>
                        </div>
                    )}
                </div>

                <div className="mt-0.5 mb-1 border-2 border-gray-900 flex flex-col justify-center items-center bg-gray-100 shrink-0 py-0.5">
                    <span className="font-black text-[12px] uppercase tracking-widest text-gray-900 leading-tight">Pre-Paid Package</span>
                    <span className="font-bold text-[8px] uppercase text-gray-800 tracking-wider leading-tight">Do Not Collect Cash On Delivery</span>
                </div>

                    <div className="mb-4 bg-white p-2 rounded"><Barcode value={orderId || '0000'} /></div>

                        <div className="flex items-center gap-1.5"><InstagramIcon className="w-6 h-6" /> LOKSTLYO_FASHION</div>
                        <div className="flex items-center gap-1.5"><WhatsAppIcon className="w-6 h-6" /> 8680857511</div>
                    </div>
                </div>
            </div>
        );

        function App() {
            // ✨ LOGIN STATE
            const [isAppLocked, setIsAppLocked] = useState(true);
            const [loginId, setLoginId] = useState('');
            const [loginPass, setLoginPass] = useState('');
            const [authError, setAuthError] = useState('');
            
            const appAuth = JSON.parse(localStorage.getItem('lookstylo_auth') || '{"id":"admin", "pass":"admin123"}');
            const [newAuthId, setNewAuthId] = useState(appAuth.id);
            const [newAuthPass, setNewAuthPass] = useState(appAuth.pass);

            const handleLogin = (e) => {
                e.preventDefault();
                if (loginId === appAuth.id && loginPass === appAuth.pass) {
                    setIsAppLocked(false);
                    setAuthError('');
                } else {
                    setAuthError('Invalid User ID or Password');
                }
            };

            const updateAuth = () => {
                if(!newAuthId.trim() || !newAuthPass.trim()) return showNotification("Fields cannot be empty");
                localStorage.setItem('lookstylo_auth', JSON.stringify({ id: newAuthId, pass: newAuthPass }));
                showNotification("Lock Credentials Updated successfully!");
            };

            const [activeTab, setActiveTab] = useState('billing'); 
            const [sheetUrl, setSheetUrl] = useState(localStorage.getItem('googleSheetUrl') || '');
            const [serverUrl, setServerUrl] = useState(localStorage.getItem('serverUrl') || '/api/save-label');
            const [logoUrl, setLogoUrl] = useState(localStorage.getItem('logoUrl') || ''); 
            // Default to WA Business for robust messaging
            const [waPreference, setWaPreference] = useState(localStorage.getItem('waPreference') || 'w4b_force');
            const [notification, setNotification] = useState(null); 
            const [showGpayModal, setShowGpayModal] = useState(false);
            const [deliveryActionBill, setDeliveryActionBill] = useState(null);
            const isEditingRef = useRef(false);

            const showNotification = (msg) => {
                setNotification(msg);
                setTimeout(() => setNotification(null), 3000);
            };

            // Unified WhatsApp Opener specifically enforcing Business App if configured
            const openWhatsAppMsg = (phone, msg) => {
                const encodedMsg = encodeURIComponent(msg);
                
                if (waPreference === 'w4b_force' || waPreference === 'w4b_android') {
                    const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
                    
                    if (isIOS) {
                        // iOS custom scheme for WhatsApp Business
                        window.location.href = `whatsapp-smb://send?phone=${phone}&text=${encodedMsg}`;
                    } else {
                        // Android Intent for WhatsApp Business
                        window.location.href = `intent://send?phone=${phone}&text=${encodedMsg}#Intent;package=com.whatsapp.w4b;scheme=whatsapp;end;`;
                    }
                    
                    // Fallback in case they don't have WA Business installed
                    setTimeout(() => {
                        window.open(`https://wa.me/${phone}?text=${encodedMsg}`, '_blank');
                    }, 2500);
                } else {
                    // Standard WhatsApp Web/App fallback
                    window.open(`https://wa.me/${phone}?text=${encodedMsg}`, '_blank');
                }
            };

            const [installPrompt, setInstallPrompt] = useState(null);
            useEffect(() => {
                const handleBeforeInstallPrompt = (e) => { e.preventDefault(); setInstallPrompt(e); };
                window.addEventListener('beforeinstallprompt', handleBeforeInstallPrompt);
                return () => window.removeEventListener('beforeinstallprompt', handleBeforeInstallPrompt);
            }, []);

            const handleInstallApp = async () => {
                if (!installPrompt) return;
                installPrompt.prompt();
                const { outcome } = await installPrompt.userChoice;
                if (outcome === 'accepted') {
                    setInstallPrompt(null);
                    showNotification("App installed successfully! Check your home screen.");
                }
            };

            // ✨ BACKUP & RESTORE DATA EXPORT/IMPORT
            const exportData = () => {
                const backupData = {
                    savedBills: localStorage.getItem('savedBills'),
                    inventory: localStorage.getItem('lookstylo_inv_v2') || localStorage.getItem('inventory'),
                    shopExpenses: localStorage.getItem('shopExpenses'),
                    customers: localStorage.getItem('customers'),
                    invoiceCounters: localStorage.getItem('invoiceCounters'),
                    savedScans: localStorage.getItem('savedScans'),
                    logoUrl: localStorage.getItem('logoUrl'),
                    invCategories: localStorage.getItem('lookstylo_categories'),
                    auth: localStorage.getItem('lookstylo_auth')
                };
                const blob = new Blob([JSON.stringify(backupData)], { type: "application/json" });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `Lookstylo_Backup_${new Date().toISOString().split('T')[0]}.json`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                showNotification("Backup Exported Successfully!");
            };

            const importData = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const data = JSON.parse(event.target.result);
                        if(data.savedBills) localStorage.setItem('savedBills', data.savedBills);
                        if(data.inventory) {
                            try {
                                const parsedInv = JSON.parse(data.inventory);
                                if (!Array.isArray(parsedInv)) {
                                    localStorage.setItem('inventory', data.inventory);
                                } else {
                                    localStorage.setItem('lookstylo_inv_v2', data.inventory);
                                }
                            } catch(e) {}
                        }
                        if(data.shopExpenses) localStorage.setItem('shopExpenses', data.shopExpenses);
                        if(data.customers) localStorage.setItem('customers', data.customers);
                        if(data.invoiceCounters) localStorage.setItem('invoiceCounters', data.invoiceCounters);
                        if(data.savedScans) localStorage.setItem('savedScans', data.savedScans);
                        if(data.logoUrl) localStorage.setItem('logoUrl', data.logoUrl);
                        if(data.invCategories) localStorage.setItem('lookstylo_categories', data.invCategories);
                        if(data.auth) localStorage.setItem('lookstylo_auth', data.auth);
                        
                        alert("Data imported successfully! The app will now reload to apply your data.");
                        window.location.reload();
                    } catch(err) {
                        alert("Invalid backup file! Please select a valid JSON backup.");
                    }
                };
                reader.readAsText(file);
            };

            const [customers, setCustomers] = useState(() => JSON.parse(localStorage.getItem('customers') || '{}'));

            const DEFAULT_CATEGORIES = ['T-Shirts', 'Shirts', 'Jeans', 'Trousers', 'Jackets/Hoodies', 'Trackpants', 'Accessories', 'General'];
            const [invCategories, setInvCategories] = useState(() => {
                try {
                    const saved = localStorage.getItem('lookstylo_categories');
                    if (saved) return JSON.parse(saved);
                } catch(e) {}
                return DEFAULT_CATEGORIES;
            });
            
            const [inventory, setInventory] = useState(() => {
                try {
                    const storedV2 = localStorage.getItem('lookstylo_inv_v2');
                    if (storedV2) return JSON.parse(storedV2);
                    
                    const oldStored = JSON.parse(localStorage.getItem('inventory') || '{}');
                    if (oldStored && !Array.isArray(oldStored)) {
                        const migrated = Object.entries(oldStored).map(([key, val]) => ({
                            id: generateSafeId(),
                            name: key.toUpperCase(),
                            category: 'General',
                            sku: val.styleCode || Math.floor(100000 + Math.random() * 900000).toString(),
                            price: val.price || 0,
                            purchasePrice: 0,
                            stock: 10,
                            hsn: val.hsn || '',
                            gst: val.gst || 0,
                            image: ''
                        }));
                        localStorage.setItem('lookstylo_inv_v2', JSON.stringify(migrated));
                        return migrated;
                    }
                } catch(e) { console.error(e); }
                return [];
            });

            const [isInvModalOpen, setIsInvModalOpen] = useState(false);
            const [invSearch, setInvSearch] = useState('');
            const [invCategoryFilter, setInvCategoryFilter] = useState('All');
            const [invFormData, setInvFormData] = useState({ id: '', name: '', category: 'General', sku: '', price: '', purchasePrice: '', stock: '', hsn: '', gst: 0, image: '' });

            const handleAddCategory = () => {
                const newCat = window.prompt("Enter new category name:");
                if (newCat && newCat.trim()) {
                    const catName = newCat.trim();
                    if (!invCategories.includes(catName)) {
                        const updated = [...invCategories, catName];
                        setInvCategories(updated);
                        localStorage.setItem('lookstylo_categories', JSON.stringify(updated));
                        setInvFormData(prev => ({ ...prev, category: catName }));
                        showNotification(`Category "${catName}" added!`);
                    } else {
                        setInvFormData(prev => ({ ...prev, category: catName }));
                    }
                }
            };

            const openInvModal = (item = null) => {
                if (item) {
                    setInvFormData({ ...item });
                } else {
                    setInvFormData({ id: '', name: '', category: invCategories[0] || 'General', sku: Math.floor(100000 + Math.random() * 900000).toString(), price: '', purchasePrice: '', stock: 0, hsn: '', gst: 0, image: '' });
                }
                setIsInvModalOpen(true);
            };

            const handleInvImageUpload = async (e) => {
                const file = e.target.files[0];
                if (file) {
                    const compressedImg = await compressImage(file, 600, 0.7);
                    setInvFormData({ ...invFormData, image: compressedImg });
                }
            };

            const saveInventoryItem = () => {
                if (!invFormData.name.trim() || !invFormData.price) return showNotification("Please provide Name and Selling Price.");
                
                const updatedItem = {
                    ...invFormData,
                    name: invFormData.name.trim().toUpperCase(),
                    sku: invFormData.sku.trim() || Math.floor(100000 + Math.random() * 900000).toString(),
                    price: Number(invFormData.price) || 0,
                    purchasePrice: Number(invFormData.purchasePrice) || 0,
                    stock: Number(invFormData.stock) || 0,
                    gst: Number(invFormData.gst) || 0,
                    id: invFormData.id || generateSafeId()
                };

                let newList;
                if (invFormData.id) {
                    newList = inventory.map(i => i.id === updatedItem.id ? updatedItem : i);
                } else {
                    newList = [updatedItem, ...inventory];
                }

                try {
                    localStorage.setItem('lookstylo_inv_v2', JSON.stringify(newList));
                    setInventory(newList);
                    setIsInvModalOpen(false);
                    showNotification(invFormData.id ? "Item Updated Successfully!" : "New Item Added to Inventory!");
                } catch (e) {
                    showNotification("⚠️ Storage Full! Clear some old images or data to add more.");
                }
            };

            const deleteInventoryItem = (id, name) => {
                if(window.confirm(`Are you sure you want to delete ${name} from inventory?`)) {
                    const newList = inventory.filter(i => i.id !== id);
                    setInventory(newList);
                    localStorage.setItem('lookstylo_inv_v2', JSON.stringify(newList));
                    showNotification("Item deleted.");
                }
            };

            const filteredInventory = inventory.filter(item => {
                const matchesSearch = item.name.includes(invSearch.toUpperCase()) || item.sku.includes(invSearch);
                const matchesCat = invCategoryFilter === 'All' || item.category === invCategoryFilter;
                return matchesSearch && matchesCat;
            });


            const todayStr = new Date().toISOString().split('T')[0];
            const [expenses, setExpenses] = useState(() => JSON.parse(localStorage.getItem('shopExpenses') || '[]'));
            const [expDate, setExpDate] = useState(todayStr);
            const [expDesc, setExpDesc] = useState('');
            const [expAmount, setExpAmount] = useState('');
            const [expMode, setExpMode] = useState('Cash');

            const handleAddExpense = () => {
                if (!expDesc.trim() || !expAmount) return showNotification("Please enter description and amount.");
                const newExp = { id: generateSafeId(), date: expDate, description: expDesc.trim(), amount: Number(expAmount), mode: expMode };
                const updated = [newExp, ...expenses];
                setExpenses(updated);
                localStorage.setItem('shopExpenses', JSON.stringify(updated));
                setExpDesc(''); setExpAmount('');
                showNotification(`${expMode} Expense recorded!`);
            };

            const handleDeleteExpense = (id) => {
                if (window.confirm("Delete this expense record?")) {
                    const updated = expenses.filter(e => e.id !== id);
                    setExpenses(updated);
                    localStorage.setItem('shopExpenses', JSON.stringify(updated));
                    showNotification("Expense deleted.");
                }
            };

            const [savedBills, setSavedBills] = useState(() => {
                const existing = JSON.parse(localStorage.getItem('savedBills') || 'null');
                if (existing && existing.length > 0) return existing;
                const initialBills = [];
                for (let i = 1; i <= 19; i++) {
                    initialBills.push({
                        id: `LSF-APR-${String(i).padStart(3, '0')}`, date: '2026-04-01', type: 'Non-GST',
                        customer: 'Pending Edit', phone: '', address: '', delivery: 'Store Walk-in',
                        courier: 'Professional Courier', tracking: '', discount: 0, promoCode: 'NO CODE',
                        items: [{ id: generateSafeId(), particular: 'PENDING BILL UPDATE', hsn: '', gst: 0, qty: 1, rate: 0 }],
                        total: 0, cash: 0, gpay: 0, advance: 0, balance: 0, description: ''
                    });
                }
                localStorage.setItem('savedBills', JSON.stringify(initialBills));
                const counters = JSON.parse(localStorage.getItem('invoiceCounters') || '{}');
                counters['APR-2026'] = 20; localStorage.setItem('invoiceCounters', JSON.stringify(counters));
                return initialBills;
            });

            const getNextInvoiceId = (dateStr) => {
                const d = new Date(dateStr || new Date());
                if (isNaN(d.getTime())) return '';
                const month = d.toLocaleString('en-US', { month: 'short' }).toUpperCase();
                const year = d.getFullYear();
                const key = `${month}-${year}`;
                const counters = JSON.parse(localStorage.getItem('invoiceCounters') || '{}');
                const currentSeq = counters[key] || 1;
                return `LSF-${month}-${String(currentSeq).padStart(3, '0')}`;
            };

            const lDraft = JSON.parse(localStorage.getItem('labelDraft') || '{}');
            const bDraft = JSON.parse(localStorage.getItem('billingDraft') || '{}');

            const [orderId, setOrderId] = useState(lDraft.orderId || getNextInvoiceId(todayStr));
            const [toName, setToName] = useState(lDraft.toName || '');
            const [toAddress, setToAddress] = useState(lDraft.toAddress || '');
            const [toPhone, setToPhone] = useState(lDraft.toPhone || '');
            const [billName, setBillName] = useState(lDraft.billName || '');
            const [billAddress, setBillAddress] = useState(lDraft.billAddress || '');
            const [billPhone, setBillPhone] = useState(lDraft.billPhone || '');

            const [billDate, setBillDate] = useState(bDraft.billDate || todayStr);
            const [billInvoice, setBillInvoice] = useState(bDraft.billInvoice || getNextInvoiceId(bDraft.billDate || todayStr));
            const [billType, setBillType] = useState(bDraft.billType || 'Non-GST'); 
            const [billCustomerName, setBillCustomerName] = useState(bDraft.billCustomerName || '');
            const [billCustomerPhone, setBillCustomerPhone] = useState(bDraft.billCustomerPhone || '');
            const [billCustomerAddress, setBillCustomerAddress] = useState(bDraft.billCustomerAddress || '');
            const [billDelivery, setBillDelivery] = useState(bDraft.billDelivery || 'Store Walk-in');
            const [billCourier, setBillCourier] = useState(bDraft.billCourier || 'Professional Courier');
            const [billTracking, setBillTracking] = useState(bDraft.billTracking || '');
            const [billDiscount, setBillDiscount] = useState(bDraft.billDiscount || 0);
            const [billPromoCode, setBillPromoCode] = useState(bDraft.billPromoCode || 'NO CODE');
            const [billItems, setBillItems] = useState(bDraft.billItems || [{ id: generateSafeId(), particular: '', hsn: '', gst: 0, qty: 1, rate: 0 }]);
            
            const [paidGpay, setPaidGpay] = useState(bDraft.paidGpay || 0);
            const [paidCash, setPaidCash] = useState(bDraft.paidCash || 0);
            const [advancePayment, setAdvancePayment] = useState(bDraft.advancePayment || 0);
            const [billDescription, setBillDescription] = useState(bDraft.billDescription || '');

            const [paymentModal, setPaymentModal] = useState(null);
            const [editCash, setEditCash] = useState(0);
            const [editGpay, setEditGpay] = useState(0);
            const [editAdvance, setEditAdvance] = useState(0);

            const openPaymentModal = (bill) => {
                setPaymentModal(bill); setEditCash(bill.cash || 0); setEditGpay(bill.gpay || 0); setEditAdvance(bill.advance || 0);
            };

            const subTotal = billItems.reduce((acc, item) => acc + ((item.qty || 0) * (item.rate || 0)), 0);
            const discountAmount = subTotal * ((Number(billDiscount) || 0) / 100);
            const totalAfterDiscount = subTotal - discountAmount;
            
            const totalIncludedGstAmount = billItems.reduce((acc, item) => {
                const itemTotal = ((item.qty || 0) * (item.rate || 0));
                const itemTotalAfterItemDiscount = itemTotal * (1 - ((Number(billDiscount) || 0) / 100));
                const gstRate = Number(item.gst) || 0;
                const gstAmount = itemTotalAfterItemDiscount - (itemTotalAfterItemDiscount / (1 + (gstRate / 100)));
                return acc + gstAmount;
            }, 0);

            const grandTotal = Math.round(totalAfterDiscount);
            const roundOffAmount = grandTotal - totalAfterDiscount;
            const totalQty = billItems.reduce((acc, item) => acc + Number(item.qty || 0), 0);
            const balanceAmount = grandTotal - (Number(paidGpay) || 0) - (Number(paidCash) || 0) - (Number(advancePayment) || 0);

            const formatPhoneForWa = (phone) => {
                if (!phone) return null;
                const cleaned = phone.replace(/\D/g, '');
                return cleaned.length === 10 ? `91${cleaned}` : cleaned;
            };

            // Unified Delivery Action Handler
            const handleDeliveryAction = (order, actionType) => {
                const phone = formatPhoneForWa(order.phone);
                if (!phone) {
                    showNotification("Order saved but no valid phone number for WhatsApp.");
                    if (activeTab === 'scanner') setScanResult(null);
                    setDeliveryActionBill(null);
                    return;
                }

                let msg = '';
                if (actionType === 'dispatch_today') {
                    msg = `*LOOKSTYLO FASHION*\n\nDear ${order.customer || order.name || 'Customer'},\nGreat news! 🎉 Your order (${order.id}) is scheduled to be dispatched today.\nWe will share the tracking details with you shortly.\n\nThank you for shopping with us!`;
                    if (activeTab === 'scanner') setAwaitingTrackingFor(order);
                } else if (actionType === 'dispatch_tomorrow') {
                    msg = `*LOOKSTYLO FASHION*\n\nDear ${order.customer || order.name || 'Customer'},\nSorry for the delay! 🙏 Your order (${order.id}) will be dispatched tomorrow. We appreciate your patience.\n\nThank you for shopping with us!`;
                } else if (actionType === 'out_for_delivery') {
                    msg = `*LOOKSTYLO FASHION*\n\nDear ${order.customer || order.name || 'Customer'},\nGood news! 🛵 Your order (${order.id}) is OUT FOR DELIVERY today.\nOur delivery executive will contact you shortly to hand over your package.\n\nThank you for shopping with us!`;
                }

                if (activeTab === 'scanner') setScanResult(null);
                setDeliveryActionBill(null);
                openWhatsAppMsg(phone, msg);
            };

            const handleScannedTracking = (order, trackingId) => {
                setSavedScans(prev => {
                    const updated = prev.map(s => s.id === order.id ? { ...s, trackingId } : s);
                    localStorage.setItem('savedScans', JSON.stringify(updated));
                    return updated;
                });
                setAwaitingTrackingFor(null);

                const phone = formatPhoneForWa(order.phone);
                if (!phone) { 
                    showNotification("Tracking Saved! (No phone to send WhatsApp)"); 
                    return; 
                }

                const msg = `*LOOKSTYLO FASHION*\n\nDear ${order.name || 'Customer'},\nYour order (${order.id}) has been successfully dispatched! 🚚\n\n*Tracking ID:* ${trackingId}\n\nYou can use this ID to track your package on the courier website.\n\nThank you for shopping with us!`;
                openWhatsAppMsg(phone, msg);
                showNotification("Tracking Saved & WhatsApp Sent!");
            };

            const shareBillWhatsApp = () => {
                const phone = formatPhoneForWa(billCustomerPhone);
                if (!phone) return showNotification("Please enter customer phone number.");
                const totalPaidAndAdvance = Number(paidCash) + Number(paidGpay) + Number(advancePayment);
                
                let msg = `Thank you for shopping with us 😀\n\n*Your e-Bill Summary:*\nInvoice: ${billInvoice}\nDate: ${billDate.split('-').reverse().join('-')}\nTotal Amount: ₹ ${grandTotal}\nPaid Amount: ₹ ${totalPaidAndAdvance}\nPending Balance: ₹ ${balanceAmount}\n\n`;
                
                if (balanceAmount > 0) {
                    const qrData = `upi://pay?pa=9360232991@okbizaxis&pn=LOOKSTYLO FASHION&am=${balanceAmount}&cu=INR`;
                    const qrLink = `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${encodeURIComponent(qrData)}`;
                    msg += `👇 *Click link to view Payment QR Code:*\n${qrLink}\n\n*Or use UPI ID:* 9360232991@okbizaxis\n\n`;
                }
                
                msg += `Based on your recent experience, how would you rate your experience at Lookstylo Fashion?\n⭐ Please rate us here: https://g.page/r/CYYvcLcuUkztECk/review`;
                
                openWhatsAppMsg(phone, msg);
            };

            const sendReminderWhatsApp = (bill) => {
                const phone = formatPhoneForWa(bill.phone);
                if (!phone) return showNotification("No phone number recorded for this bill.");
                const qrData = `upi://pay?pa=9360232991@okbizaxis&pn=LOOKSTYLO FASHION&am=${bill.balance}&cu=INR`;
                const qrLink = `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${encodeURIComponent(qrData)}`;
                const msg = `*LOOKSTYLO FASHION - Payment Reminder*\n\nDear ${bill.customer || 'Customer'},\nThis is a friendly reminder for your pending balance of *₹ ${bill.balance}* against Invoice ${bill.id}.\n\nPlease clear the dues at your earliest convenience.\n\n👇 *Click link to view Payment QR Code:*\n${qrLink}\n\n*Or use UPI ID:* 9360232991@okbizaxis\n\nThank you!`;
                openWhatsAppMsg(phone, msg);
            };

            const sendThankYouWhatsApp = (bill) => {
                const phone = formatPhoneForWa(bill.phone);
                if (!phone) return showNotification("No phone number recorded for this bill.");
                const msg = `*LOOKSTYLO FASHION*\n\nDear ${bill.customer || 'Customer'},\nThank you for clearing your pending dues for Invoice ${bill.id}. Your balance is now settled! 🎉\n\nThank you for shopping with us! We look forward to serving you again.`;
                openWhatsAppMsg(phone, msg);
            };

            const handleUpdatePayment = () => {
                let newlyCleared = false;
                let updatedBillDetails = null;

                setSavedBills(prev => {
                    const updated = prev.map(b => {
                        if (b.id === paymentModal.id) {
                            const newCash = Number(editCash) || 0;
                            const newGpay = Number(editGpay) || 0;
                            const newAdvance = Number(editAdvance) || 0;
                            const newBalance = b.total - newCash - newGpay - newAdvance;

                            if (b.balance > 0 && newBalance <= 0) {
                                newlyCleared = true;
                            }

                            const newBill = { ...b, cash: newCash, gpay: newGpay, advance: newAdvance, balance: newBalance };
                            updatedBillDetails = newBill;
                            return newBill;
                        }
                        return b;
                    });
                    localStorage.setItem('savedBills', JSON.stringify(updated));
                    return updated;
                });
                
                showNotification("Payment updated successfully!");
                setPaymentModal(null);

                if (newlyCleared && updatedBillDetails && updatedBillDetails.phone) {
                    setTimeout(() => {
                        if (window.confirm("Balance is now cleared! Do you want to send a Thank You WhatsApp message?")) {
                            sendThankYouWhatsApp(updatedBillDetails);
                        }
                    }, 500);
                }
            };

            const deleteBill = (id) => {
                if(window.confirm("Are you sure you want to delete this bill?")) {
                    setSavedBills(prev => {
                        const updated = prev.filter(b => b.id !== id);
                        localStorage.setItem('savedBills', JSON.stringify(updated));
                        return updated;
                    });
                    showNotification("Bill deleted successfully!");
                }
            };

            const handleEditBill = (billToEdit) => {
