<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lookstylo Fashion</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode/html5-qrcode.min.js" type="text/javascript"></script>

    <style>
        body { background-color: #f8fafc; font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        /* Strict A5 Container (Screen View) */
        .a5-container {
            width: 148mm;
            height: 210mm;
            background: white;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            margin: 0 auto;
            padding: 8mm;
            box-sizing: border-box;
            position: relative;
            display: flex;
            flex-direction: column;
            color: black;
            overflow: hidden;
            border-radius: 4px;
        }

        /* Strict Print Settings for A5 */
        @media print {
            @page { 
                size: 148mm 210mm; /* Exact A5 Dimensions */
                margin: 0; 
            }
            body, html { 
                background: white !important; 
                margin: 0 !important; 
                padding: 0 !important; 
                height: auto !important;
                min-height: auto !important;
                -webkit-print-color-adjust: exact; 
                print-color-adjust: exact; 
            }
            .no-print { display: none !important; }

            /* Disable flex/padding/overflow on wrappers during print */
            #root, .min-h-screen, main {
                display: block !important;
                padding: 0 !important;
                margin: 0 !important;
                max-width: none !important;
                height: auto !important;
                min-height: 0 !important;
                overflow: visible !important;
            }
            
            .print-section { 
                position: static !important; 
                width: 100% !important; 
                margin: 0 !important; 
                padding: 0 !important; 
                display: block !important; 
                background: white !important;
                box-shadow: none !important;
                border: none !important;
                overflow: visible !important;
            }
            
            .a5-container {
                width: 148mm !important;
                height: 209mm !important; /* Shave 1mm to prevent overflow blank page */
                box-sizing: border-box !important;
                box-shadow: none !important; 
                border: none !important;
                margin: 0 !important; 
                padding: 8mm !important; /* Safe printable margin */
                page-break-after: always; 
                break-after: page;
                page-break-inside: avoid;
                transform: none !important;
                overflow: hidden !important;
                border-radius: 0 !important;
                display: flex !important;
            }

            .a5-container:last-of-type,
            .print-section > div:last-child {
                page-break-after: auto !important; /* Prevent blank page at the end */
                break-after: auto !important;
            }

            .print\:flex { display: flex !important; }
        }
        
        .text-brand-red { color: #d32f2f; }
        .text-brand-blue { color: #1976d2; }

        /* Remove number input spinners */
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }
        input[type=number] {
            -moz-appearance: textfield;
        }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="text-slate-800 antialiased selection:bg-indigo-200 selection:text-indigo-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- ICON COMPONENTS ---
        const InstagramIcon = ({ className = "w-5 h-5" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect>
                <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path>
                <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line>
            </svg>
        );

        const WhatsAppIcon = ({ className = "w-5 h-5" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path>
            </svg>
        );

        // --- REUSABLE BARCODE & QR COMPONENTS ---
        const Barcode = ({ value }) => {
            const ref = useRef(null);
            useEffect(() => {
                if (ref.current && value) {
                    JsBarcode(ref.current, value, { format: "CODE128", displayValue: true, fontSize: 20, fontOptions: "bold", textMargin: 5, height: 60, margin: 0 });
                }
            }, [value]);
            return <canvas ref={ref}></canvas>;
        };

        const QRCodeRender = ({ data }) => {
            const ref = useRef(null);
            useEffect(() => {
                if (ref.current && data) {
                    ref.current.innerHTML = "";
                    new QRCode(ref.current, { text: data, width: 120, height: 120, colorDark: "#000000", colorLight: "#ffffff", correctLevel: QRCode.CorrectLevel.M });
                }
            }, [data]);
            return <div ref={ref} className="border border-gray-200 p-1 bg-white"></div>;
        };

        // Enhanced Tab Button Component
        const TabButton = ({ id, label, activeTab, setActiveTab }) => (
            <button 
                onClick={() => setActiveTab(id)} 
                className={`px-5 py-2.5 rounded-xl font-bold text-sm flex items-center gap-2 transition-all duration-300 ${activeTab === id ? 'bg-white text-indigo-900 shadow-md transform scale-105' : 'bg-white/10 hover:bg-white/20 text-white border border-transparent hover:border-white/10'}`}
            >
                {label}
            </button>
        );

        // Reusable Input Component
        const ModernInput = ({ label, ...props }) => (
            <div>
                <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1.5 ml-1">{label}</label>
                <input {...props} className={`w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-4 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none transition-all text-sm font-medium text-slate-800 shadow-sm ${props.className || ''}`} />
            </div>
        );

        // --- REUSABLE LABEL COMPONENT ---
        const LabelContent = ({ orderId, toName, toAddress, toPhone, billName, billAddress, billPhone, copyLabel }) => (
            <div className="border-2 border-gray-900 flex-grow flex flex-col text-black bg-white box-border w-full h-full p-4 relative">
                {copyLabel && (
                    <div className="absolute top-0 right-0 bg-indigo-600 text-white text-[9px] px-2 py-0.5 font-bold uppercase z-10">
                        {copyLabel}
                    </div>
                )}
                {/* Header */}
                <div className="flex items-center justify-between border-b-2 border-gray-900 pb-4 mb-4">
                    <div className="w-1/4 flex flex-col items-start"></div>
                    <div className="text-center flex-1 px-2">
                        <div className="text-brand-red font-extrabold text-3xl tracking-wide uppercase">LOOKSTYLO FASHION</div>
                        <div className="text-brand-blue font-bold text-xl tracking-wider uppercase mt-1">SHARIEF ENTERPRISES</div>
                    </div>
                    <div className="w-1/4 flex justify-end">
                        <QRCodeRender data={JSON.stringify({ id: orderId, name: toName, phone: toPhone })} />
                    </div>
                </div>

                {/* Body Content */}
                <div className="flex-grow flex flex-col">
                    <div className="mb-6">
                        <h3 className="font-extrabold text-2xl uppercase mb-1">FROM:</h3>
                        <div className="font-bold text-lg leading-snug uppercase">
                            LOOKSTYLO FASHION,<br/>SHOP NO 02, OPPOSITE POST OFFICE<br/>PAKKIRITHAKA JOLARPATTAI - 635851.<br/>📞 8680857511
                        </div>
                    </div>
                    
                    <div className="mb-4">
                        <h3 className="font-extrabold text-2xl uppercase mb-1">TO,</h3>
                        <div className="font-bold text-lg leading-snug uppercase">
                            {toName || ' '}<br/>
                            {toAddress ? toAddress.split('\n').map((line, i) => <React.Fragment key={i}>{line}<br/></React.Fragment>) : ' '}<br/>
                            {toPhone ? `📞 ${toPhone}` : ' '}
                        </div>
                    </div>

                    {(billName || billAddress || billPhone) && (
                        <div className="mb-4 pt-4 border-t border-dashed border-gray-400">
                            <h3 className="font-extrabold text-xl uppercase mb-1">BILL TO,</h3>
                            <div className="font-bold text-md leading-snug uppercase text-gray-700">
                                {billName || ' '}<br/>
                                {billAddress ? billAddress.split('\n').map((line, i) => <React.Fragment key={i}>{line}<br/></React.Fragment>) : ' '}<br/>
                                {billPhone || ' '}
                            </div>
                        </div>
                    )}
                </div>

                {/* Footer */}
                <div className="mt-auto flex flex-col items-center pt-4 border-t-2 border-gray-900">
                    <div className="mb-4 bg-white p-2 rounded">
                        <Barcode value={orderId || '0000'} />
                    </div>
                    <div className="flex items-center justify-between w-full font-bold text-lg text-brand-red uppercase px-4">
                        <div className="flex items-center gap-1.5"><InstagramIcon className="w-6 h-6" /> LOKSTLYO_FASHION</div>
                        <div className="flex items-center gap-1.5"><WhatsAppIcon className="w-6 h-6" /> 8680857511</div>
                    </div>
                </div>
            </div>
        );

        function App() {
            const [activeTab, setActiveTab] = useState('billing'); // Default to billing
            const [sheetUrl, setSheetUrl] = useState(localStorage.getItem('googleSheetUrl') || '');
            const [serverUrl, setServerUrl] = useState(localStorage.getItem('serverUrl') || '/api/save-label');
            const [notification, setNotification] = useState(null); // Custom Notification State

            const showNotification = (msg) => {
                setNotification(msg);
                setTimeout(() => setNotification(null), 3000);
            };

            // --- SAVED BILLS FOR REPORTS ---
            const [savedBills, setSavedBills] = useState(() => JSON.parse(localStorage.getItem('savedBills') || '[]'));

            // Helper to generate Auto Incrementing IDs based on Month/Year
            const getNextInvoiceId = (dateStr) => {
                const d = new Date(dateStr || new Date());
                if (isNaN(d.getTime())) return '';
                const month = d.toLocaleString('en-US', { month: 'short' }).toUpperCase();
                const year = d.getFullYear();
                const key = `${month}-${year}`;

                const counters = JSON.parse(localStorage.getItem('invoiceCounters') || '{}');
                const currentSeq = counters[key] || 1;
                return `LSF-${month}-${String(currentSeq).padStart(3, '0')}`;
            };

            const todayStr = new Date().toISOString().split('T')[0];

            // --- LOAD DRAFTS FOR CONTINUOUS AUTO-SAVE ---
            const lDraft = JSON.parse(localStorage.getItem('labelDraft') || '{}');
            const bDraft = JSON.parse(localStorage.getItem('billingDraft') || '{}');

            // --- GENERATOR STATE ---
            const [orderId, setOrderId] = useState(lDraft.orderId || getNextInvoiceId(todayStr));
            const [toName, setToName] = useState(lDraft.toName || '');
            const [toAddress, setToAddress] = useState(lDraft.toAddress || '');
            const [toPhone, setToPhone] = useState(lDraft.toPhone || '');
            const [billName, setBillName] = useState(lDraft.billName || '');
            const [billAddress, setBillAddress] = useState(lDraft.billAddress || '');
            const [billPhone, setBillPhone] = useState(lDraft.billPhone || '');

            // --- BILLING STATE ---
            const [billDate, setBillDate] = useState(bDraft.billDate || todayStr);
            const [billInvoice, setBillInvoice] = useState(bDraft.billInvoice || getNextInvoiceId(bDraft.billDate || todayStr));
            const [billCustomerName, setBillCustomerName] = useState(bDraft.billCustomerName || '');
            const [billCustomerPhone, setBillCustomerPhone] = useState(bDraft.billCustomerPhone || '');
            const [billCustomerAddress, setBillCustomerAddress] = useState(bDraft.billCustomerAddress || '');
            const [billDelivery, setBillDelivery] = useState(bDraft.billDelivery || 'Store Walk-in');
            const [billCourier, setBillCourier] = useState(bDraft.billCourier || 'Professional Courier');
            const [billTracking, setBillTracking] = useState(bDraft.billTracking || '');
            const [billDiscount, setBillDiscount] = useState(bDraft.billDiscount || 0);
            const [billPromoCode, setBillPromoCode] = useState(bDraft.billPromoCode || 'NO CODE');
            const [billItems, setBillItems] = useState(bDraft.billItems || [{ id: crypto.randomUUID(), particular: '', qty: 1, rate: 0 }]);
            
            // --- SPLIT PAYMENT STATE ---
            const [paidGpay, setPaidGpay] = useState(bDraft.paidGpay || 0);
            const [paidCash, setPaidCash] = useState(bDraft.paidCash || 0);

            // --- CONTINUOUS DRAFT AUTO-SAVE EFFECTS ---
            // Instantly saves the Manual Label form state
            useEffect(() => {
                const draft = { orderId, toName, toAddress, toPhone, billName, billAddress, billPhone };
                localStorage.setItem('labelDraft', JSON.stringify(draft));
            }, [orderId, toName, toAddress, toPhone, billName, billAddress, billPhone]);

            // Instantly saves the Billing form state
            useEffect(() => {
                const draft = {
                    billDate, billInvoice, billCustomerName, billCustomerPhone,
                    billCustomerAddress, billDelivery, billCourier, billTracking,
                    billDiscount, billPromoCode, billItems, paidGpay, paidCash
                };
                localStorage.setItem('billingDraft', JSON.stringify(draft));
            }, [billDate, billInvoice, billCustomerName, billCustomerPhone, billCustomerAddress, billDelivery, billCourier, billTracking, billDiscount, billPromoCode, billItems, paidGpay, paidCash]);

            // --- REPORT STATE ---
            const currentMonthStr = todayStr.substring(0, 7); // YYYY-MM
            const currentYearStr = todayStr.substring(0, 4); // YYYY
            const [reportType, setReportType] = useState('daily'); // 'daily', 'monthly', 'yearly'
            const [reportDate, setReportDate] = useState(todayStr);
            const [reportMonth, setReportMonth] = useState(currentMonthStr);
            const [reportYear, setReportYear] = useState(currentYearStr);

            // Effect: Auto-update Invoice Number when Date changes
            useEffect(() => {
                setBillInvoice(getNextInvoiceId(billDate));
            }, [billDate]);

            // --- AI & GEMINI STATE ---
            const [isFormattingAddress, setIsFormattingAddress] = useState(false);
            const [isGeneratingMsg, setIsGeneratingMsg] = useState(false);
            const [generatedWhatsapp, setGeneratedWhatsapp] = useState('');

            const callGeminiAPI = async (prompt, imageData = null) => {
                const apiKey = ""; 
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
                
                const parts = [{ text: prompt }];
                if (imageData) {
                    parts.push({ inlineData: { mimeType: imageData.mimeType, data: imageData.data } });
                }
                const payload = { contents: [{ parts: parts }] };

                const retries = [1000, 2000, 4000, 8000, 16000];
                for (let i = 0; i <= retries.length; i++) {
                    try {
                        const response = await fetch(url, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(payload)
                        });
                        if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                        const result = await response.json();
                        return result.candidates?.[0]?.content?.parts?.[0]?.text;
                    } catch (error) {
                        if (i === retries.length) {
                            showNotification("AI Feature unavailable right now.");
                            return null;
                        }
                        await new Promise(res => setTimeout(res, retries[i]));
                    }
                }
            };

            // --- INBUILT PARTICULARS ---
            const PRESET_ITEMS = {
                'IPL JERSEY MI - M': 280, 'IPL JERSEY MI - L': 280, 'IPL JERSEY MI - XL': 280,
                'IPL JERSEY RCB - M': 280, 'IPL JERSEY RCB - L': 280, 'IPL JERSEY RCB - XL': 280,
                'IPL JERSEY CSK - M': 280, 'IPL JERSEY CSK - L': 280, 'IPL JERSEY CSK - XL': 280,
                'FOOT BALL JERSEY - M': 280, 'FOOT BALL JERSEY - L': 280, 'FOOT BALL JERSEY - XL': 280,
                'BACKPRINT DROPSHOLDER - M': 380, 'BACKPRINT DROPSHOLDER - L': 380, 'BACKPRINT DROPSHOLDER - XL': 380, 'BACKPRINT DROPSHOLDER - XXL': 380,
                'DIS FAB POLO 0838 - M': 500, 'DIS FAB POLO 0838 - L': 500, 'DIS FAB POLO 0838 - XL': 500,
                'NET FOLDING DROPSHOLDER 0839 - M': 450, 'NET FOLDING DROPSHOLDER 0839 - L': 450, 'NET FOLDING DROPSHOLDER 0839 - XL': 450,
                'BAGGY TRACK BLACK - M': 280, 'BAGGY TRACK BLACK - L': 280, 'BAGGY TRACK BLACK - XL': 280, 'BAGGY TRACK BLACK - XXL': 280,
                'BAGGY TRACK RED - M': 280, 'BAGGY TRACK RED - L': 280, 'BAGGY TRACK RED - XL': 280, 'BAGGY TRACK RED - XXL': 280,
                'BAGGY TRACK SANDLE - M': 280, 'BAGGY TRACK SANDLE - L': 280, 'BAGGY TRACK SANDLE - XL': 280, 'BAGGY TRACK SANDLE - XXL': 280,
            };

            // --- SCANNER STATE & DATABASE ---
            const [scanResult, setScanResult] = useState(null);
            const [syncStatus, setSyncStatus] = useState('');
            const [savedScans, setSavedScans] = useState(() => JSON.parse(localStorage.getItem('savedScans') || '[]'));
            const scannerRef = useRef(null);

            // Auto-save successful scans to the local database
            const saveScanToDatabase = (data) => {
                setSavedScans(prev => {
                    const newScan = {
                        ...data,
                        scanId: crypto.randomUUID(),
                        scanDate: new Date().toLocaleString()
                    };
                    const updated = [newScan, ...prev];
                    localStorage.setItem('savedScans', JSON.stringify(updated));
                    return updated;
                });
            };

            const clearScanDatabase = () => {
                if(window.confirm("Are you sure you want to clear the scan history?")) {
                    setSavedScans([]);
                    localStorage.removeItem('savedScans');
                    showNotification("Scan database cleared!");
                }
            };

            // Effect: Scanner Setup with robust error handling for missing DOM elements
            useEffect(() => {
                let isMounted = true;
                let timeoutId;
                
                const initScanner = () => {
                    const readerElement = document.getElementById("reader");
                    
                    if (activeTab === 'scanner' && !scanResult && readerElement && isMounted) {
                        if (!scannerRef.current) {
                            try {
                                scannerRef.current = new Html5QrcodeScanner("reader", { fps: 10, qrbox: {width: 250, height: 250} }, false);
                                scannerRef.current.render(
                                    (decodedText) => {
                                        let parsed;
                                        try { 
                                            parsed = JSON.parse(decodedText); 
                                        } catch (e) { 
                                            parsed = { id: decodedText, name: 'Unknown (Raw Text)' }; 
                                        }
                                        
                                        setScanResult(parsed);
                                        saveScanToDatabase(parsed); // ✨ AUTO SAVE TO DATABASE HERE
                                        
                                        if (scannerRef.current) {
                                            scannerRef.current.clear().catch(e => console.error(e));
                                            scannerRef.current = null;
                                        }
                                    },
                                    (err) => { /* ignore background scan errors safely */ }
                                );
                            } catch (err) {
                                console.error("Scanner initialization failed:", err);
                            }
                        }
                    } else if (activeTab === 'scanner' && !scanResult && isMounted) {
                        // Element not ready yet in the DOM, retry slightly later to prevent crashes
                        timeoutId = setTimeout(initScanner, 100);
                    }
                };

                if (activeTab === 'scanner' && !scanResult) {
                    initScanner();
                }

                return () => {
                    isMounted = false;
                    clearTimeout(timeoutId);
                    if (scannerRef.current) {
                        scannerRef.current.clear().catch(e => console.error(e));
                        scannerRef.current = null;
                    }
                };
            }, [activeTab, scanResult]);

            // --- BILLING CALCULATIONS & SAVING ---
            const subTotal = billItems.reduce((acc, item) => acc + ((item.qty || 0) * (item.rate || 0)), 0);
            const discountAmount = subTotal * ((Number(billDiscount) || 0) / 100);
            const totalAfterDiscount = subTotal - discountAmount;
            const grandTotal = Math.round(totalAfterDiscount);
            const roundOffAmount = grandTotal - totalAfterDiscount;
            const totalQty = billItems.reduce((acc, item) => acc + Number(item.qty || 0), 0);
            const balanceAmount = grandTotal - (Number(paidGpay) || 0) - (Number(paidCash) || 0);

            // Save the current bill to LocalStorage for reporting
            const saveCurrentBill = () => {
                // Prevent saving empty accidental bills
                if (grandTotal <= 0 && totalQty === 0) return;
                
                const newBill = {
                    id: billInvoice,
                    date: billDate,
                    customer: billCustomerName || 'Walk-in',
                    total: grandTotal,
                    cash: Number(paidCash) || 0,
                    gpay: Number(paidGpay) || 0,
                    balance: balanceAmount
                };

                setSavedBills(prevBills => {
                    const existingIndex = prevBills.findIndex(b => b.id === billInvoice);
                    const updated = [...prevBills];
                    if (existingIndex > -1) {
                        updated[existingIndex] = newBill; // Update existing
                    } else {
                        updated.push(newBill); // Add new
                    }
                    localStorage.setItem('savedBills', JSON.stringify(updated));
                    return updated;
                });
            };

            // --- AUTO SAVE EFFECT ---
            // Automatically saves the bill to reports 1 second after typing stops
            useEffect(() => {
                const timer = setTimeout(() => {
                    if (totalQty > 0 || paidCash > 0 || paidGpay > 0) {
                        saveCurrentBill();
                    }
                }, 1000); 
                return () => clearTimeout(timer);
            }, [billInvoice, billDate, billCustomerName, grandTotal, paidCash, paidGpay, balanceAmount, totalQty]);

            // Handlers
            const handleNewBill = () => {
                saveCurrentBill(); // Explicit save before clearing

                const d = new Date(billDate);
                if (!isNaN(d.getTime())) {
                    const month = d.toLocaleString('en-US', { month: 'short' }).toUpperCase();
                    const year = d.getFullYear();
                    const key = `${month}-${year}`;

                    const counters = JSON.parse(localStorage.getItem('invoiceCounters') || '{}');
                    const currentSeq = counters[key] || 1;
                    
                    // Increment sequence if the current auto-generated ID was used
                    const expectedInvoice = `LSF-${month}-${String(currentSeq).padStart(3, '0')}`;
                    if (billInvoice === expectedInvoice) {
                        counters[key] = currentSeq + 1;
                        localStorage.setItem('invoiceCounters', JSON.stringify(counters));
                    }
                }

                // Reset forms
                setBillCustomerName('');
                setBillCustomerPhone('');
                setBillCustomerAddress('');
                setBillTracking('');
                setBillDiscount(0);
                setPaidGpay(0);
                setPaidCash(0);
                setBillPromoCode('NO CODE');
                setBillItems([{ id: crypto.randomUUID(), particular: '', qty: 1, rate: 0 }]); // Better UUID approach
                
                // Get fresh date and update IDs
                const today = new Date().toISOString().split('T')[0];
                setBillDate(today);
                const nextId = getNextInvoiceId(today);
                setBillInvoice(nextId);
                setOrderId(nextId);
                
                showNotification("New Bill Started!");
            };

            const handlePrint = () => {
                saveCurrentBill(); // Explicit save before printing
                window.print();
            };
            
            const handleSave = async () => {
                const data = { orderId, toName, toAddress, toPhone, billName, billAddress, billPhone };
                localStorage.setItem('savedLabel', JSON.stringify(data));
                if (serverUrl) {
                    try {
                        const res = await fetch(serverUrl, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });

                    } catch (err) { showNotification('Saved locally (backend unavailable).'); }
                } else showNotification('Label details saved locally!');
            };

            const syncToGoogleSheets = async () => {
                if (!sheetUrl) return showNotification('Configure Webhook URL in Settings!');
                setSyncStatus('Syncing...');
                try {
                    await fetch(sheetUrl, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(scanResult) });
                    setSyncStatus('Successfully saved to Google Sheets!');
                    setTimeout(() => setScanResult(null), 3000);
                } catch (error) { setSyncStatus('Failed to sync. Check console.'); }
            };

            // --- AI HANDLERS ---
            const handleFormatAddress = async () => {
                if (!billCustomerAddress || billCustomerAddress.trim().length < 5) return;
                setIsFormattingAddress(true);
                const prompt = `Format this Indian shipping address neatly. Capitalize names/cities correctly, ensure logical line breaks (e.g., Name \n Street/Locality \n City, State - Pincode). Remove any messy characters. Return ONLY the formatted address text, no conversational filler. Address: ${billCustomerAddress}`;
                const formatted = await callGeminiAPI(prompt);
                if (formatted) setBillCustomerAddress(formatted.trim());
                setIsFormattingAddress(false);
            };

            const handleGenerateReview = async () => {
                setIsGeneratingMsg(true);
                const prompt = `Write a friendly, short WhatsApp message from 'Lookstylo Fashion' to customer '${billCustomerName || 'Customer'}'. 
                Ask them if they received their recent order and if they are happy with the quality. 
                Kindly request them to share a 5-star review on our Google page using this exact link: https://g.page/r/CYYvcLcuUkztECk/review
                Also mention that if they share a picture on Instagram, they can tag us @lookstylo_fashion. 
                Keep it concise, polite, and use a few emojis. Do not include placeholder brackets, act as if this is the final message to send.`;
                
                const msg = await callGeminiAPI(prompt);

                setIsGeneratingMsg(false);
            };

            const updateBillItem = (id, field, value) => {
                setBillItems(billItems.map(i => {
                    if (i.id === id) {
                        // Keep input as string while typing to allow smooth decimal entry
                        let updated = { ...i, [field]: value }; 
                        
                        // Auto-fill price if a preset item is selected
                        if (field === 'particular') {
                            const upperVal = value.toUpperCase();
                            if (PRESET_ITEMS[upperVal]) {
                                updated.rate = PRESET_ITEMS[upperVal];
                            }
                        }
                        
                        return updated;
                    }
                    return i;
                }));
            };
            
            const addBillItem = () => setBillItems([...billItems, { id: crypto.randomUUID(), particular: '', qty: 1, rate: 0 }]);
            const removeBillItem = (id) => setBillItems(billItems.filter(i => i.id !== id));
            
            // --- DAILY/MONTHLY/YEARLY REPORTS LOGIC ---
            const reportBills = savedBills.filter(b => {
                if (!b.date) return false;
                if (reportType === 'daily') return b.date === reportDate;
                if (reportType === 'monthly') return b.date.startsWith(reportMonth);
                if (reportType === 'yearly') return b.date.startsWith(reportYear);
                return false;
            });
            const totalReportSales = reportBills.reduce((acc, b) => acc + (b.total || 0), 0);
            const totalReportCash = reportBills.reduce((acc, b) => acc + (b.cash || 0), 0);
            const totalReportGpay = reportBills.reduce((acc, b) => acc + (b.gpay || 0), 0);
            const totalReportBalance = reportBills.reduce((acc, b) => acc + (b.balance || 0), 0);
            
            let periodLabel = '';
            if (reportType === 'daily') {
                periodLabel = new Date(reportDate).toLocaleDateString('en-GB');
            } else if (reportType === 'monthly') {
                const [y, m] = reportMonth.split('-');
                periodLabel = new Date(y, m - 1).toLocaleString('en-US', { month: 'long', year: 'numeric' });
            } else {
                periodLabel = reportYear;
            }

            // Reusable Bill Function (Untouched core layout for strict print rendering)
            const renderBillContent = (copyLabel) => {
                let deliveryText = billDelivery === 'Courier' ? (billTracking ? `${billCourier} (Track: ${billTracking})` : billCourier) : 'Store Walk-in';
                let terms = billDelivery === 'Courier' 
                    ? ["Unboxing video is mandatory for any claims.", "Exchange for damaged/wrong items within 2 days of delivery.", "Shipping charges are non-refundable."] 
                    : ["Goods once sold will not be taken back."];

                let promoDetails = { title: "", subtitle: "" };
                if (billPromoCode === 'FREESHIP') {
                    promoDetails = { title: "Free Shipping on your next purchase", subtitle: "(Valid only for 10 days after receiving courier)" };
                } else if (billPromoCode === 'GET350 SHIRT') {
                    promoDetails = { title: "Get ₹350 Off on your next Shirt purchase", subtitle: "(Valid only for 10 days after receiving courier)" };
                } else if (billPromoCode === '10%DIS') {
                    promoDetails = { title: "Get 10% Flat Discount on your next purchase", subtitle: "(Valid only for 10 days after receiving courier)" };
                } else if (billPromoCode === '5%DIS') {
                    promoDetails = { title: "Get 5% Flat Discount on your next purchase", subtitle: "(Valid only for 10 days after receiving courier)" };
                }

                return (
                    <div className="border-2 border-gray-900 w-full h-full flex flex-col relative p-4 bg-white box-border text-xs">

                            <p className="text-[11px] text-gray-800 leading-tight mb-1">
                                Shop No. 2, opposite post office, Tirupathur Main Road,<br/>
                                Pakkirithaka, Jolarpattai, Katteri Village - 635851
                            </p>
                            <div className="flex justify-center items-center gap-3 font-bold text-gray-900 mt-1">
                                <span className="flex items-center gap-1"><WhatsAppIcon className="w-3.5 h-3.5" /> 8680857511</span> | 
                                <span className="flex items-center gap-1"><InstagramIcon className="w-3.5 h-3.5" /> @lookstylo_fashion</span>
                            </div>
                            <p className="font-bold text-gray-900 mt-1">GSTIN: 33NEYPS4388G1ZC</p>
                        </div>

                        {/* Customer Info */}
                        <div className="flex justify-between mb-3 font-medium shrink-0">
                            <div className="space-y-1">
                                <p><span className="w-14 inline-block text-gray-600">Name:</span> <span className="uppercase border-b border-gray-400 pb-0.5 inline-block min-w-[120px]">{billCustomerName || 'Walk-in Customer'}</span></p>
                                <p><span className="w-14 inline-block text-gray-600">Phone:</span> <span className="border-b border-gray-400 pb-0.5 inline-block min-w-[120px]">{billCustomerPhone || '-'}</span></p>

                            </div>
                            <div className="space-y-1 text-right">
                                <p><span className="text-gray-600 mr-2">Inv No:</span> <span className="font-bold">{billInvoice}</span></p>

                                            <td className="py-2 px-1 text-right border-r border-gray-400">{item.rate ? parseFloat(item.rate).toFixed(2) : ''}</td>
                                            <td className="py-2 px-2 text-right">{(item.qty * item.rate) ? (item.qty * item.rate).toFixed(2) : ''}</td>

                                            <p className="text-[10px] font-bold mt-0.5">Use Code: <span className="text-brand-red text-xs">{billPromoCode}</span></p>
                                        </div>

                            </div>
                            <div className="w-[45%]">
                                <div className="flex justify-between py-1"><span className="font-semibold">Sub Total:</span><span>₹ {subTotal.toFixed(2)}</span></div>

                                {roundOffAmount !== 0 && <div className="flex justify-between py-1 text-gray-700"><span>Round Off:</span><span>{roundOffAmount > 0 ? '+ ' : '- '}₹ {Math.abs(roundOffAmount).toFixed(2)}</span></div>}
                                <div className="flex justify-between text-sm font-bold border-t border-b border-gray-900 py-2 mt-1 bg-gray-50 px-1 mb-1"><span>Grand Total:</span><span>₹ {grandTotal.toFixed(2)}</span></div>
                                
                                {/* Split Payment Output */}
                                <div className="flex justify-between text-[11px] font-semibold text-gray-800 px-1 py-0.5"><span>Paid (GPay):</span><span>₹ {(Number(paidGpay) || 0).toFixed(2)}</span></div>

                                <div className="flex justify-between text-[12px] font-bold text-gray-900 mt-1 px-1 border-t border-b border-gray-300 py-1 mb-1">

                            </div>

                    </div>

            return (

                        {/* -------------------- TAB: BILLING -------------------- */}
                        {activeTab === 'billing' && (

                                        <ModernInput label="Phone Number" type="text" value={billCustomerPhone} onChange={e=>setBillCustomerPhone(e.target.value)} placeholder="Optional" className="md:col-span-2" />

                                                    <textarea rows="3" value={billCustomerAddress} onChange={e=>setBillCustomerAddress(e.target.value)} placeholder="Full Delivery Address" className="w-full p-3 bg-white border border-slate-200 rounded-xl focus:ring-4 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none transition-all text-sm font-medium shadow-sm resize-none"></textarea>

                                    {/* Particulars */}
                                    <div className="border border-slate-200 rounded-2xl overflow-hidden shadow-sm">
                                        <div className="bg-slate-50/80 px-5 py-4 border-b border-slate-200 flex justify-between items-center">

                                                    <button onClick={()=>removeBillItem(item.id)} className={`text-slate-400 hover:text-red-500 hover:bg-red-50 p-2.5 rounded-xl transition-all ${billItems.length === 1 ? 'invisible' : ''}`} title="Remove Row">

                                    {/* Action Buttons */}
                                    <div className="flex gap-4 mt-2">
                                        <button onClick={handlePrint} className="w-1/2 bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-700 hover:to-purple-700 text-white font-bold py-4 px-4 rounded-2xl shadow-xl shadow-indigo-200 transition-all transform hover:-translate-y-0.5 active:translate-y-0 active:shadow-md flex justify-center items-center gap-2 text-lg">
                                            <svg xmlns="http://www.w3.org/2000/svg" className="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}><path strokeLinecap="round" strokeLinejoin="round" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z" /></svg>
                                            Print
                                        </button>
                                        <button onClick={handleNewBill} className="w-1/2 bg-slate-800 hover:bg-slate-900 text-white font-bold py-4 px-4 rounded-2xl shadow-xl transition-all transform hover:-translate-y-0.5 active:translate-y-0 active:shadow-md flex justify-center items-center gap-2 text-lg">
                                            <svg xmlns="http://www.w3.org/2000/svg" className="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}><path strokeLinecap="round" strokeLinejoin="round" d="M12 4v16m8-8H4" /></svg>
                                            New Bill
                                        </button>
                                    </div>
                                </div>

                                {/* PREVIEW PANEL */}
                                <div className="w-full lg:w-[45%] flex flex-col gap-8 items-center bg-slate-200/50 p-6 md:p-8 print:p-0 print:bg-white rounded-3xl border border-slate-200 shadow-inner overflow-y-auto h-fit print-section print:overflow-visible print:h-auto print:block print:border-none print:shadow-none">
                                    <div className="w-full text-center print:hidden mb-2">
                                        <span className="inline-block bg-slate-300 text-slate-600 font-bold text-[10px] uppercase tracking-widest px-4 py-1.5 rounded-full">Print Previews</span>
                                    </div>
                                    
                                    {/* Copy 1: Buyer's Bill */}
                                    <div className="a5-container relative print:scale-100 transform origin-top scale-[0.85] md:scale-95 transition-all hover:shadow-2xl">
                                        {renderBillContent("Original - Buyer's Copy")}
                                    </div>

                                    {/* Copy 2: Shop Bill (Hidden on screen to save space, visible on print) */}
                                    <div className="a5-container relative hidden print:flex">
                                        {renderBillContent("Duplicate - Shop Copy")}
                                    </div>

                                    {/* Copy 3: Shipping Label (Conditional based on Delivery Mode) */}
                                    {billDelivery === 'Courier' && (
                                        <div className="a5-container relative print:scale-100 transform origin-top scale-[0.85] md:scale-95 transition-all hover:shadow-2xl print:flex">
                                            <LabelContent 
                                                copyLabel="Shipping Label"
                                                orderId={billTracking || billInvoice} 
                                                toName={billCustomerName} 
                                                toAddress={billCustomerAddress} 
                                                toPhone={billCustomerPhone} 
                                            />
                                        </div>
                                    )}
                                </div>
                            </>
                        )}

                        {/* -------------------- TAB: REPORTS -------------------- */}
                        {activeTab === 'reports' && (
                            <div className="w-full max-w-5xl mx-auto bg-white p-8 rounded-3xl shadow-xl shadow-slate-200/50 border border-slate-100 no-print">
                                <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 border-b border-slate-100 pb-6 mb-6">
                                    <div>
                                        <h2 className="text-3xl font-extrabold text-slate-800">Sales Reports</h2>
                                        <p className="text-sm text-slate-500 font-medium mt-1">Track your cash and G-Pay collections for {periodLabel}.</p>
                                    </div>
                                    <div className="bg-slate-50 p-3 rounded-2xl border border-slate-200 shadow-sm flex items-center gap-3">
                                        <select value={reportType} onChange={e=>setReportType(e.target.value)} className="p-2 bg-white border border-slate-200 rounded-lg outline-none focus:ring-2 focus:ring-indigo-500/50 font-bold text-slate-700 cursor-pointer">
                                            <option value="daily">Daily</option>
                                            <option value="monthly">Monthly</option>
                                            <option value="yearly">Yearly</option>
                                        </select>
                                        
                                        {reportType === 'daily' && (
                                            <input type="date" value={reportDate} onChange={e=>setReportDate(e.target.value)} className="p-2 bg-white border border-slate-200 rounded-lg outline-none focus:ring-2 focus:ring-indigo-500/50 font-bold text-indigo-700" />
                                        )}
                                        {reportType === 'monthly' && (
                                            <input type="month" value={reportMonth} onChange={e=>setReportMonth(e.target.value)} className="p-2 bg-white border border-slate-200 rounded-lg outline-none focus:ring-2 focus:ring-indigo-500/50 font-bold text-indigo-700" />
                                        )}
                                        {reportType === 'yearly' && (
                                            <select value={reportYear} onChange={e=>setReportYear(e.target.value)} className="p-2 bg-white border border-slate-200 rounded-lg outline-none focus:ring-2 focus:ring-indigo-500/50 font-bold text-indigo-700 cursor-pointer">
                                                {[...Array(11)].map((_, i) => {
                                                    const y = new Date().getFullYear() - 5 + i;
                                                    return <option key={y} value={y}>{y}</option>;
                                                })}
                                            </select>
                                        )}
                                    </div>
                                </div>

                                <div className="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
                                    <div className="bg-indigo-50 p-5 rounded-2xl border border-indigo-100 flex flex-col justify-center">
                                        <span className="text-xs font-bold text-indigo-500 uppercase tracking-wider mb-1">Total Sales</span>
                                        <span className="text-3xl font-black text-indigo-700">₹ {totalReportSales.toFixed(2)}</span>
                                    </div>
                                    <div className="bg-emerald-50 p-5 rounded-2xl border border-emerald-100 flex flex-col justify-center">
                                        <span className="text-xs font-bold text-emerald-600 uppercase tracking-wider mb-1">Cash Received</span>
                                        <span className="text-3xl font-black text-emerald-700">₹ {totalReportCash.toFixed(2)}</span>
                                    </div>
                                    <div className="bg-blue-50 p-5 rounded-2xl border border-blue-100 flex flex-col justify-center">
                                        <span className="text-xs font-bold text-blue-600 uppercase tracking-wider mb-1">G-Pay Received</span>
                                        <span className="text-3xl font-black text-blue-700">₹ {totalReportGpay.toFixed(2)}</span>
                                    </div>
                                    <div className="bg-amber-50 p-5 rounded-2xl border border-amber-100 flex flex-col justify-center">
                                        <span className="text-xs font-bold text-amber-600 uppercase tracking-wider mb-1">Pending Balance</span>
                                        <span className="text-3xl font-black text-amber-700">₹ {totalReportBalance.toFixed(2)}</span>
                                    </div>
                                </div>

                                <div className="border border-slate-200 rounded-2xl overflow-hidden shadow-sm">
                                    <div className="bg-slate-50/80 px-5 py-4 border-b border-slate-200 flex justify-between items-center">
                                        <h3 className="font-bold text-slate-700 uppercase tracking-wider text-xs">Invoices for {periodLabel}</h3>
                                        <span className="text-xs font-semibold text-indigo-500 bg-indigo-50 px-2 py-1 rounded-md">{reportBills.length} Bill(s)</span>
                                    </div>
                                    <div className="overflow-x-auto max-h-[500px]">
                                        <table className="w-full text-left border-collapse">
                                            <thead className="sticky top-0 bg-white shadow-sm">
                                                <tr className="border-b border-slate-200 text-xs uppercase tracking-wider text-slate-500">
                                                    <th className="p-4 font-bold">Date</th>
                                                    <th className="p-4 font-bold">Invoice ID</th>
                                                    <th className="p-4 font-bold">Customer</th>
                                                    <th className="p-4 font-bold text-right">Total</th>
                                                    <th className="p-4 font-bold text-right">Cash</th>
                                                    <th className="p-4 font-bold text-right">G-Pay</th>
                                                    <th className="p-4 font-bold text-right">Balance</th>
                                                </tr>
                                            </thead>
                                            <tbody className="bg-white divide-y divide-slate-100">
                                                {reportBills.length === 0 ? (
                                                    <tr><td colSpan="7" className="p-8 text-center text-slate-400 font-medium">No bills recorded for this period.</td></tr>
                                                ) : (
                                                    reportBills.slice().reverse().map(bill => (
                                                        <tr key={bill.id} className="hover:bg-slate-50 transition-colors">
                                                            <td className="p-4 text-xs font-medium text-slate-500">{bill.date.split('-').reverse().join('-')}</td>
                                                            <td className="p-4 font-mono text-sm font-bold text-slate-700">{bill.id}</td>
                                                            <td className="p-4 text-sm font-medium text-slate-600">{bill.customer}</td>
                                                            <td className="p-4 text-sm font-bold text-right text-slate-800">₹ {bill.total}</td>
                                                            <td className="p-4 text-sm font-medium text-right text-emerald-600">₹ {bill.cash}</td>
                                                            <td className="p-4 text-sm font-medium text-right text-blue-600">₹ {bill.gpay}</td>
                                                            <td className="p-4 text-sm font-bold text-right text-amber-600">₹ {bill.balance}</td>
                                                        </tr>
                                                    ))
                                                )}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* -------------------- TAB: GENERATOR (Label Only) -------------------- */}
                        {activeTab === 'generator' && (
                            <>
                                <div className="w-full lg:w-[40%] bg-white p-8 rounded-3xl shadow-xl shadow-slate-200/50 border border-slate-100 h-fit space-y-6 no-print">
                                    <h2 className="text-3xl font-extrabold bg-clip-text text-transparent bg-gradient-to-r from-blue-600 to-indigo-600 mb-2 border-b border-slate-100 pb-4">Manual Label Creator</h2>
                                    <div className="space-y-5">
                                        <ModernInput label="Order ID / Tracking" type="text" value={orderId} onChange={(e) => setOrderId(e.target.value)} className="uppercase" />
                                        <ModernInput label="Customer Name (TO)" type="text" value={toName} onChange={(e) => setToName(e.target.value)} className="uppercase" />
                                        <div>
                                            <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1.5 ml-1">Delivery Address (TO)</label>
                                            <textarea rows="4" value={toAddress} onChange={(e) => setToAddress(e.target.value)} className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-4 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none transition-all text-sm font-medium text-slate-800 shadow-sm uppercase resize-none"></textarea>
                                        </div>
                                        <ModernInput label="Phone Number(s)" type="text" value={toPhone} onChange={(e) => setToPhone(e.target.value)} className="uppercase font-mono" />
                                        
                                        <div className="pt-4 grid grid-cols-1 md:grid-cols-2 gap-4">
                                            <button onClick={handlePrint} className="w-full bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 text-white font-bold py-3.5 px-4 rounded-xl shadow-lg shadow-blue-200 transition-all transform hover:-translate-y-0.5">🖨️ Print Label</button>
                                            <button onClick={handleSave} className="w-full bg-slate-800 hover:bg-slate-900 text-white font-bold py-3.5 px-4 rounded-xl shadow-lg transition-all transform hover:-translate-y-0.5">💾 Save Details</button>
                                        </div>
                                    </div>
                                </div>
                                <div className="w-full lg:w-[60%] flex justify-center bg-slate-200/50 p-6 md:p-8 rounded-3xl border border-slate-200 shadow-inner print-section print:overflow-visible print:h-auto print:block print:p-0 print:bg-white print:border-none print:shadow-none">
                                    <div className="a5-container hover:shadow-2xl transition-shadow">
                                        <LabelContent orderId={orderId} toName={toName} toAddress={toAddress} toPhone={toPhone} />
                                    </div>
                                </div>
                            </>
                        )}

                        {/* -------------------- TAB: SCANNER -------------------- */}
                        {activeTab === 'scanner' && (
                            <div className="w-full max-w-5xl mx-auto flex flex-col gap-8">
                                {/* Scanner UI */}
                                <div className="bg-white p-8 rounded-3xl shadow-xl shadow-slate-200/50 border border-slate-100 flex flex-col items-center">
                                    <div className="w-16 h-16 bg-indigo-50 rounded-2xl flex items-center justify-center mb-6 shadow-inner">
                                        <span className="text-3xl">📷</span>
                                    </div>
                                    <h2 className="text-3xl font-extrabold text-slate-800 mb-8 text-center">Scan Order QR Code</h2>
                                    
                                    {!scanResult && (
                                        <div className="w-full max-w-md bg-slate-50 p-4 rounded-3xl border-2 border-dashed border-slate-300">
                                            <div id="reader" className="w-full rounded-2xl overflow-hidden min-h-[250px]"></div>
                                        </div>
                                    )}

                                    {scanResult && (
                                        <div className="w-full max-w-md mt-2 bg-emerald-50 p-6 rounded-2xl border border-emerald-200 shadow-sm animate-fade-in">
                                            <div className="flex items-center gap-3 mb-4">
                                                <div className="w-8 h-8 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center font-black">✓</div>
                                                <h3 className="font-bold text-xl text-emerald-800">Scan Successful & Saved!</h3>
                                            </div>
                                            <div className="bg-white p-4 rounded-xl border border-emerald-100 space-y-3 mb-6 shadow-sm">
                                                <p className="text-sm"><span className="text-slate-500 font-medium uppercase text-xs tracking-wider block mb-0.5">Order ID</span> <strong className="text-lg font-mono text-slate-800">{scanResult.id}</strong></p>
                                                <p className="text-sm"><span className="text-slate-500 font-medium uppercase text-xs tracking-wider block mb-0.5">Customer</span> <strong className="text-slate-800 uppercase">{scanResult.name}</strong></p>
                                                <p className="text-sm"><span className="text-slate-500 font-medium uppercase text-xs tracking-wider block mb-0.5">Phone</span> <strong className="text-slate-800">{scanResult.phone}</strong></p>
                                            </div>
                                            <div className="flex flex-col md:flex-row gap-3">
                                                <button onClick={syncToGoogleSheets} className="flex-1 bg-gradient-to-r from-emerald-500 to-teal-500 hover:from-emerald-600 hover:to-teal-600 text-white font-bold py-3 px-4 rounded-xl shadow-lg shadow-emerald-200 transition-transform transform hover:-translate-y-0.5">💾 Sync to Sheets</button>
                                                <button onClick={() => setScanResult(null)} className="flex-1 bg-slate-800 hover:bg-slate-900 text-white font-bold py-3 px-4 rounded-xl shadow-lg transition-transform transform hover:-translate-y-0.5">🔄 Scan Next</button>
                                            </div>
                                            {syncStatus && <p className={`mt-4 text-center text-sm font-bold bg-white py-2 rounded-lg ${syncStatus.includes('Successfully') ? 'text-emerald-600 border border-emerald-100' : 'text-red-500 border border-red-100'}`}>{syncStatus}</p>}
                                        </div>
                                    )}
                                </div>

                                {/* Database UI */}
                                <div className="bg-white p-8 rounded-3xl shadow-xl shadow-slate-200/50 border border-slate-100">
                                    <div className="flex justify-between items-center border-b border-slate-100 pb-4 mb-4">
                                        <h3 className="text-2xl font-extrabold text-slate-800">Scanned Database</h3>
                                        <button onClick={clearScanDatabase} className="text-xs font-bold text-red-500 bg-red-50 px-3 py-1.5 rounded-lg hover:bg-red-100 transition-colors">Clear History</button>
                                    </div>
                                    <div className="overflow-x-auto max-h-[400px]">
                                        <table className="w-full text-left border-collapse">
                                            <thead className="sticky top-0 bg-white shadow-sm">
                                                <tr className="border-b border-slate-200 text-xs uppercase tracking-wider text-slate-500">
                                                    <th className="p-4 font-bold">Date & Time</th>
                                                    <th className="p-4 font-bold">Order ID</th>
                                                    <th className="p-4 font-bold">Customer</th>
                                                    <th className="p-4 font-bold">Phone</th>
                                                </tr>
                                            </thead>
                                            <tbody className="bg-white divide-y divide-slate-100">
                                                {savedScans.length === 0 ? (
                                                    <tr><td colSpan="4" className="p-8 text-center text-slate-400 font-medium">No scans recorded yet.</td></tr>
                                                ) : (
                                                    savedScans.map(scan => (
                                                        <tr key={scan.scanId} className="hover:bg-slate-50 transition-colors">
                                                            <td className="p-4 text-xs font-medium text-slate-500">{scan.scanDate}</td>
                                                            <td className="p-4 font-mono text-sm font-bold text-slate-700">{scan.id}</td>
                                                            <td className="p-4 text-sm font-medium text-slate-600 uppercase">{scan.name}</td>
                                                            <td className="p-4 text-sm font-medium text-slate-600">{scan.phone || '-'}</td>
                                                        </tr>
                                                    ))
                                                )}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* -------------------- TAB: SETTINGS -------------------- */}
                        {activeTab === 'settings' && (
                            <div className="w-full max-w-3xl mx-auto bg-white p-8 rounded-3xl shadow-xl shadow-slate-200/50 border border-slate-100">
                                <div className="flex items-center gap-4 border-b border-slate-100 pb-6 mb-6">
                                    <div className="w-12 h-12 bg-slate-100 rounded-xl flex items-center justify-center text-2xl">⚙️</div>
                                    <div>
                                        <h2 className="text-3xl font-extrabold text-slate-800">System Settings</h2>
                                        <p className="text-sm text-slate-500 font-medium">Configure webhooks and backend connections.</p>
                                    </div>
                                </div>
                                <div className="space-y-6">
                                    <div>
                                        <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2 ml-1">Google Apps Script Webhook URL</label>
                                        <textarea rows="3" value={sheetUrl} onChange={e => { setSheetUrl(e.target.value); localStorage.setItem('googleSheetUrl', e.target.value); }} placeholder="https://script.google.com/macros/s/..." className="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl focus:ring-4 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none transition-all font-mono text-xs text-slate-700 shadow-inner resize-none"></textarea>
                                        <p className="text-[11px] text-slate-400 mt-2 ml-1">Used to automatically log scanned packages into a Google Sheet.</p>
                                    </div>
                                    <div>
                                        <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2 ml-1">Backend Server URL (Node API)</label>
                                        <textarea rows="2" value={serverUrl} onChange={e => { setServerUrl(e.target.value); localStorage.setItem('serverUrl', e.target.value); }} placeholder="/api/save-label" className="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl focus:ring-4 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none transition-all font-mono text-xs text-slate-700 shadow-inner resize-none"></textarea>
                                    </div>
                                    <div className="pt-4 border-t border-slate-100">
                                        <button onClick={() => showNotification('Settings Saved to Browser Storage Successfully!')} className="w-full bg-slate-800 hover:bg-slate-900 text-white font-bold py-4 px-4 rounded-xl transition-transform transform hover:-translate-y-0.5 shadow-lg flex justify-center items-center gap-2">
                                            <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fillRule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clipRule="evenodd" /></svg>
                                            Save & Test Connection
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
