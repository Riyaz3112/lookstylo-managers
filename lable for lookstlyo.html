<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lookstylo Order Manager</title>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- JsBarcode for Barcode Generation -->
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <!-- QRCode.js for QR Code Generation -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <!-- HTML5 QR Code for Scanning -->
    <script src="https://unpkg.com/html5-qrcode/html5-qrcode.min.js" type="text/javascript"></script>

    <style>
        body { background-color: #f3f4f6; font-family: 'Arial', sans-serif; }
        
        /* A5 Label Styling */
        .a5-container {
            width: 148mm;
            height: 210mm;
            background: white;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin: 0 auto;
            padding: 12mm;
            position: relative;
            display: flex;
            flex-direction: column;
            color: black;
        }

        /* Print Settings */
        @media print {
            body * { visibility: hidden; background: white; }
            #no-print { display: none !important; }
            #print-section, #print-section * { visibility: visible; }
            #print-section {
                position: absolute;
                left: 0;
                top: 0;
                width: 100%;
                margin: 0;
                padding: 0;
            }
            .a5-container {
                box-shadow: none;
                width: 148mm;
                height: 210mm;
                padding: 12mm;
                margin: 0;
                page-break-after: always;
            }
            @page {
                size: A5;
                margin: 0;
            }
        }

        .text-brand-red { color: #d32f2f; }
        .text-brand-blue { color: #1976d2; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- ICON COMPONENTS ---
        const InstagramIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" className="w-8 h-8 mr-2" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <rect x="2" y="2" width="20" height="20" rx="5" ry="5" stroke="#E1306C"></rect>
                <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z" stroke="#E1306C"></path>
                <line x1="17.5" y1="6.5" x2="17.51" y2="6.5" stroke="#E1306C"></line>
            </svg>
        );

        const WhatsAppIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" className="w-8 h-8 mr-2" viewBox="0 0 24 24" fill="none" stroke="#25D366" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path>
            </svg>
        );

        // --- MAIN APP COMPONENT ---
        function App() {
            const [activeTab, setActiveTab] = useState('generator'); // 'generator', 'scanner', 'settings'
            const [sheetUrl, setSheetUrl] = useState(localStorage.getItem('googleSheetUrl') || '');

            // Form State
            const [orderId, setOrderId] = useState('LSF-MAR-40');
            const [toName, setToName] = useState('HAKKEM');
            const [toAddress, setToAddress] = useState('Poolankudiyiruppu Tenkasi\nTamilnadu -627813');
            const [toPhone, setToPhone] = useState('9514598301 - 9952214334');

            // Scanner State
            const [scanResult, setScanResult] = useState(null);
            const [isScanning, setIsScanning] = useState(false);
            const [syncStatus, setSyncStatus] = useState('');

            const barcodeRef = useRef(null);
            const qrRef = useRef(null);
            const scannerRef = useRef(null);

            // Generate Barcode & QR Code when data changes
            useEffect(() => {
                if (activeTab === 'generator') {
                    // Generate Barcode
                    if (barcodeRef.current) {
                        JsBarcode(barcodeRef.current, orderId || '0000', {
                            format: "CODE128",
                            displayValue: true,
                            fontSize: 20,
                            fontOptions: "bold",
                            textMargin: 5,
                            height: 60,
                            margin: 0
                        });
                    }

                    // Generate QR Code
                    if (qrRef.current) {
                        qrRef.current.innerHTML = ""; // Clear previous
                        const qrData = JSON.stringify({ id: orderId, name: toName, phone: toPhone });
                        new QRCode(qrRef.current, {
                            text: qrData,
                            width: 120,
                            height: 120,
                            colorDark : "#000000",
                            colorLight : "#ffffff",
                            correctLevel : QRCode.CorrectLevel.M
                        });
                    }
                }
            }, [orderId, toName, toAddress, toPhone, activeTab]);

            // Setup / Teardown Scanner
            useEffect(() => {
                if (activeTab === 'scanner') {
                    if (!scannerRef.current) {
                        scannerRef.current = new Html5QrcodeScanner("reader", { fps: 10, qrbox: {width: 250, height: 250} }, false);
                        scannerRef.current.render((decodedText) => {
                            try {
                                const data = JSON.parse(decodedText);
                                setScanResult(data);
                                scannerRef.current.clear();
                                setIsScanning(false);
                            } catch (e) {
                                // If it's not JSON, just show raw text
                                setScanResult({ id: decodedText, name: 'Unknown (Raw Text)' });
                                scannerRef.current.clear();
                                setIsScanning(false);
                            }
                        }, (error) => { /* ignore continuous errors */ });
                        setIsScanning(true);
                    }
                } else {
                    if (scannerRef.current) {
                        scannerRef.current.clear().catch(e => console.error(e));
                        scannerRef.current = null;
                        setIsScanning(false);
                    }
                }
            }, [activeTab]);

            const handlePrint = () => {
                window.print();
            };

            const saveSheetUrl = (e) => {
                setSheetUrl(e.target.value);
                localStorage.setItem('googleSheetUrl', e.target.value);
            };

            const syncToGoogleSheets = async () => {
                if (!sheetUrl) {
                    alert('Please configure your Google Apps Script Webhook URL in the Settings tab first!');
                    return;
                }
                setSyncStatus('Syncing...');
                try {
                    const response = await fetch(sheetUrl, {
                        method: 'POST',
                        mode: 'no-cors', // Important for simple Google Script calls from browser
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify(scanResult)
                    });
                    
                    setSyncStatus('Successfully saved to Google Sheets!');
                    setTimeout(() => setScanResult(null), 3000); // Reset after 3 seconds
                } catch (error) {
                    console.error(error);
                    setSyncStatus('Failed to sync. Check console.');
                }
            };

            const restartScan = () => {
                setScanResult(null);
                setSyncStatus('');
                scannerRef.current = new Html5QrcodeScanner("reader", { fps: 10, qrbox: {width: 250, height: 250} }, false);
                scannerRef.current.render((decodedText) => {
                    try {
                        const data = JSON.parse(decodedText);
                        setScanResult(data);
                        scannerRef.current.clear();
                        setIsScanning(false);
                    } catch (e) {
                        setScanResult({ id: decodedText, name: 'Unknown (Raw Text)' });
                        scannerRef.current.clear();
                        setIsScanning(false);
                    }
                });
                setIsScanning(true);
            };

            return (
                <div className="min-h-screen flex flex-col">
                    {/* Navigation - Hidden on Print */}
                    <nav id="no-print" className="bg-gray-800 text-white p-4 shadow-md">
                        <div className="max-w-6xl mx-auto flex justify-between items-center">
                            <h1 className="text-xl font-bold">📦 Lookstylo Manager</h1>
                            <div className="space-x-4">
                                <button onClick={() => setActiveTab('generator')} className={`px-4 py-2 rounded ${activeTab === 'generator' ? 'bg-blue-600' : 'hover:bg-gray-700'}`}>Generate Label</button>
                                <button onClick={() => setActiveTab('scanner')} className={`px-4 py-2 rounded ${activeTab === 'scanner' ? 'bg-blue-600' : 'hover:bg-gray-700'}`}>Scan QR</button>
                                <button onClick={() => setActiveTab('settings')} className={`px-4 py-2 rounded ${activeTab === 'settings' ? 'bg-blue-600' : 'hover:bg-gray-700'}`}>Settings</button>
                            </div>
                        </div>
                    </nav>

                    {/* Main Content */}
                    <main className="flex-grow p-4 md:p-8 max-w-7xl mx-auto w-full flex flex-col md:flex-row gap-8">
                        
                        {/* --- TAB: LABEL GENERATOR --- */}
                        {activeTab === 'generator' && (
                            <>
                                {/* Left Side: Input Form - Hidden on Print */}
                                <div id="no-print" className="w-full md:w-1/3 bg-white p-6 rounded-lg shadow-md h-fit">
                                    <h2 className="text-2xl font-bold mb-6 border-b pb-2">Label Details</h2>
                                    
                                    <div className="space-y-4">
                                        <div>
                                            <label className="block text-sm font-bold text-gray-700 mb-1">Order ID (Barcode)</label>
                                            <input type="text" value={orderId} onChange={(e) => setOrderId(e.target.value)} className="w-full p-2 border rounded focus:ring-2 focus:ring-blue-500 outline-none uppercase" />
                                        </div>
                                        <div>
                                            <label className="block text-sm font-bold text-gray-700 mb-1">Customer Name (TO)</label>
                                            <input type="text" value={toName} onChange={(e) => setToName(e.target.value)} className="w-full p-2 border rounded focus:ring-2 focus:ring-blue-500 outline-none uppercase" />
                                        </div>
                                        <div>
                                            <label className="block text-sm font-bold text-gray-700 mb-1">Full Address (TO)</label>
                                            <textarea rows="3" value={toAddress} onChange={(e) => setToAddress(e.target.value)} className="w-full p-2 border rounded focus:ring-2 focus:ring-blue-500 outline-none uppercase"></textarea>
                                        </div>
                                        <div>
                                            <label className="block text-sm font-bold text-gray-700 mb-1">Phone Number(s)</label>
                                            <input type="text" value={toPhone} onChange={(e) => setToPhone(e.target.value)} className="w-full p-2 border rounded focus:ring-2 focus:ring-blue-500 outline-none uppercase" />
                                        </div>
                                        
                                        <button onClick={handlePrint} className="w-full mt-6 bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-4 rounded shadow flex items-center justify-center gap-2">
                                            <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                                              <path fillRule="evenodd" d="M5 4v3H4a2 2 0 00-2 2v3a2 2 0 002 2h1v2a2 2 0 002 2h6a2 2 0 002-2v-2h1a2 2 0 002-2V9a2 2 0 00-2-2h-1V4a2 2 0 00-2-2H7a2 2 0 00-2 2zm8 0H7v3h6V4zm0 8H7v4h6v-4z" clipRule="evenodd" />
                                            </svg>
                                            Print A5 Label
                                        </button>
                                        <p className="text-xs text-gray-500 mt-2 text-center">Make sure to select "A5" paper size in your printer dialog.</p>
                                    </div>
                                </div>

                                {/* Right Side: A5 Label Preview */}
                                <div id="print-section" className="w-full md:w-2/3 flex justify-center">
                                    <div className="a5-container">
                                        
                                        {/* HEADER */}
                                        <div className="flex items-center justify-between border-b-2 border-transparent pb-4 mb-4">
                                            {/* Logo */}
                                            <div className="flex flex-col items-center justify-center w-1/4">
                                                <img src="LookStylo_Circular_Fixed(1).png" alt="LOOKSTYLO Logo" className="w-24 h-24 object-contain" />
                                            </div>

                                            {/* Brand Text */}
                                            <div className="text-center flex-1 px-2">
                                                <div className="text-brand-red font-extrabold text-3xl tracking-wide uppercase">LOOKSTLYO FASHION</div>
                                                <div className="text-brand-blue font-bold text-xl tracking-wider uppercase mt-1">SHARIEF ENTERPRISES</div>
                                            </div>

                                            {/* QR Code */}
                                            <div className="w-1/4 flex justify-end">
                                                <div ref={qrRef} className="border border-gray-200 p-1"></div>
                                            </div>
                                        </div>

                                        {/* BODY CONTENT */}
                                        <div className="flex-grow flex flex-col text-black">
                                            
                                            {/* FROM SECTION */}
                                            <div className="mb-8">
                                                <h3 className="font-extrabold text-2xl uppercase mb-2">FROM:</h3>
                                                <div className="font-bold text-xl leading-snug uppercase">
                                                    LOOKSTLYO FASHION,<br/>
                                                    SHOP NO 02, OPPSITE OFFICE<br/>
                                                    PAKKIRITHAKA JOLARPATTAI-<br/>
                                                    635851.<br/>
                                                    8680857511.
                                                </div>
                                            </div>

                                            {/* TO SECTION */}
                                            <div className="mb-4">
                                                <h3 className="font-extrabold text-2xl uppercase mb-2">TO,</h3>
                                                <div className="font-bold text-xl leading-snug uppercase">
                                                    {toName || ' '}<br/>
                                                    {toAddress ? toAddress.split('\n').map((line, i) => <React.Fragment key={i}>{line}<br/></React.Fragment>) : ' '}<br/>
                                                    {toPhone || ' '}
                                                </div>
                                            </div>

                                        </div>

                                        {/* FOOTER */}
                                        <div className="mt-auto flex flex-col items-center">
                                            {/* Barcode */}
                                            <div className="mb-6">
                                                <canvas ref={barcodeRef}></canvas>
                                            </div>

                                            {/* Socials */}
                                            <div className="flex items-center justify-between w-full font-bold text-xl text-brand-red uppercase px-4">
                                                <div className="flex items-center">
                                                    <InstagramIcon /> LOKSTLYO_FASHION
                                                </div>
                                                <div className="flex items-center">
                                                    <WhatsAppIcon /> 8680857511
                                                </div>
                                            </div>
                                        </div>

                                    </div>
                                </div>
                            </>
                        )}

                        {/* --- TAB: QR SCANNER --- */}
                        {activeTab === 'scanner' && (
                            <div className="w-full max-w-2xl mx-auto bg-white p-6 rounded-lg shadow-md">
                                <h2 className="text-2xl font-bold mb-6 text-center">Scan Order QR Code</h2>
                                
                                {isScanning && !scanResult && (
                                    <div id="reader" className="mb-6"></div>
                                )}
                                
                                {scanResult && (
                                    <div className="bg-gray-50 p-4 rounded border border-green-200 mb-6">
                                        <h3 className="font-bold text-lg mb-3 text-green-700">✓ QR Scan Complete!</h3>
                                        <div className="space-y-2 mb-4">
                                            <p><strong>Order ID:</strong> {scanResult.id}</p>
                                            <p><strong>Customer Name:</strong> {scanResult.name}</p>
                                            <p><strong>Phone:</strong> {scanResult.phone}</p>
                                        </div>
                                        
                                        <div className="space-x-3 flex">
                                            <button onClick={syncToGoogleSheets} className="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded">
                                                💾 Save to Sheets
                                            </button>
                                            <button onClick={restartScan} className="flex-1 bg-gray-600 hover:bg-gray-700 text-white font-bold py-2 px-4 rounded">
                                                🔄 Scan Again
                                            </button>
                                        </div>
                                        
                                        {syncStatus && (
                                            <p className={`mt-3 text-center text-sm font-bold ${syncStatus.includes('Successfully') ? 'text-green-600' : 'text-red-600'}`}>
                                                {syncStatus}
                                            </p>
                                        )}
                                    </div>
                                )}
                            </div>
                        )}

                        {/* --- TAB: SETTINGS --- */}
                        {activeTab === 'settings' && (
                            <div className="w-full max-w-2xl mx-auto bg-white p-6 rounded-lg shadow-md">
                                <h2 className="text-2xl font-bold mb-6 border-b pb-2">Settings</h2>
                                
                                <div className="space-y-4">
                                    <div>
                                        <label className="block text-sm font-bold text-gray-700 mb-2">
                                            Google Apps Script Webhook URL
                                        </label>
                                        <textarea 
                                            rows="3" 
                                            value={sheetUrl} 
                                            onChange={saveSheetUrl} 
                                            placeholder="https://script.google.com/macros/s/YOUR_DEPLOYMENT_ID/useless"
                                            className="w-full p-2 border rounded focus:ring-2 focus:ring-blue-500 outline-none font-mono text-xs"
                                        ></textarea>
                                        <p className="text-xs text-gray-500 mt-2">
                                            This URL will receive POST requests with scanned QR data. Configure your Google Sheets integration here.
                                        </p>
                                    </div>
                                    
                                    <div className="bg-blue-50 p-4 rounded border border-blue-200 mt-6">
                                        <h3 className="font-bold text-blue-900 mb-3">📋 How to Setup:</h3>
                                        <ol className="text-sm text-blue-800 space-y-2 list-decimal list-inside">
                                            <li>Create a Google Apps Script project</li>
                                            <li>Deploy it as a web app</li>
                                            <li>Copy the deployment URL above</li>
                                            <li>Scanned data will be posted to this endpoint</li>
                                        </ol>
                                    </div>
                                    
                                    <button 
                                        onClick={() => alert('Current URL: ' + (sheetUrl || 'Not configured'))}
                                        className="w-full bg-gray-600 hover:bg-gray-700 text-white font-bold py-2 px-4 rounded mt-6"
                                    >
                                        Test Connection
                                    </button>
                                </div>
                            </div>
                        )}

                    </main>
                </div>
            );
        }

        // --- RENDER APP ---
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
