<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lookstylo Order Manager</title>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- JsBarcode & QRCode & Scanner -->
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode/html5-qrcode.min.js" type="text/javascript"></script>

    <style>
        body { background-color: #f3f4f6; font-family: 'Arial', sans-serif; }
        
        /* Strict A5 Container */
        .a5-container {
            width: 148mm;
            height: 210mm;
            background: white;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            margin: 0 auto;
            padding: 8mm;
            box-sizing: border-box;
            position: relative;
            display: flex;
            flex-direction: column;
            color: black;
            overflow: hidden;
        }

        /* Print Settings */
        @media print {
            @page { size: A5 portrait; margin: 0; }
            body, html { background: white !important; margin: 0 !important; padding: 0 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            #no-print { display: none !important; }
            
            #print-section { 
                position: absolute; left: 0; top: 0; width: 100%; margin: 0; padding: 0; 
                display: flex !important; flex-direction: column; align-items: center;
                gap: 0 !important;
            }
            .a5-container {
                box-shadow: none !important; border: none !important;
                margin: 0 !important; padding: 8mm !important;
                page-break-after: always; page-break-inside: avoid;
                transform: none !important;
                overflow: hidden !important;
            }
            .print\:flex { display: flex !important; }
        }
        .text-brand-red { color: #d32f2f; }
        .text-brand-blue { color: #1976d2; }

        /* Remove number input spinners */
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }
        input[type=number] {
            -moz-appearance: textfield;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- ICON COMPONENTS ---
        const InstagramIcon = ({ className = "w-5 h-5" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect>
                <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path>
                <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line>
            </svg>
        );

        const WhatsAppIcon = ({ className = "w-5 h-5" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path>
            </svg>
        );

        // --- REUSABLE BARCODE & QR COMPONENTS ---
        const Barcode = ({ value }) => {
            const ref = useRef(null);
            useEffect(() => {
                if (ref.current && value) {
                    JsBarcode(ref.current, value, { format: "CODE128", displayValue: true, fontSize: 20, fontOptions: "bold", textMargin: 5, height: 60, margin: 0 });
                }
            }, [value]);
            return <canvas ref={ref}></canvas>;
        };

        const QRCodeRender = ({ data }) => {
            const ref = useRef(null);
            useEffect(() => {
                if (ref.current && data) {
                    ref.current.innerHTML = "";
                    new QRCode(ref.current, { text: data, width: 120, height: 120, colorDark: "#000000", colorLight: "#ffffff", correctLevel: QRCode.CorrectLevel.M });
                }
            }, [data]);
            return <div ref={ref} className="border border-gray-200 p-1 bg-white"></div>;
        };

        // --- REUSABLE LABEL COMPONENT ---
        const LabelContent = ({ orderId, toName, toAddress, toPhone, billName, billAddress, billPhone, copyLabel }) => (
            <div className="border-2 border-gray-900 flex-grow flex flex-col text-black bg-white box-border w-full h-full p-4 relative">
                {copyLabel && (
                    <div className="absolute top-0 right-0 bg-indigo-600 text-white text-[9px] px-2 py-0.5 font-bold uppercase z-10">
                        {copyLabel}
                    </div>
                )}
                {/* Header */}
                <div className="flex items-center justify-between border-b-2 border-gray-900 pb-4 mb-4">
                    <div className="w-1/4 flex flex-col items-center">
                        
                    </div>
                    <div className="text-center flex-1 px-2">
                        <div className="text-brand-red font-extrabold text-3xl tracking-wide uppercase">LOOKSTLYO FASHION</div>
                        <div className="text-brand-blue font-bold text-xl tracking-wider uppercase mt-1">SHARIEF ENTERPRISES</div>
                    </div>
                    <div className="w-1/4 flex justify-end">
                        <QRCodeRender data={JSON.stringify({ id: orderId, name: toName, phone: toPhone })} />
                    </div>
                </div>

                {/* Body Content */}
                <div className="flex-grow flex flex-col">
                    <div className="mb-6">
                        <h3 className="font-extrabold text-2xl uppercase mb-1">FROM:</h3>
                        <div className="font-bold text-lg leading-snug uppercase">
                            LOOKSTLYO FASHION,<br/>SHOP NO 02, OPPOSITE POST OFFICE<br/>PAKKIRITHAKA JOLARPATTAI - 635851.<br/>📞 8680857511
                        </div>
                    </div>
                    
                    <div className="mb-4">
                        <h3 className="font-extrabold text-2xl uppercase mb-1">TO,</h3>
                        <div className="font-bold text-lg leading-snug uppercase">
                            {toName || ' '}<br/>
                            {toAddress ? toAddress.split('\n').map((line, i) => <React.Fragment key={i}>{line}<br/></React.Fragment>) : ' '}<br/>
                            {toPhone ? `📞 ${toPhone}` : ' '}
                        </div>
                    </div>

                    {(billName || billAddress || billPhone) && (
                        <div className="mb-4 pt-4 border-t border-dashed border-gray-400">
                            <h3 className="font-extrabold text-xl uppercase mb-1">BILL TO,</h3>
                            <div className="font-bold text-md leading-snug uppercase text-gray-700">
                                {billName || ' '}<br/>
                                {billAddress ? billAddress.split('\n').map((line, i) => <React.Fragment key={i}>{line}<br/></React.Fragment>) : ' '}<br/>
                                {billPhone || ' '}
                            </div>
                        </div>
                    )}
                </div>

                {/* Footer */}
                <div className="mt-auto flex flex-col items-center pt-4 border-t-2 border-gray-900">
                    <div className="mb-4 bg-white p-2 rounded">
                        <Barcode value={orderId || '0000'} />
                    </div>
                    <div className="flex items-center justify-between w-full font-bold text-lg text-brand-red uppercase px-4">
                        <div className="flex items-center gap-1.5"><InstagramIcon className="w-6 h-6" /> LOKSTLYO_FASHION</div>
                        <div className="flex items-center gap-1.5"><WhatsAppIcon className="w-6 h-6" /> 8680857511</div>
                    </div>
                </div>
            </div>
        );

        function App() {
            const [activeTab, setActiveTab] = useState('billing'); // Default to billing
            const [sheetUrl, setSheetUrl] = useState(localStorage.getItem('googleSheetUrl') || '');
            const [serverUrl, setServerUrl] = useState(localStorage.getItem('serverUrl') || '/api/save-label');

            // Helper to generate IDs like LSF-APR-001
            const generateMonthlyId = (suffix) => {
                const month = new Date().toLocaleString('en-US', { month: 'short' }).toUpperCase();
                return `LSF-${month}-${suffix}`;
            };

            // --- GENERATOR STATE ---
            const [orderId, setOrderId] = useState(generateMonthlyId('001'));
            const [toName, setToName] = useState('HAKKEM');
            const [toAddress, setToAddress] = useState('Poolankudiyiruppu Tenkasi\nTamilnadu -627813');
            const [toPhone, setToPhone] = useState('9514598301 - 9952214334');
            const [billName, setBillName] = useState('');
            const [billAddress, setBillAddress] = useState('');
            const [billPhone, setBillPhone] = useState('');

            // --- BILLING STATE ---
            const [billInvoice, setBillInvoice] = useState(generateMonthlyId('001'));
            const [billDate, setBillDate] = useState(new Date().toISOString().split('T')[0]);
            const [billCustomerName, setBillCustomerName] = useState('');
            const [billCustomerPhone, setBillCustomerPhone] = useState('');
            const [billCustomerAddress, setBillCustomerAddress] = useState('');
            const [billDelivery, setBillDelivery] = useState('Store Walk-in');
            const [billCourier, setBillCourier] = useState('Professional Courier');
            const [billTracking, setBillTracking] = useState('');
            const [billDiscount, setBillDiscount] = useState(0);
            const [billPromoCode, setBillPromoCode] = useState('NO CODE');
            const [billItems, setBillItems] = useState([{ id: Date.now(), particular: '', qty: 1, rate: 0 }]);
            
            // --- NEW: SPLIT PAYMENT STATE ---
            const [paidGpay, setPaidGpay] = useState(0);
            const [paidCash, setPaidCash] = useState(0);

            // --- INBUILT PARTICULARS ---
            const PRESET_ITEMS = {
                'IPL JERSEY MI - M': 280,
                'IPL JERSEY MI - L': 280,
                'IPL JERSEY MI - XL': 280,
                'IPL JERSEY RCB - M': 280,
                'IPL JERSEY RCB - L': 280,
                'IPL JERSEY RCB - XL': 280,
                'IPL JERSEY CSK - M': 280,
                'IPL JERSEY CSK - L': 280,
                'IPL JERSEY CSK - XL': 280,
                'FOOT BALL JERSEY - M': 280,
                'FOOT BALL JERSEY - L': 280,
                'FOOT BALL JERSEY - XL': 280,
                'BACKPRINT DROPSHOLDER - M': 380,
                'BACKPRINT DROPSHOLDER - L': 380,
                'BACKPRINT DROPSHOLDER - XL': 380,
                'BACKPRINT DROPSHOLDER - XXL': 380,
                'DIS FAB POLO 0838 - M': 500,
                'DIS FAB POLO 0838 - L': 500,
                'DIS FAB POLO 0838 - XL': 500,
                'NET FOLDING DROPSHOLDER 0839 - M': 450,
                'NET FOLDING DROPSHOLDER 0839 - L': 450,
                'NET FOLDING DROPSHOLDER 0839 - XL': 450,
            };

            // --- SCANNER STATE ---
            const [scanResult, setScanResult] = useState(null);
            const [isScanning, setIsScanning] = useState(false);
            const [syncStatus, setSyncStatus] = useState('');
            const scannerRef = useRef(null);

            // Effect: Scanner Setup
            useEffect(() => {
                if (activeTab === 'scanner') {
                    if (!scannerRef.current) {
                        scannerRef.current = new Html5QrcodeScanner("reader", { fps: 10, qrbox: {width: 250, height: 250} }, false);
                        scannerRef.current.render((decodedText) => {
                            try { setScanResult(JSON.parse(decodedText)); } catch (e) { setScanResult({ id: decodedText, name: 'Unknown (Raw Text)' }); }
                            scannerRef.current.clear(); setIsScanning(false);
                        });
                        setIsScanning(true);
                    }
                } else if (scannerRef.current) {
                    scannerRef.current.clear().catch(e => console.error(e));
                    scannerRef.current = null; setIsScanning(false);
                }
            }, [activeTab]);

            // Handlers
            const handlePrint = () => window.print();
            
            const handleSave = async () => {
                const data = { orderId, toName, toAddress, toPhone, billName, billAddress, billPhone };
                localStorage.setItem('savedLabel', JSON.stringify(data));
                if (serverUrl) {
                    try {
                        const res = await fetch(serverUrl, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
                        if (res.ok) alert('Saved locally and sent to server!');
                    } catch (err) { alert('Saved locally (backend unavailable).'); }
                } else alert('Label details saved locally!');
            };

            const syncToGoogleSheets = async () => {
                if (!sheetUrl) return alert('Configure Webhook URL in Settings!');
                setSyncStatus('Syncing...');
                try {
                    await fetch(sheetUrl, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(scanResult) });
                    setSyncStatus('Successfully saved to Google Sheets!');
                    setTimeout(() => setScanResult(null), 3000);
                } catch (error) { setSyncStatus('Failed to sync. Check console.'); }
            };

            // Billing Calculations
            const updateBillItem = (id, field, value) => {
                setBillItems(billItems.map(i => {
                    if (i.id === id) {
                        let updated = { ...i, [field]: field === 'particular' ? value : (value === '' ? '' : parseFloat(value)) };
                        
                        // Auto-fill price if a preset item is selected
                        if (field === 'particular') {
                            const upperVal = value.toUpperCase();
                            if (PRESET_ITEMS[upperVal]) {
                                updated.rate = PRESET_ITEMS[upperVal];
                            }
                        }
                        
                        return updated;
                    }
                    return i;
                }));
            };
            
            const addBillItem = () => setBillItems([...billItems, { id: Date.now(), particular: '', qty: 1, rate: 0 }]);
            const removeBillItem = (id) => setBillItems(billItems.filter(i => i.id !== id));
            
            const subTotal = billItems.reduce((acc, item) => acc + ((item.qty || 0) * (item.rate || 0)), 0);
            const discountAmount = subTotal * ((Number(billDiscount) || 0) / 100);
            const totalAfterDiscount = subTotal - discountAmount;
            const grandTotal = Math.round(totalAfterDiscount);
            const roundOffAmount = grandTotal - totalAfterDiscount;
            const totalQty = billItems.reduce((acc, item) => acc + Number(item.qty || 0), 0);
            
            // --- NEW: BALANCE CALCULATION ---
            const balanceAmount = grandTotal - (Number(paidGpay) || 0) - (Number(paidCash) || 0);

            // Reusable Bill Function
            const renderBillContent = (copyLabel) => {
                let deliveryText = billDelivery === 'Courier' ? (billTracking ? `${billCourier} (Track: ${billTracking})` : billCourier) : 'Store Walk-in';
                let terms = billDelivery === 'Courier' 
                    ? ["Unboxing video is mandatory for any claims.", "Exchange for damaged/wrong items within 2 days of delivery.", "Shipping charges are non-refundable."] 
                    : ["Goods once sold will not be taken back."];

                let promoDetails = { title: "", subtitle: "" };
                if (billPromoCode === 'FREESHIP') {
                    promoDetails = { title: "Free Shipping on your next purchase", subtitle: "(Valid only for 10 days after receiving courier)" };
                } else if (billPromoCode === 'GET350 SHIRT') {
                    promoDetails = { title: "Get ₹350 Off on your next Shirt purchase", subtitle: "(Valid only for 10 days after receiving courier)" };
                } else if (billPromoCode === '10%DIS') {
                    promoDetails = { title: "Get 10% Flat Discount on your next purchase", subtitle: "(Valid only for 10 days after receiving courier)" };
                } else if (billPromoCode === '5%DIS') {
                    promoDetails = { title: "Get 5% Flat Discount on your next purchase", subtitle: "(Valid only for 10 days after receiving courier)" };
                }

                return (
                    <div className="border-2 border-gray-900 w-full h-full flex flex-col relative p-4 bg-white box-border text-xs">
                        {/* Copy Type Label (Inside Paper) */}
                        {copyLabel && (
                            <div className="absolute top-0 right-0 bg-gray-900 text-white text-[9px] px-2 py-0.5 font-bold uppercase">
                                {copyLabel}
                            </div>
                        )}
                        {/* Header */}
                        <div className="text-center border-b-2 border-gray-900 pb-3 mb-3 mt-2 shrink-0">
                            
                            <h1 className="text-3xl font-extrabold tracking-wider text-gray-900 leading-none mb-1 font-serif mt-2">LOOKSTYLO FASHION</h1>
                            <p className="text-[11px] text-gray-800 leading-tight mb-1">
                                Shop No. 2, opposite post office, Tirupathur Main Road,<br/>
                                Pakkirithaka, Jolarpattai, Katteri Village - 635851
                            </p>
                            <div className="flex justify-center items-center gap-3 font-bold text-gray-900 mt-1">
                                <span className="flex items-center gap-1"><WhatsAppIcon className="w-3.5 h-3.5" /> 8680857511</span> | 
                                <span className="flex items-center gap-1"><InstagramIcon className="w-3.5 h-3.5" /> @lookstylo_fashion</span>
                            </div>
                            <p className="font-bold text-gray-900 mt-1">GSTIN: 33NEYPS4388G1ZC</p>
                        </div>

                        {/* Customer Info */}
                        <div className="flex justify-between mb-3 font-medium shrink-0">
                            <div className="space-y-1">
                                <p><span className="w-14 inline-block text-gray-600">Name:</span> <span className="uppercase border-b border-gray-400 pb-0.5 inline-block min-w-[120px]">{billCustomerName || 'Walk-in Customer'}</span></p>
                                <p><span className="w-14 inline-block text-gray-600">Phone:</span> <span className="border-b border-gray-400 pb-0.5 inline-block min-w-[120px]">{billCustomerPhone || '-'}</span></p>
                                <p><span className="w-14 inline-block text-gray-600">Del:</span> <span className="border-b border-gray-400 pb-0.5 inline-block min-w-[120px] font-bold">{deliveryText}</span></p>
                            </div>
                            <div className="space-y-1 text-right">
                                <p><span className="text-gray-600 mr-2">Inv No:</span> <span className="font-bold">{billInvoice}</span></p>
                                <p><span className="text-gray-600 mr-2">Date:</span> <span>{billDate ? billDate.split('-').reverse().join('-') : ''}</span></p>
                            </div>
                        </div>

                        {/* Table */}
                        <div className="flex-grow border-t-2 border-gray-900 flex flex-col mt-1">
                            <table className="w-full text-left border-collapse">
                                <thead>
                                    <tr className="border-b-2 border-gray-900 bg-gray-50">
                                        <th className="py-2 px-1 font-bold w-10 text-center border-r border-gray-400">S.No</th>
                                        <th className="py-2 px-2 font-bold border-r border-gray-400">Particulars</th>
                                        <th className="py-2 px-1 font-bold text-center w-10 border-r border-gray-400">Qty</th>
                                        <th className="py-2 px-1 font-bold text-right w-16 border-r border-gray-400">Rate</th>
                                        <th className="py-2 px-2 font-bold text-right w-20">Amount</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {billItems.map((item, index) => (
                                        <tr key={item.id} className="border-b border-gray-200">
                                            <td className="py-2 px-1 text-center border-r border-gray-400">{index + 1}</td>
                                            <td className="py-2 px-2 border-r border-gray-400 uppercase">{item.particular}</td>
                                            <td className="py-2 px-1 text-center border-r border-gray-400">{item.qty}</td>
                                            <td className="py-2 px-1 text-right border-r border-gray-400">{item.rate ? parseFloat(item.rate).toFixed(2) : ''}</td>
                                            <td className="py-2 px-2 text-right">{(item.qty * item.rate) ? (item.qty * item.rate).toFixed(2) : ''}</td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                            <div className="text-[9px] text-gray-500 italic py-1 px-1 border-b-2 border-gray-900 bg-gray-50 text-right mt-auto">
                                * All prices are inclusive of applicable GST
                            </div>
                        </div>

                        {/* Footer */}
                        <div className="pt-2 flex justify-between mt-2 shrink-0">
                            <div className="w-[55%] text-[10px] text-gray-600 flex flex-col justify-between">
                                <div>
                                    <p className="font-bold text-gray-800 mb-1">Terms & Conditions:</p>
                                    <ul className="list-disc pl-3 space-y-0.5">{terms.map((t, i) => <li key={i}>{t}</li>)}</ul>
                                    <p className="mt-2 text-xs italic">Thank you for shopping with us!</p>
                                    {billPromoCode !== 'NO CODE' && (
                                        <div className="mt-2 border-2 border-dashed border-gray-400 p-1.5 rounded bg-gray-50 text-center">
                                            <p className="font-bold text-gray-800 text-[10px] uppercase">🎁 Online Special</p>
                                            <p className="text-[9px] text-gray-600 mt-0.5">{promoDetails.title}</p>
                                            <p className="text-[8px] text-gray-500 font-semibold mt-0.5 uppercase">{promoDetails.subtitle}</p>
                                            <p className="text-[10px] font-bold mt-0.5">Use Code: <span className="text-brand-red text-xs">{billPromoCode}</span></p>
                                        </div>
                                    )}
                                </div>
                            </div>
                            <div className="w-[45%]">
                                <div className="flex justify-between py-1"><span className="font-semibold">Sub Total:</span><span>₹ {subTotal.toFixed(2)}</span></div>
                                {billDiscount > 0 && <div className="flex justify-between py-1 text-gray-700"><span>Discount ({billDiscount}%):</span><span>- ₹ {discountAmount.toFixed(2)}</span></div>}
                                {roundOffAmount !== 0 && <div className="flex justify-between py-1 text-gray-700"><span>Round Off:</span><span>{roundOffAmount > 0 ? '+ ' : '- '}₹ {Math.abs(roundOffAmount).toFixed(2)}</span></div>}
                                <div className="flex justify-between text-sm font-bold border-t border-b border-gray-900 py-2 mt-1 bg-gray-50 px-1 mb-1"><span>Grand Total:</span><span>₹ {grandTotal.toFixed(2)}</span></div>
                                
                                {/* New Split Payment Output */}
                                <div className="flex justify-between text-[11px] font-semibold text-gray-800 px-1 py-0.5"><span>Paid (GPay):</span><span>₹ {(Number(paidGpay) || 0).toFixed(2)}</span></div>
                                <div className="flex justify-between text-[11px] font-semibold text-gray-800 px-1 py-0.5"><span>Paid (Cash):</span><span>₹ {(Number(paidCash) || 0).toFixed(2)}</span></div>
                                
                                <div className="flex justify-between text-[12px] font-bold text-gray-900 mt-1 px-1 border-t border-b border-gray-300 py-1 mb-1">
                                    <span>Balance:</span><span>₹ {balanceAmount.toFixed(2)}</span>
                                </div>

                                <div className="text-[10px] text-gray-500 mt-1 px-1">Total Qty: {totalQty}</div>
                            </div>
                        </div>
                    </div>
                );
            };

            return (
                <div className="min-h-screen flex flex-col">
                    {/* Navigation - Hidden on Print */}
                    <nav id="no-print" className="bg-gray-900 text-white p-4 shadow-md">
                        <div className="max-w-7xl mx-auto flex justify-between items-center">
                            <h1 className="text-xl font-bold flex items-center gap-2">
                                📦 Lookstylo Manager
                            </h1>
                            <div className="flex space-x-2 md:space-x-4">
                                <button onClick={() => setActiveTab('billing')} className={"px-4 py-2 rounded font-semibold transition-colors " + (activeTab === 'billing' ? 'bg-indigo-600' : 'hover:bg-gray-700')}>Billing</button>
                                <button onClick={() => setActiveTab('generator')} className={"px-4 py-2 rounded font-semibold transition-colors " + (activeTab === 'generator' ? 'bg-blue-600' : 'hover:bg-gray-700')}>Label Only</button>
                                <button onClick={() => setActiveTab('scanner')} className={"px-4 py-2 rounded font-semibold transition-colors " + (activeTab === 'scanner' ? 'bg-blue-600' : 'hover:bg-gray-700')}>Scanner</button>
                                <button onClick={() => setActiveTab('settings')} className={"px-4 py-2 rounded font-semibold transition-colors " + (activeTab === 'settings' ? 'bg-gray-600' : 'hover:bg-gray-700')}>Settings</button>
                            </div>
                        </div>
                    </nav>

                    <main className="flex-grow p-4 md:p-6 max-w-7xl mx-auto w-full flex flex-col md:flex-row gap-8">
                        
                        {/* -------------------- TAB: BILLING -------------------- */}
                        {activeTab === 'billing' && (
                            <>
                                <div id="no-print" className="w-full md:w-1/2 bg-white p-6 rounded-lg shadow-xl h-fit border border-gray-100">
                                    <div className="flex justify-between items-center mb-6 border-b pb-3">
                                        <div>
                                            <h2 className="text-2xl font-bold text-indigo-900">Billing Setup</h2>
                                            <p className="text-sm text-gray-500">Create Bill & Shipping Label simultaneously</p>
                                        </div>
                                    </div>

                                    <div className="grid grid-cols-3 gap-4 mb-4">
                                        <div><label className="block text-xs font-semibold text-gray-500 uppercase mb-1">Invoice No.</label><input type="text" value={billInvoice} onChange={e=>setBillInvoice(e.target.value)} className="w-full p-2 border rounded focus:ring-2 outline-none" /></div>
                                        <div><label className="block text-xs font-semibold text-gray-500 uppercase mb-1">Date</label><input type="date" value={billDate} onChange={e=>setBillDate(e.target.value)} className="w-full p-2 border rounded focus:ring-2 outline-none" /></div>
                                        <div className="col-span-3"><label className="block text-xs font-semibold text-gray-500 uppercase mb-1">Customer Name</label><input type="text" value={billCustomerName} onChange={e=>setBillCustomerName(e.target.value)} placeholder="Walk-in Customer" className="w-full p-2 border rounded focus:ring-2 outline-none" /></div>
                                        <div className="col-span-3"><label className="block text-xs font-semibold text-gray-500 uppercase mb-1">Phone Number</label><input type="text" value={billCustomerPhone} onChange={e=>setBillCustomerPhone(e.target.value)} placeholder="Optional" className="w-full p-2 border rounded focus:ring-2 outline-none" /></div>
                                        
                                        <div className="col-span-3">
                                            <label className="block text-xs font-semibold text-gray-500 uppercase mb-1">Delivery Type</label>
                                            <select value={billDelivery} onChange={e=>setBillDelivery(e.target.value)} className="w-full p-2.5 border rounded focus:ring-2 focus:ring-indigo-500 outline-none bg-white font-bold text-indigo-700">
                                                <option value="Store Walk-in">🛍️ Store Walk-in</option>
                                                <option value="Courier">🚚 Courier Delivery (Generates Label)</option>
                                            </select>
                                        </div>
                                        
                                        {/* Courier Extras (Includes Address for Label generation) */}
                                        {billDelivery === 'Courier' && (
                                            <div className="col-span-3 grid grid-cols-2 gap-4 bg-indigo-50 p-4 rounded-lg border border-indigo-200">
                                                <div><label className="block text-xs font-semibold text-indigo-700 uppercase mb-1">Select Courier</label><select value={billCourier} onChange={e=>setBillCourier(e.target.value)} className="w-full p-2 border border-indigo-200 rounded bg-white outline-none"><option value="Professional Courier">Professional Courier</option><option value="ST Courier">ST Courier</option><option value="India Post">India Post</option></select></div>
                                                <div><label className="block text-xs font-semibold text-indigo-700 uppercase mb-1">Tracking ID</label><input type="text" value={billTracking} onChange={e=>setBillTracking(e.target.value)} placeholder="Tracking No." className="w-full p-2 border border-indigo-200 rounded bg-white outline-none" /></div>
                                                <div className="col-span-2">
                                                    <label className="block text-xs font-semibold text-indigo-700 uppercase mb-1">Shipping Address (For Label)</label>
                                                    <textarea rows="2" value={billCustomerAddress} onChange={e=>setBillCustomerAddress(e.target.value)} placeholder="Full Delivery Address" className="w-full p-2 border border-indigo-200 rounded bg-white outline-none resize-none"></textarea>
                                                </div>
                                            </div>
                                        )}
                                    </div>

                                    <div className="border border-gray-200 rounded-xl overflow-hidden mb-4">
                                        <div className="bg-gray-50 px-4 py-3 border-b border-gray-200"><h3 className="font-semibold text-gray-700">Particulars</h3></div>
                                        <div className="p-4 space-y-3">
                                            <datalist id="preset-items">
                                                {Object.keys(PRESET_ITEMS).map(item => <option key={item} value={item} />)}
                                            </datalist>
                                            {billItems.map(item => (
                                                <div key={item.id} className="flex gap-2">
                                                    <input list="preset-items" type="text" placeholder="Item Name" value={item.particular} onChange={e=>updateBillItem(item.id, 'particular', e.target.value)} className="flex-grow p-2 border rounded text-sm uppercase outline-none focus:ring-1 focus:ring-indigo-500" />
                                                    <input type="number" min="1" value={item.qty} onChange={e=>updateBillItem(item.id, 'qty', e.target.value)} className="w-16 p-2 border rounded text-sm outline-none focus:ring-1 focus:ring-indigo-500" />
                                                    <input type="number" min="0" value={item.rate} placeholder="Rate" onChange={e=>updateBillItem(item.id, 'rate', e.target.value)} className="w-24 p-2 border rounded text-sm outline-none focus:ring-1 focus:ring-indigo-500" />
                                                    <button onClick={()=>removeBillItem(item.id)} className={"text-red-500 hover:bg-red-50 px-2 rounded " + (billItems.length === 1 ? 'invisible' : '')}>✕</button>
                                                </div>
                                            ))}
                                            <button onClick={addBillItem} className="text-sm font-bold text-indigo-600 hover:bg-indigo-50 px-3 py-1 rounded transition-colors">+ Add Row</button>
                                        </div>
                                    </div>

                                    <div className="grid grid-cols-2 md:grid-cols-4 gap-4 bg-gray-50 p-4 rounded-lg border border-gray-200">
                                        <div><label className="block text-xs font-semibold text-gray-700 uppercase mb-1">Discount (%)</label><input type="number" min="0" max="100" value={billDiscount} onChange={e=>setBillDiscount(e.target.value)} className="w-full p-2 border rounded outline-none" /></div>
                                        <div><label className="block text-xs font-semibold text-gray-700 uppercase mb-1">Paid GPay (₹)</label><input type="number" min="0" value={paidGpay} onChange={e=>setPaidGpay(e.target.value)} className="w-full p-2 border rounded outline-none" /></div>
                                        <div><label className="block text-xs font-semibold text-gray-700 uppercase mb-1">Paid Cash (₹)</label><input type="number" min="0" value={paidCash} onChange={e=>setPaidCash(e.target.value)} className="w-full p-2 border rounded outline-none" /></div>
                                        <div>
                                            <label className="block text-xs font-semibold text-gray-700 uppercase mb-1">Next Promo</label>
                                            <select value={billPromoCode} onChange={e=>setBillPromoCode(e.target.value)} className="w-full p-2 border rounded outline-none bg-white">
                                                <option value="NO CODE">NO CODE</option>
                                                <option value="FREESHIP">FREESHIP</option>
                                                <option value="GET350 SHIRT">GET350 SHIRT</option>
                                                <option value="10%DIS">10%DIS</option>
                                                <option value="5%DIS">5%DIS</option>
                                            </select>
                                        </div>
                                    </div>
                                    
                                    <div className="mt-4 flex justify-between items-center px-2">
                                        <span className="text-gray-600 font-bold uppercase text-sm">Balance Remaining:</span>
                                        <span className={"text-2xl font-extrabold " + (balanceAmount > 0 ? "text-red-600" : "text-green-600")}>₹ {balanceAmount.toFixed(2)}</span>
                                    </div>

                                    <button onClick={handlePrint} className="w-full mt-6 bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3.5 px-4 rounded-lg shadow-lg flex justify-center items-center gap-2 transition-transform transform hover:scale-[1.01]">
                                        🖨️ Print Bill {billDelivery === 'Courier' ? '& Shipping Label' : ''}
                                    </button>
                                </div>

                                <div id="print-section" className="w-full md:w-1/2 flex flex-col gap-6 items-center bg-gray-200 p-4 print:p-0 print:bg-white rounded overflow-y-auto">
                                    <div className="text-center text-xs font-bold text-gray-500 uppercase tracking-widest print:hidden">Live Previews</div>
                                    
                                    {/* Copy 1: Buyer's Bill */}
                                    <div className="a5-container relative print:scale-100 transform origin-top scale-[0.85] md:scale-95 shadow-2xl transition-all">
                                        {renderBillContent("Original - Buyer's Copy")}
                                    </div>

                                    {/* Copy 2: Shop Bill (Hidden on screen to save space, visible on print) */}
                                    <div className="a5-container relative hidden print:flex">
                                        {renderBillContent("Duplicate - Shop Copy")}
                                    </div>

                                    {/* Copy 3: Shipping Label (Conditional based on Delivery Mode) */}
                                    {billDelivery === 'Courier' && (
                                        <div className="a5-container relative print:scale-100 transform origin-top scale-[0.85] md:scale-95 shadow-2xl transition-all print:flex">
                                            <LabelContent 
                                                copyLabel="Shipping Label"
                                                orderId={billTracking || billInvoice} 
                                                toName={billCustomerName} 
                                                toAddress={billCustomerAddress} 
                                                toPhone={billCustomerPhone} 
                                            />
                                        </div>
                                    )}
                                </div>
                            </>
                        )}

                        {/* -------------------- TAB: GENERATOR (Label Only) -------------------- */}
                        {activeTab === 'generator' && (
                            <>
                                <div id="no-print" className="w-full md:w-1/3 bg-white p-6 rounded-lg shadow-md h-fit">
                                    <h2 className="text-2xl font-bold mb-6 border-b pb-2">Manual Label</h2>
                                    <div className="space-y-4">
                                        <div><label className="block text-sm font-bold text-gray-700 mb-1">Order ID</label><input type="text" value={orderId} onChange={(e) => setOrderId(e.target.value)} className="w-full p-2 border rounded outline-none uppercase" /></div>
                                        <div><label className="block text-sm font-bold text-gray-700 mb-1">Name (TO)</label><input type="text" value={toName} onChange={(e) => setToName(e.target.value)} className="w-full p-2 border rounded outline-none uppercase" /></div>
                                        <div><label className="block text-sm font-bold text-gray-700 mb-1">Address (TO)</label><textarea rows="3" value={toAddress} onChange={(e) => setToAddress(e.target.value)} className="w-full p-2 border rounded outline-none uppercase"></textarea></div>
                                        <div><label className="block text-sm font-bold text-gray-700 mb-1">Phone Number(s)</label><input type="text" value={toPhone} onChange={(e) => setToPhone(e.target.value)} className="w-full p-2 border rounded outline-none uppercase" /></div>
                                        <button onClick={handlePrint} className="w-full mt-6 bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded shadow">Print Label Only</button>
                                        <button onClick={handleSave} className="w-full mt-3 bg-gray-800 hover:bg-gray-900 text-white font-bold py-3 px-4 rounded shadow">Save Label Data</button>
                                    </div>
                                </div>
                                <div id="print-section" className="w-full md:w-2/3 flex justify-center">
                                    <div className="a5-container shadow-2xl">
                                        {/* LOGO IN MANUAL LABEL IS HANDLED BY THE LABELCONTENT COMPONENT */}
                                        <LabelContent orderId={orderId} toName={toName} toAddress={toAddress} toPhone={toPhone} />
                                    </div>
                                </div>
                            </>
                        )}

                        {/* -------------------- TAB: SCANNER -------------------- */}
                        {activeTab === 'scanner' && (
                            <div className="w-full max-w-2xl mx-auto bg-white p-6 rounded-lg shadow-md">
                                <h2 className="text-2xl font-bold mb-6 text-center">Scan Order QR Code</h2>
                                {isScanning && !scanResult && <div id="reader" className="mb-6"></div>}
                                {scanResult && (
                                    <div className="bg-gray-50 p-4 rounded border border-green-200 mb-6">
                                        <h3 className="font-bold text-lg mb-3 text-green-700">✅ QR Scan Complete!</h3>
                                        <div className="space-y-2 mb-4">
                                            <p><strong>Order ID:</strong> {scanResult.id}</p>
                                            <p><strong>Customer Name:</strong> {scanResult.name}</p>
                                            <p><strong>Phone:</strong> {scanResult.phone}</p>
                                        </div>
                                        <div className="space-x-3 flex">
                                            <button onClick={syncToGoogleSheets} className="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded">💾 Save to Sheets</button>
                                            <button onClick={() => {setScanResult(null); setIsScanning(true);}} className="flex-1 bg-gray-600 hover:bg-gray-700 text-white font-bold py-2 px-4 rounded">🔄 Scan Again</button>
                                        </div>
                                        {syncStatus && <p className={"mt-3 text-center text-sm font-bold " + (syncStatus.includes('Successfully') ? 'text-green-600' : 'text-red-600')}>{syncStatus}</p>}
                                    </div>
                                )}
                            </div>
                        )}

                        {/* -------------------- TAB: SETTINGS -------------------- */}
                        {activeTab === 'settings' && (
                            <div className="w-full max-w-2xl mx-auto bg-white p-6 rounded-lg shadow-md">
                                <h2 className="text-2xl font-bold mb-6 border-b pb-2">Settings</h2>
                                <div className="space-y-4">
                                    <div>
                                        <label className="block text-sm font-bold text-gray-700 mb-2">Google Apps Script Webhook URL</label>
                                        <textarea rows="3" value={sheetUrl} onChange={e => { setSheetUrl(e.target.value); localStorage.setItem('googleSheetUrl', e.target.value); }} placeholder="https://script.google.com/macros/s/..." className="w-full p-2 border rounded focus:ring-2 outline-none font-mono text-xs"></textarea>
                                    </div>
                                    <div>
                                        <label className="block text-sm font-bold text-gray-700 mb-2">Backend Server URL (Node API)</label>
                                        <textarea rows="2" value={serverUrl} onChange={e => { setServerUrl(e.target.value); localStorage.setItem('serverUrl', e.target.value); }} placeholder="/api/save-label" className="w-full p-2 border rounded focus:ring-2 outline-none font-mono text-xs"></textarea>
                                    </div>
                                    <button onClick={() => alert('Saved Settings')} className="w-full bg-gray-800 text-white font-bold py-2 px-4 rounded mt-6">Save & Test Connection</button>
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
