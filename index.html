<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Lookstylo Fashion Pro</title>
    <link rel="manifest" id="dynamic-manifest" />
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode/html5-qrcode.min.js" type="text/javascript"></script>

    <style>
        body { background-color: #f8fafc; font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        .a5-container {
            width: 148mm; height: 210mm; background: white;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            margin: 0 auto; padding: 8mm; box-sizing: border-box;
            position: relative; display: flex; flex-direction: column;
            color: black; overflow: hidden; border-radius: 4px;
        }

        .paid-seal {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%) rotate(-15deg);
            border: 6px solid #10b981; color: #10b981;
            font-size: 60px; font-weight: 900; padding: 10px 30px;
            border-radius: 15px; opacity: 0.15; pointer-events: none;
            text-transform: uppercase; letter-spacing: 5px; z-index: 50;
        }

        @media print {
            body, html { background: white !important; margin: 0 !important; padding: 0 !important; height: auto !important; min-height: auto !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .no-print { display: none !important; }
            #root, .min-h-screen, main { display: block !important; padding: 0 !important; margin: 0 !important; max-width: none !important; height: auto !important; min-height: 0 !important; overflow: visible !important; }
            .print-section { position: static !important; width: 100% !important; margin: 0 !important; padding: 0 !important; display: block !important; background: white !important; box-shadow: none !important; border: none !important; overflow: visible !important; }
            .a5-container { width: 148mm !important; height: 209mm !important; box-sizing: border-box !important; box-shadow: none !important; border: none !important; margin: 0 !important; padding: 8mm !important; page-break-after: always; break-after: page; page-break-inside: avoid; transform: none !important; overflow: hidden !important; border-radius: 0 !important; display: flex !important; }
            .a5-container:last-of-type, .print-section > div:last-child { page-break-after: auto !important; break-after: auto !important; }
            .print\:flex { display: flex !important; }
            .paid-seal { opacity: 0.2 !important; border-width: 4px !important; }
        }
        
        .text-brand-red { color: #d32f2f; }
        .text-brand-blue { color: #1976d2; }
        input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
        
        /* New Animations for Login Screen */
        @keyframes blob {
            0% { transform: translate(0px, 0px) scale(1); }
            33% { transform: translate(30px, -50px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
            100% { transform: translate(0px, 0px) scale(1); }
        }
        .animate-blob { animation: blob 7s infinite; }
        .animation-delay-2000 { animation-delay: 2s; }
        .animation-delay-4000 { animation-delay: 4s; }
    </style>
</head>
<body class="text-slate-800 antialiased selection:bg-indigo-200 selection:text-indigo-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const generateSafeId = () => {
            if (typeof crypto !== 'undefined' && crypto.randomUUID) return crypto.randomUUID();
            return 'id-' + Math.random().toString(36).substr(2, 9) + '-' + Date.now();
        };

        // ✨ SMART IMAGE COMPRESSOR to prevent LocalStorage crashes
        const compressImage = (file, maxWidth = 800, quality = 0.7) => {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let width = img.width;
                        let height = img.height;
                        
                        if (width > maxWidth) {
                            height = Math.round(height * maxWidth / width);
                            width = maxWidth;
                        }
                        
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        resolve(canvas.toDataURL('image/jpeg', quality));
                    };
                    img.onerror = () => resolve(event.target.result); // Fallback to uncompressed
                };
            });
        };

        const setupPWA = () => {
            const iconSvg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%234f46e5"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>`;
            const manifestJSON = { "name": "Lookstylo Billing App", "short_name": "Lookstylo", "start_url": window.location.href, "display": "standalone", "background_color": "#f8fafc", "theme_color": "#0f172a", "icons": [ { "src": "data:image/svg+xml;charset=utf-8," + encodeURIComponent(iconSvg), "sizes": "192x192", "type": "image/svg+xml", "purpose": "any maskable" }, { "src": "data:image/svg+xml;charset=utf-8," + encodeURIComponent(iconSvg), "sizes": "512x512", "type": "image/svg+xml", "purpose": "any maskable" } ] };
            const blob = new Blob([JSON.stringify(manifestJSON)], {type: 'application/json'});
            document.getElementById('dynamic-manifest').setAttribute('href', URL.createObjectURL(blob));
        };
        setupPWA();

        const StoreLogo = ({ className = "w-5 h-5" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path><line x1="3" y1="6" x2="21" y2="6"></line><path d="M16 10a4 4 0 0 1-8 0"></path></svg>
        );

        const InstagramIcon = ({ className = "w-5 h-5" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line></svg>
        );

        const WhatsAppIcon = ({ className = "w-5 h-5" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>
        );

        const Barcode = ({ value }) => {
            const ref = useRef(null);
            useEffect(() => { if (ref.current && value) JsBarcode(ref.current, value, { format: "CODE128", displayValue: true, fontSize: 20, fontOptions: "bold", textMargin: 5, height: 60, margin: 0 }); }, [value]);
            return <canvas ref={ref}></canvas>;
        };

        const QRCodeRender = ({ data, size = 120 }) => {
            const ref = useRef(null);
            useEffect(() => { if (ref.current && data) { ref.current.innerHTML = ""; new QRCode(ref.current, { text: data, width: size, height: size, colorDark: "#000000", colorLight: "#ffffff", correctLevel: QRCode.CorrectLevel.M }); } }, [data, size]);
            return <div ref={ref} className="border border-gray-200 p-1 bg-white inline-block"></div>;
        };

        const TabButton = ({ id, label, activeTab, setActiveTab }) => (
            <button onClick={() => setActiveTab(id)} className={`px-4 py-2.5 rounded-xl font-bold text-sm flex items-center gap-2 transition-all duration-300 ${activeTab === id ? 'bg-white text-indigo-900 shadow-md transform scale-105' : 'bg-white/10 hover:bg-white/20 text-white border border-transparent hover:border-white/10'}`}>
                {label}
            </button>
        );

        const ModernInput = ({ label, ...props }) => (
            <div>
                <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1.5 ml-1">{label}</label>
                <input {...props} onWheel={(e) => e.target.type === 'number' && e.target.blur()} className={`w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-4 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none transition-all text-sm font-medium text-slate-800 shadow-sm ${props.className || ''}`} />
            </div>
        );

        const LabelContent = ({ orderId, toName, toAddress, toPhone, billName, billAddress, billPhone, copyLabel, logoUrl }) => (
            <div className="border-2 border-gray-900 flex-grow flex flex-col text-black bg-white box-border w-full h-full p-4 relative">
                {copyLabel && <div className="absolute top-0 right-0 bg-indigo-600 text-white text-[9px] px-2 py-0.5 font-bold uppercase z-10">{copyLabel}</div>}
                <div className="flex items-center justify-between border-b-2 border-gray-900 pb-4 mb-4">
                    <div className="w-1/4 flex flex-col items-start justify-center">
                        {logoUrl ? <img src={logoUrl} alt="Logo" className="w-24 object-contain" /> : <StoreLogo className="w-16 h-16 text-gray-900" />}
                    </div>
                    <div className="text-center flex-1 px-2">
                        {!logoUrl && <div className="text-brand-red font-extrabold text-3xl tracking-wide uppercase">LOOKSTYLO FASHION</div>}
                        <div className="text-brand-blue font-bold text-xl tracking-wider uppercase mt-1">SHARIEF ENTERPRISES</div>
                    </div>
                    <div className="w-1/4 flex justify-end">
                        <QRCodeRender data={JSON.stringify({ id: orderId, name: toName, phone: toPhone })} size={120} />
                    </div>
                </div>

                <div className="flex-grow flex flex-col">
                    <div className="mb-6">
                        <h3 className="font-extrabold text-2xl uppercase mb-1">FROM:</h3>
                        <div className="font-bold text-lg leading-snug uppercase">LOOKSTYLO FASHION,<br/>SHOP NO 02, OPPOSITE POST OFFICE<br/>PAKKIRITHAKA JOLARPATTAI - 635851.<br/>📞 8680857511</div>
                    </div>
                    
                    <div className="mb-4">
                        <h3 className="font-extrabold text-2xl uppercase mb-1">TO,</h3>
                        <div className="font-bold text-lg leading-snug uppercase">
                            {toName || ' '}<br/>
                            {toAddress ? toAddress.split('\n').map((line, i) => <React.Fragment key={i}>{line}<br/></React.Fragment>) : ' '}<br/>
                            {toPhone ? `📞 ${toPhone}` : ' '}
                        </div>
                    </div>

                    {(billName || billAddress || billPhone) && (
                        <div className="mb-4 pt-4 border-t border-dashed border-gray-400">
                            <h3 className="font-extrabold text-xl uppercase mb-1">BILL TO,</h3>
                            <div className="font-bold text-md leading-snug uppercase text-gray-700">
                                {billName || ' '}<br/>{billAddress ? billAddress.split('\n').map((line, i) => <React.Fragment key={i}>{line}<br/></React.Fragment>) : ' '}<br/>{billPhone || ' '}
                            </div>
                        </div>
                    )}
                </div>

                <div className="mt-auto flex flex-col items-center pt-4 border-t-2 border-gray-900">
                    <div className="mb-4 bg-white p-2 rounded"><Barcode value={orderId || '0000'} /></div>
                    <div className="flex items-center justify-between w-full font-bold text-lg text-brand-red uppercase px-4">
                        <div className="flex items-center gap-1.5"><InstagramIcon className="w-6 h-6" /> LOKSTLYO_FASHION</div>
                        <div className="flex items-center gap-1.5"><WhatsAppIcon className="w-6 h-6" /> 8680857511</div>
                    </div>
                </div>
            </div>
        );

        function App() {
            // ✨ LOGIN STATE
            const [isAppLocked, setIsAppLocked] = useState(true);
            const [loginId, setLoginId] = useState('');
            const [loginPass, setLoginPass] = useState('');
            const [authError, setAuthError] = useState('');
            
            const appAuth = JSON.parse(localStorage.getItem('lookstylo_auth') || '{"id":"admin", "pass":"admin123"}');
            const [newAuthId, setNewAuthId] = useState(appAuth.id);
            const [newAuthPass, setNewAuthPass] = useState(appAuth.pass);

            const handleLogin = (e) => {
                e.preventDefault();
                if (loginId === appAuth.id && loginPass === appAuth.pass) {
                    setIsAppLocked(false);
                    setAuthError('');
                } else {
                    setAuthError('Invalid User ID or Password');
                }
            };

            const updateAuth = () => {
                if(!newAuthId.trim() || !newAuthPass.trim()) return showNotification("Fields cannot be empty");
                localStorage.setItem('lookstylo_auth', JSON.stringify({ id: newAuthId, pass: newAuthPass }));
                showNotification("Lock Credentials Updated successfully!");
            };

            const [activeTab, setActiveTab] = useState('billing'); 
            const [sheetUrl, setSheetUrl] = useState(localStorage.getItem('googleSheetUrl') || '');
            const [serverUrl, setServerUrl] = useState(localStorage.getItem('serverUrl') || '/api/save-label');
            const [logoUrl, setLogoUrl] = useState(localStorage.getItem('logoUrl') || ''); 
            const [gpayQrUrl, setGpayQrUrl] = useState(localStorage.getItem('gpayQrUrl') || '');
            const [notification, setNotification] = useState(null); 
            const [showGpayModal, setShowGpayModal] = useState(false);
            const isEditingRef = useRef(false);

            const showNotification = (msg) => {
                setNotification(msg);
                setTimeout(() => setNotification(null), 3000);
            };

            const [installPrompt, setInstallPrompt] = useState(null);
            useEffect(() => {
                const handleBeforeInstallPrompt = (e) => { e.preventDefault(); setInstallPrompt(e); };
                window.addEventListener('beforeinstallprompt', handleBeforeInstallPrompt);
                return () => window.removeEventListener('beforeinstallprompt', handleBeforeInstallPrompt);
            }, []);

            const handleInstallApp = async () => {
                if (!installPrompt) return;
                installPrompt.prompt();
                const { outcome } = await installPrompt.userChoice;
                if (outcome === 'accepted') {
                    setInstallPrompt(null);
                    showNotification("App installed successfully! Check your home screen.");
                }
            };

            // ✨ BACKUP & RESTORE DATA EXPORT/IMPORT
            const exportData = () => {
                const backupData = {
                    savedBills: localStorage.getItem('savedBills'),
                    inventory: localStorage.getItem('lookstylo_inv_v2') || localStorage.getItem('inventory'),
                    shopExpenses: localStorage.getItem('shopExpenses'),
                    customers: localStorage.getItem('customers'),
                    invoiceCounters: localStorage.getItem('invoiceCounters'),
                    savedScans: localStorage.getItem('savedScans'),
                    logoUrl: localStorage.getItem('logoUrl'),
                    gpayQrUrl: localStorage.getItem('gpayQrUrl'),
                    invCategories: localStorage.getItem('lookstylo_categories'),
                    auth: localStorage.getItem('lookstylo_auth')
                };
                const blob = new Blob([JSON.stringify(backupData)], { type: "application/json" });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `Lookstylo_Backup_${new Date().toISOString().split('T')[0]}.json`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                showNotification("Backup Exported Successfully!");
            };

            const importData = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const data = JSON.parse(event.target.result);
                        if(data.savedBills) localStorage.setItem('savedBills', data.savedBills);
                        if(data.inventory) {
                            try {
                                const parsedInv = JSON.parse(data.inventory);
                                if (!Array.isArray(parsedInv)) {
                                    localStorage.setItem('inventory', data.inventory);
                                } else {
                                    localStorage.setItem('lookstylo_inv_v2', data.inventory);
                                }
                            } catch(e) {}
                        }
                        if(data.shopExpenses) localStorage.setItem('shopExpenses', data.shopExpenses);
                        if(data.customers) localStorage.setItem('customers', data.customers);
                        if(data.invoiceCounters) localStorage.setItem('invoiceCounters', data.invoiceCounters);
                        if(data.savedScans) localStorage.setItem('savedScans', data.savedScans);
                        if(data.logoUrl) localStorage.setItem('logoUrl', data.logoUrl);
                        if(data.gpayQrUrl) localStorage.setItem('gpayQrUrl', data.gpayQrUrl);
                        if(data.invCategories) localStorage.setItem('lookstylo_categories', data.invCategories);
                        if(data.auth) localStorage.setItem('lookstylo_auth', data.auth);
                        
                        alert("Data imported successfully! The app will now reload to apply your data.");
                        window.location.reload();
                    } catch(err) {
                        alert("Invalid backup file! Please select a valid JSON backup.");
                    }
                };
                reader.readAsText(file);
            };

            const [customers, setCustomers] = useState(() => JSON.parse(localStorage.getItem('customers') || '{}'));

            // ✨ ZOZO-STYLE INVENTORY MANAGEMENT
            const DEFAULT_CATEGORIES = ['T-Shirts', 'Shirts', 'Jeans', 'Trousers', 'Jackets/Hoodies', 'Trackpants', 'Accessories', 'General'];
            const [invCategories, setInvCategories] = useState(() => {
                try {
                    const saved = localStorage.getItem('lookstylo_categories');
                    if (saved) return JSON.parse(saved);
                } catch(e) {}
                return DEFAULT_CATEGORIES;
            });
            
            const [inventory, setInventory] = useState(() => {
                try {
                    const storedV2 = localStorage.getItem('lookstylo_inv_v2');
                    if (storedV2) return JSON.parse(storedV2);
                    
                    // Fallback / Migrate from old dictionary format
                    const oldStored = JSON.parse(localStorage.getItem('inventory') || '{}');
                    if (oldStored && !Array.isArray(oldStored)) {
                        const migrated = Object.entries(oldStored).map(([key, val]) => ({
                            id: generateSafeId(),
                            name: key.toUpperCase(),
                            category: 'General',
                            sku: val.styleCode || Math.floor(100000 + Math.random() * 900000).toString(),
                            price: val.price || 0,
                            purchasePrice: 0,
                            stock: 10,
                            hsn: val.hsn || '',
                            gst: val.gst || 0,
                            image: ''
                        }));
                        localStorage.setItem('lookstylo_inv_v2', JSON.stringify(migrated));
                        return migrated;
                    }
                } catch(e) { console.error(e); }
                return [];
            });

            // Inventory Modal States
            const [isInvModalOpen, setIsInvModalOpen] = useState(false);
            const [invSearch, setInvSearch] = useState('');
            const [invCategoryFilter, setInvCategoryFilter] = useState('All');
            const [invFormData, setInvFormData] = useState({ id: '', name: '', category: 'General', sku: '', price: '', purchasePrice: '', stock: '', hsn: '', gst: 0, image: '' });

            const handleAddCategory = () => {
                const newCat = window.prompt("Enter new category name:");
                if (newCat && newCat.trim()) {
                    const catName = newCat.trim();
                    if (!invCategories.includes(catName)) {
                        const updated = [...invCategories, catName];
                        setInvCategories(updated);
                        localStorage.setItem('lookstylo_categories', JSON.stringify(updated));
                        setInvFormData(prev => ({ ...prev, category: catName }));
                        showNotification(`Category "${catName}" added!`);
                    } else {
                        setInvFormData(prev => ({ ...prev, category: catName }));
                    }
                }
            };

            const openInvModal = (item = null) => {
                if (item) {
                    setInvFormData({ ...item });
                } else {
                    setInvFormData({ id: '', name: '', category: invCategories[0] || 'General', sku: Math.floor(100000 + Math.random() * 900000).toString(), price: '', purchasePrice: '', stock: 0, hsn: '', gst: 0, image: '' });
                }
                setIsInvModalOpen(true);
            };

            const handleInvImageUpload = async (e) => {
                const file = e.target.files[0];
                if (file) {
                    const compressedImg = await compressImage(file, 600, 0.7);
                    setInvFormData({ ...invFormData, image: compressedImg });
                }
            };

            const saveInventoryItem = () => {
                if (!invFormData.name.trim() || !invFormData.price) return showNotification("Please provide Name and Selling Price.");
                
                const updatedItem = {
                    ...invFormData,
                    name: invFormData.name.trim().toUpperCase(),
                    sku: invFormData.sku.trim() || Math.floor(100000 + Math.random() * 900000).toString(),
                    price: Number(invFormData.price) || 0,
                    purchasePrice: Number(invFormData.purchasePrice) || 0,
                    stock: Number(invFormData.stock) || 0,
                    gst: Number(invFormData.gst) || 0,
                    id: invFormData.id || generateSafeId()
                };

                let newList;
                if (invFormData.id) {
                    newList = inventory.map(i => i.id === updatedItem.id ? updatedItem : i);
                } else {
                    newList = [updatedItem, ...inventory];
                }

                try {
                    localStorage.setItem('lookstylo_inv_v2', JSON.stringify(newList));
                    setInventory(newList);
                    setIsInvModalOpen(false);
                    showNotification(invFormData.id ? "Item Updated Successfully!" : "New Item Added to Inventory!");
                } catch (e) {
                    showNotification("⚠️ Storage Full! Clear some old images or data to add more.");
                }
            };

            const deleteInventoryItem = (id, name) => {
                if(window.confirm(`Are you sure you want to delete ${name} from inventory?`)) {
                    const newList = inventory.filter(i => i.id !== id);
                    setInventory(newList);
                    localStorage.setItem('lookstylo_inv_v2', JSON.stringify(newList));
                    showNotification("Item deleted.");
                }
            };

            const filteredInventory = inventory.filter(item => {
                const matchesSearch = item.name.includes(invSearch.toUpperCase()) || item.sku.includes(invSearch);
                const matchesCat = invCategoryFilter === 'All' || item.category === invCategoryFilter;
                return matchesSearch && matchesCat;
            });


            // ✨ EXPENSES MANAGEMENT 
            const todayStr = new Date().toISOString().split('T')[0];
            const [expenses, setExpenses] = useState(() => JSON.parse(localStorage.getItem('shopExpenses') || '[]'));
            const [expDate, setExpDate] = useState(todayStr);
            const [expDesc, setExpDesc] = useState('');
            const [expAmount, setExpAmount] = useState('');
            const [expMode, setExpMode] = useState('Cash');

            const handleAddExpense = () => {
                if (!expDesc.trim() || !expAmount) return showNotification("Please enter description and amount.");

                if (reportType === 'yearly') return b.date.startsWith(reportYear);
                return false;
            });

            const reportBills = baseReportBills.filter(b => {
                if (reportFilter === 'GST') return b.type === 'GST';
                if (reportFilter === 'Non-GST') return b.type !== 'GST';
                return true;
            });

            // ✨ Expenses for Reports
            const reportExpenses = expenses.filter(e => {
                if (!e.date) return false;
                if (reportType === 'daily') return e.date === reportDate;
                if (reportType === 'monthly') return e.date.startsWith(reportMonth);
                if (reportType === 'yearly') return e.date.startsWith(reportYear);
                return false;
            });

            const totalReportExpenses = reportExpenses.reduce((acc, e) => acc + (e.amount || 0), 0);
            const totalReportSales = reportBills.reduce((acc, b) => acc + (b.total || 0), 0);
            const totalReportCash = reportBills.reduce((acc, b) => acc + (b.cash || 0), 0);
            const totalReportGpay = reportBills.reduce((acc, b) => acc + (b.gpay || 0), 0);
            const totalReportAdvance = reportBills.reduce((acc, b) => acc + (b.advance || 0), 0);
            const totalReportBalance = reportBills.reduce((acc, b) => acc + (b.balance || 0), 0);
            const totalGSTSales = reportBills.filter(b => b.type === 'GST').reduce((acc, b) => acc + (b.total || 0), 0);
            const totalNonGSTSales = reportBills.filter(b => b.type !== 'GST').reduce((acc, b) => acc + (b.total || 0), 0);
            
            let periodLabel = '';
            if (reportType === 'daily') { periodLabel = new Date(reportDate).toLocaleDateString('en-GB'); } 
            else if (reportType === 'monthly') {
                const [y, m] = reportMonth.split('-');

            } else { periodLabel = reportYear; }

            const exportToCSV = () => {
                if (reportBills.length === 0) { showNotification("No data to export for this period!"); return; }

                const headers = ['Date', 'Invoice ID', 'Type', 'Customer Name', 'Total Amount (Rs)', 'Advance Paid (Rs)', 'Cash Paid (Rs)', 'G-Pay Paid (Rs)', 'Pending Balance (Rs)', 'Description'];
                const rows = reportBills.slice().reverse().map(bill => [
                    bill.date.split('-').reverse().join('-'), bill.id, bill.type || 'Non-GST',
                    `"${(bill.customer || '').replace(/"/g, '""')}"`, bill.total || 0, bill.advance || 0,
                    bill.cash || 0, bill.gpay || 0, bill.balance || 0, `"${(bill.description || '').replace(/"/g, '""')}"`
                ]);

                rows.push([]);
                rows.push(['', '', 'SUMMARY:', 'TOTALS:', totalReportSales, totalReportAdvance, totalReportCash, totalReportGpay, totalReportBalance, '']);
                rows.push([]);
                rows.push(['', '', 'DEDUCTIONS:', 'TOTAL EXPENSES:', '', '', '', '', totalReportExpenses, '']);

                const csvContent = [headers.join(','), ...rows.map(r => r.join(','))].join('\n');
                const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement('a');
                link.setAttribute('href', URL.createObjectURL(blob));
                link.setAttribute('download', `Lookstylo_Sales_${periodLabel.replace(/ /g, '_')}.csv`);
                link.style.visibility = 'hidden';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                showNotification("Exported to Excel/CSV successfully!");
            };

                                <div className="flex justify-center items-center gap-3 font-bold text-gray-900 mt-1">
                                    <span className="flex items-center gap-1"><WhatsAppIcon className="w-3.5 h-3.5" /> 8680857511</span> | 
                                    <span className="flex items-center gap-1"><InstagramIcon className="w-3.5 h-3.5" /> @lookstylo_fashion</span>
                                </div>
                                <p className="font-bold text-gray-900 mt-1">GSTIN: 33NEYPS4388G1ZC</p>
                            </div>

                                    <ModernInput label="Total G-Pay Paid (₹)" type="number" min="0" value={editGpay} onChange={e=>setEditGpay(e.target.value)} className="text-blue-700 font-bold bg-white" />
                                </div>
                                
                                <div className={`mt-5 p-4 rounded-2xl flex justify-between items-center border ${(paymentModal.total - (Number(editCash)||0) - (Number(editGpay)||0) - (Number(editAdvance)||0)) > 0 ? 'bg-amber-50 border-amber-100' : 'bg-emerald-50 border-emerald-100'}`}>
                                    <span className="text-sm font-bold text-slate-600">New Balance:</span>
                                    <span className={`text-xl font-black ${(paymentModal.total - (Number(editCash)||0) - (Number(editGpay)||0) - (Number(editAdvance)||0)) > 0 ? 'text-amber-600' : 'text-emerald-600'}`}>
                                        ₹ {(paymentModal.total - (Number(editCash)||0) - (Number(editGpay)||0) - (Number(editAdvance)||0)).toFixed(2)}
                                    </span>
                                </div>

                                <div className="flex gap-3 mt-6">
                                    <button onClick={()=>setPaymentModal(null)} className="flex-1 bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold py-3.5 rounded-xl transition-colors">Cancel</button>
                                    <button onClick={handleUpdatePayment} className="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3.5 rounded-xl transition-colors shadow-lg shadow-indigo-200">Save Update</button>
                                </div>
                            </div>
                        </div>
                    )}

                    <nav className="bg-gradient-to-r from-slate-900 via-indigo-950 to-slate-900 text-white p-4 shadow-xl sticky top-0 z-50 border-b border-indigo-900/50 no-print">
                        <div className="max-w-7xl mx-auto flex flex-col xl:flex-row justify-between items-center gap-4">
                            <div className="flex items-center gap-4">
                                <h1 className="text-2xl font-black tracking-tight flex items-center gap-3 bg-clip-text text-transparent bg-gradient-to-r from-white to-indigo-200">
                                    {logoUrl ? <img src={logoUrl} alt="Logo" className="h-10 w-10 object-contain rounded-lg bg-white p-0.5" /> : <StoreLogo className="w-8 h-8 text-indigo-400" />}
                                    Lookstylo Fashion
                                </h1>
                                <button onClick={() => setIsAppLocked(true)} className="bg-rose-500 hover:bg-rose-600 text-white text-xs font-bold px-3 py-1.5 rounded-lg shadow-sm flex items-center gap-1.5 transition-colors border border-rose-400 ml-2">
                                    <svg xmlns="http://www.w3.org/2000/svg" className="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}><path strokeLinecap="round" strokeLinejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" /></svg>
                                    Lock
                                </button>
                                {installPrompt && (
                                    <button onClick={handleInstallApp} className="bg-emerald-500 hover:bg-emerald-600 text-white text-xs font-bold px-3 py-1.5 rounded-lg shadow-sm flex items-center gap-1.5 transition-colors animate-pulse border border-emerald-400">
                                        <svg xmlns="http://www.w3.org/2000/svg" className="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}><path strokeLinecap="round" strokeLinejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" /></svg>
                                        Install App
                                    </button>
                                )}
                            </div>
                            <div className="flex flex-wrap justify-center gap-2 md:gap-3">
                                <TabButton id="billing" label="Billing" activeTab={activeTab} setActiveTab={setActiveTab} />
                                <TabButton id="inventory" label="Inventory" activeTab={activeTab} setActiveTab={setActiveTab} />
                                <TabButton id="expenses" label="Expenses" activeTab={activeTab} setActiveTab={setActiveTab} />
                                <TabButton id="reports" label="Reports" activeTab={activeTab} setActiveTab={setActiveTab} />
                                <TabButton id="generator" label="Manual Label" activeTab={activeTab} setActiveTab={setActiveTab} />
                                <TabButton id="scanner" label="Scanner" activeTab={activeTab} setActiveTab={setActiveTab} />
                                <TabButton id="settings" label="Settings" activeTab={activeTab} setActiveTab={setActiveTab} />
                            </div>
                        </div>
                    </nav>

                    <main className="flex-grow p-4 md:p-8 max-w-[1400px] mx-auto w-full flex flex-col lg:flex-row gap-8">
                        
                        {/* -------------------- TAB: BILLING -------------------- */}
                        {activeTab === 'billing' && (
                            <>
                                <div className="w-full lg:w-[55%] bg-white p-6 md:p-8 rounded-3xl shadow-xl shadow-slate-200/50 border border-slate-100 h-fit flex flex-col gap-8 no-print">
                                    <div className="flex justify-between items-center border-b border-slate-100 pb-4">
                                        <div><h2 className="text-3xl font-extrabold bg-clip-text text-transparent bg-gradient-to-r from-indigo-700 to-purple-600">Billing</h2></div>
                                        <button onClick={handleNewBill} className="text-xs font-bold text-slate-500 bg-slate-100 hover:bg-slate-200 px-3 py-1.5 rounded-lg transition-colors">Clear Form</button>
                                    </div>

                                    <div className="grid grid-cols-1 md:grid-cols-3 gap-5">
                                        <ModernInput label="Invoice No." type="text" value={billInvoice} onChange={e=>setBillInvoice(e.target.value)} />
                                        <ModernInput label="Date" type="date" value={billDate} onChange={e=>setBillDate(e.target.value)} />
                                        <div>
                                            <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1.5 ml-1">Bill Type</label>
                                            <select value={billType} onChange={e=>setBillType(e.target.value)} className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-4 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none transition-all text-sm font-bold text-indigo-700 shadow-sm cursor-pointer">
                                                <option value="Non-GST">Non-GST</option>
                                                <option value="GST">GST Bill</option>
                                            </select>
                                        </div>
                                        <ModernInput label="Phone Number" type="text" value={billCustomerPhone} onChange={handlePhoneChange} placeholder="Enter Phone to Auto-Fill" className="md:col-span-1 border-indigo-200 focus:border-indigo-500 font-mono" />
                                        <ModernInput label="Customer Name" type="text" value={billCustomerName} onChange={e=>setBillCustomerName(e.target.value)} placeholder="Walk-in Customer" className="md:col-span-2" />
                                    </div>

                                    <div className="bg-slate-50 rounded-2xl p-5 border border-slate-100 shadow-sm space-y-5">
                                        <div>
                                            <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1.5 ml-1">Delivery Type</label>
                                            <select value={billDelivery} onChange={e=>setBillDelivery(e.target.value)} className="w-full p-3.5 bg-white border border-slate-200 rounded-xl focus:ring-4 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none transition-all font-bold text-indigo-700 shadow-sm cursor-pointer">
                                                <option value="Store Walk-in">🛍️ Store Walk-in</option>
                                                <option value="Courier">🚚 Courier Delivery (Generates Label)</option>
                                            </select>
                                        </div>
                                        
                                        {billDelivery === 'Courier' && (
                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-5 pt-2 border-t border-slate-200">
                                                <div>
                                                    <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1.5 ml-1">Select Courier</label>
                                                    <select value={billCourier} onChange={e=>setBillCourier(e.target.value)} className="w-full p-3 bg-white border border-slate-200 rounded-xl focus:ring-4 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none transition-all text-sm font-medium shadow-sm">
                                                        <option value="Professional Courier">Professional Courier</option>
                                                        <option value="ST Courier">ST Courier</option>
                                                        <option value="India Post">India Post</option>
                                                    </select>
                                                </div>
                                                <ModernInput label="Tracking ID" type="text" value={billTracking} onChange={e=>setBillTracking(e.target.value)} placeholder="Tracking No." />
                                                <div className="md:col-span-2">
                                                    <div className="flex justify-between items-end mb-1.5 ml-1">
                                                        <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider">Shipping Address (For Label)</label>
                                                    </div>
                                                    <textarea rows="3" value={billCustomerAddress} onChange={e=>setBillCustomerAddress(e.target.value)} placeholder="Full Delivery Address" className="w-full p-3 bg-white border border-slate-200 rounded-xl focus:ring-4 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none transition-all text-sm font-medium shadow-sm resize-none"></textarea>
                                                </div>
                                            </div>
                                        )}
                                    </div>

                                    <div className="border border-slate-200 rounded-2xl overflow-hidden shadow-sm">
                                        <div className="bg-slate-50/80 px-5 py-4 border-b border-slate-200 flex justify-between items-center">
                                            <h3 className="font-bold text-slate-700 uppercase tracking-wider text-xs">Particulars</h3>
                                            <span className="text-xs font-semibold text-indigo-500 bg-indigo-50 px-2 py-1 rounded-md">{billItems.length} Item(s)</span>
                                        </div>
                                        <div className="p-5 space-y-3 bg-white">
                                            <datalist id="preset-items">
                                                {inventory.map(item => <option key={item.id} value={item.name}>{item.sku}</option>)}
                                            </datalist>
                                            {billItems.map((item, index) => (
                                                <div key={item.id} className="flex gap-2 items-center group flex-wrap md:flex-nowrap">
                                                    <div className="w-6 text-center text-xs font-bold text-slate-400">{index + 1}.</div>
                                                    <input list="preset-items" type="text" placeholder="Item Name or Barcode/SKU" value={item.particular} onChange={e=>updateBillItem(item.id, 'particular', e.target.value)} className="flex-grow p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm uppercase outline-none focus:ring-2 focus:ring-indigo-500/50 transition-all shadow-sm w-full md:w-auto" />
                                                    
                                                    {billType === 'GST' && (
                                                        <>
                                                            <input type="text" placeholder="HSN" value={item.hsn || ''} onChange={e=>updateBillItem(item.id, 'hsn', e.target.value)} className="w-20 p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm outline-none focus:ring-2 focus:ring-indigo-500/50 transition-all shadow-sm text-center font-semibold text-slate-700" />
                                                            <select value={item.gst || 0} onChange={e=>updateBillItem(item.id, 'gst', e.target.value)} className="w-28 p-3 bg-slate-50 border border-slate-200 rounded-xl text-xs outline-none focus:ring-2 focus:ring-indigo-500/50 shadow-sm text-center font-bold text-slate-700 cursor-pointer">
                                                                <option value="0">Non-GST</option>
                                                                <option value="5">5% GST</option>
                                                                <option value="12">12% GST</option>
                                                                <option value="18">18% GST</option>
                                                                <option value="28">28% GST</option>
                                                            </select>
                                                        </>
                                                    )}

                                                    <input type="number" min="1" value={item.qty} placeholder="Qty" onWheel={(e) => e.target.blur()} onChange={e=>updateBillItem(item.id, 'qty', e.target.value)} className="w-16 p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm outline-none focus:ring-2 focus:ring-indigo-500/50 transition-all shadow-sm text-center font-semibold text-slate-700" />
                                                    <input type="number" min="0" value={item.rate} placeholder="Rate ₹" onWheel={(e) => e.target.blur()} onChange={e=>updateBillItem(item.id, 'rate', e.target.value)} className="w-24 p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm outline-none focus:ring-2 focus:ring-indigo-500/50 transition-all shadow-sm text-right font-semibold text-slate-700" />
                                                    <button onClick={()=>removeBillItem(item.id)} className={`text-slate-400 hover:text-red-500 hover:bg-red-50 p-2.5 rounded-xl transition-all ${billItems.length === 1 ? 'invisible' : ''}`} title="Remove Row">
                                                        <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fillRule="evenodd" d="M9 2a1 1 0 00-.894.553L7.382 4H4a1 1 0 000 2v10a2 2 0 002 2h8a2 2 0 002-2V6a1 1 0 100-2h-3.382l-.724-1.447A1 1 0 0011 2H9zM7 8a1 1 0 012 0v6a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v6a1 1 0 102 0V8a1 1 0 00-1-1z" clipRule="evenodd" /></svg>
                                                    </button>
                                                </div>
                                            ))}
                                            <button onClick={addBillItem} className="mt-2 text-sm font-bold text-indigo-600 bg-indigo-50 hover:bg-indigo-100 hover:text-indigo-700 px-5 py-2.5 rounded-xl transition-all flex items-center gap-2 border border-indigo-100">
                                                <svg xmlns="http://www.w3.org/2000/svg" className="h-4 w-4" viewBox="0 0 20 20" fill="currentColor"><path fillRule="evenodd" d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z" clipRule="evenodd" /></svg>
                                                Add New Item
                                            </button>
                                        </div>
                                    </div>

                                    <div className="bg-slate-50 rounded-2xl p-5 border border-slate-100 shadow-sm">
                                        <div className="flex justify-between items-end mb-1.5 ml-1">
                                            <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider">Bill Description / Notes (Optional)</label>
                                        </div>
                                        <textarea rows="2" value={billDescription} onChange={e=>setBillDescription(e.target.value)} placeholder="Add any special remarks, warranty notes, or description for this bill..." className="w-full p-3 bg-white border border-slate-200 rounded-xl focus:ring-4 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none transition-all text-sm font-medium shadow-sm resize-none"></textarea>
                                    </div>

                                    <div className="grid grid-cols-2 md:grid-cols-5 gap-4 bg-white p-5 rounded-2xl border border-slate-200 shadow-inner relative">
                                        <ModernInput label="Discount (%)" type="number" min="0" max="100" value={billDiscount} onChange={e=>setBillDiscount(e.target.value)} className="bg-white" />
                                        <ModernInput label="Advance (₹)" type="number" min="0" value={advancePayment} onChange={e=>setAdvancePayment(e.target.value)} className="bg-white text-purple-700" />
                                        
                                        <ModernInput label="Paid GPay (₹)" type="number" min="0" value={paidGpay} onChange={e=>setPaidGpay(e.target.value)} className="bg-white text-blue-700 font-bold" />
                                        
                                        <ModernInput label="Paid Cash (₹)" type="number" min="0" value={paidCash} onChange={e=>setPaidCash(e.target.value)} className="bg-white text-emerald-700" />
                                        <div>
                                            <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1.5 ml-1">Next Promo</label>
                                            <select value={billPromoCode} onChange={e=>setBillPromoCode(e.target.value)} className="w-full p-3 bg-white border border-slate-200 rounded-xl focus:ring-4 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none transition-all text-sm font-bold text-indigo-600 shadow-sm cursor-pointer">
                                                <option value="NO CODE">None</option>
                                                <option value="FREESHIP">FREESHIP</option>
                                                <option value="GET350 SHIRT">GET350 SHIRT</option>
                                                <option value="10%DIS">10% OFF</option>
                                                <option value="5%DIS">5% OFF</option>
                                            </select>
                                        </div>
                                    </div>

                                    {/* ✨ GPAY PAYMENT BANNER */}
                                    {Number(paidGpay) > 0 && (
                                        <div className="p-4 bg-gradient-to-r from-blue-50 to-indigo-50 border border-blue-200 rounded-2xl flex items-center justify-between animate-fade-in cursor-pointer hover:shadow-md transition-all group" onClick={() => setShowGpayModal(true)}>
                                            <div className="flex items-center gap-4">
                                                {gpayQrUrl ? (
                                                    <img src={gpayQrUrl} alt="GPay QR" className="w-14 h-14 object-contain rounded-xl border-2 border-white shadow-sm bg-white" />
                                                ) : (
                                                    <div className="w-14 h-14 bg-white border-2 border-white rounded-xl p-1 shadow-sm flex items-center justify-center">
                                                        <QRCodeRender data={`upi://pay?pa=9360232991@okbizaxis&pn=LOOKSTYLO%20FASHION&am=${paidGpay}&cu=INR`} size={44} />
                                                    </div>
                                                )}
                                                <div>
                                                    <h4 className="font-bold text-blue-900 text-lg leading-tight">Receive ₹{paidGpay} via GPay</h4>
                                                    <p className="text-xs text-blue-600 font-semibold">Click to show large QR scan screen to customer</p>
                                                </div>
                                            </div>
                                            <div className="bg-white text-blue-600 p-2.5 rounded-full shadow-sm group-hover:scale-110 transition-transform">
                                                <svg xmlns="http://www.w3.org/2000/svg" className="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4" /></svg>
                                            </div>
                                        </div>
                                    )}
                                    
                                    <div className="flex justify-between items-center p-5 bg-gradient-to-r from-slate-50 to-indigo-50/50 rounded-2xl border border-slate-200 shadow-sm">
                                        <div className="flex flex-col">
                                            <span className="text-slate-500 font-bold uppercase text-xs tracking-widest">Balance Remaining</span>
                                            <span className="text-sm font-medium text-slate-400">Total: ₹{grandTotal.toFixed(2)}</span>
                                        </div>
                                        <span className={`text-4xl font-black tracking-tight drop-shadow-sm ${balanceAmount > 0 ? "text-red-500" : balanceAmount < 0 ? "text-amber-500" : "text-emerald-500"}`}>
                                            ₹ {balanceAmount.toFixed(2)}
                                        </span>
                                    </div>

                                    <div className="flex gap-3 mt-2">
                                        <button onClick={handlePrint} className="w-1/3 bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-700 hover:to-purple-700 text-white font-bold py-3.5 px-2 rounded-2xl shadow-xl shadow-indigo-200 transition-all transform hover:-translate-y-0.5 active:translate-y-0 active:shadow-md flex flex-col justify-center items-center gap-1 text-sm">
                                            <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}><path strokeLinecap="round" strokeLinejoin="round" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2-2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z" /></svg>
                                            Print
                                        </button>
                                        <button onClick={shareBillWhatsApp} className="w-1/3 bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3.5 px-2 rounded-2xl shadow-xl shadow-emerald-200 transition-all transform hover:-translate-y-0.5 active:translate-y-0 active:shadow-md flex flex-col justify-center items-center gap-1 text-sm">
                                            <WhatsAppIcon className="h-5 w-5" />
                                            Share
                                        </button>
                                        <button onClick={handleNewBill} className="w-1/3 bg-slate-800 hover:bg-slate-900 text-white font-bold py-3.5 px-2 rounded-2xl shadow-xl transition-all transform hover:-translate-y-0.5 active:translate-y-0 active:shadow-md flex flex-col justify-center items-center gap-1 text-sm">
                                            <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}><path strokeLinecap="round" strokeLinejoin="round" d="M12 4v16m8-8H4" /></svg>
                                            New Bill
                                        </button>
                                    </div>
                                </div>

                                <div className="w-full lg:w-[45%] flex flex-col gap-8 items-center bg-slate-200/50 p-6 md:p-8 print:p-0 print:bg-white rounded-3xl border border-slate-200 shadow-inner overflow-y-auto h-fit print-section print:overflow-visible print:h-auto print:block print:border-none print:shadow-none">
                                    <div className="w-full text-center print:hidden mb-2">
                                        <span className="inline-block bg-slate-300 text-slate-600 font-bold text-[10px] uppercase tracking-widest px-4 py-1.5 rounded-full">Print Previews</span>
                                    </div>
                                    
                                    <div className="a5-container relative print:scale-100 transform origin-top scale-[0.85] md:scale-95 transition-all hover:shadow-2xl">
                                        {renderBillContent("Original - Buyer's Copy")}
                                    </div>

                                    <div className="a5-container relative hidden print:flex">
                                        {renderBillContent("Duplicate - Shop Copy")}
                                    </div>

                                    {billDelivery === 'Courier' && (
                                        <div className="a5-container relative print:scale-100 transform origin-top scale-[0.85] md:scale-95 transition-all hover:shadow-2xl print:flex">
                                            <LabelContent copyLabel="Shipping Label" orderId={billTracking || billInvoice} toName={billCustomerName} toAddress={billCustomerAddress} toPhone={billCustomerPhone} logoUrl={logoUrl} />
                                        </div>
                                    )}
                                </div>
                            </>
                        )}

                        {/* ✨ -------------------- TAB: INVENTORY (ZOZO STYLE) -------------------- */}
                        {activeTab === 'inventory' && (
                            <div className="w-full max-w-6xl mx-auto bg-white p-8 rounded-3xl shadow-xl shadow-slate-200/50 border border-slate-100 relative">
                                
                                {isInvModalOpen && (
                                    <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[400] flex items-center justify-center p-4 animate-fade-in" onClick={() => setIsInvModalOpen(false)}>
                                        <div className="bg-white rounded-3xl shadow-2xl p-6 md:p-8 transform transition-all w-full max-w-3xl max-h-[90vh] overflow-y-auto" onClick={e => e.stopPropagation()}>
                                            <div className="flex justify-between items-center mb-6 border-b border-slate-100 pb-4">
                                                <h3 className="text-2xl font-black text-slate-800">{invFormData.id ? 'Edit Product' : 'Add New Product'}</h3>
                                                <button onClick={() => setIsInvModalOpen(false)} className="text-slate-400 hover:text-slate-600 text-3xl leading-none">&times;</button>
                                            </div>

                                            <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                                {/* Image Upload Column */}
                                                <div className="col-span-1 flex flex-col items-center space-y-4">
                                                    <div className="w-48 h-48 bg-slate-50 border-2 border-dashed border-slate-300 rounded-2xl flex flex-col items-center justify-center overflow-hidden relative group">
                                                        {invFormData.image ? (
                                                            <img src={invFormData.image} alt="Product" className="w-full h-full object-cover group-hover:opacity-50 transition-opacity" />
                                                        ) : (
                                                            <div className="text-center p-4">
                                                                <svg xmlns="http://www.w3.org/2000/svg" className="h-10 w-10 text-slate-300 mx-auto mb-2" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>
                                                                <span className="text-xs font-bold text-slate-400 uppercase">Upload Image</span>
                                                            </div>
                                                        )}
                                                        <input type="file" accept="image/*" onChange={handleInvImageUpload} className="absolute inset-0 w-full h-full opacity-0 cursor-pointer" />
                                                    </div>
                                                    <div className="w-full">
                                                        <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1.5 ml-1">SKU / Barcode</label>
                                                        <div className="flex gap-2">
                                                            <input type="text" value={invFormData.sku} onChange={e=>setInvFormData({...invFormData, sku: e.target.value})} className="flex-1 p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500/20 outline-none text-sm font-mono text-slate-700" />
                                                            <button onClick={() => setInvFormData({...invFormData, sku: Math.floor(100000 + Math.random() * 900000).toString()})} className="bg-indigo-100 hover:bg-indigo-200 text-indigo-700 px-3 rounded-xl font-bold" title="Generate New">↻</button>
                                                        </div>
                                                    </div>
                                                </div>

                                                {/* Form Fields Column */}
                                                <div className="col-span-1 md:col-span-2 grid grid-cols-1 md:grid-cols-2 gap-4">
                                                    <div className="md:col-span-2">
                                                        <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1.5 ml-1">Product Name *</label>
                                                        <input type="text" value={invFormData.name} onChange={e=>setInvFormData({...invFormData, name: e.target.value})} placeholder="e.g. BLACK DROPSHOULDER TEE" className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500/50 outline-none text-sm uppercase font-bold text-slate-800" />
                                                    </div>
                                                    <div>
                                                        <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1.5 ml-1">Category</label>
                                                        <div className="flex gap-2">
                                                            <select value={invFormData.category} onChange={e=>setInvFormData({...invFormData, category: e.target.value})} className="flex-1 p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500/50 outline-none text-sm font-medium text-slate-700 cursor-pointer">
                                                                {invCategories.map(c => <option key={c} value={c}>{c}</option>)}
                                                            </select>
                                                            <button onClick={handleAddCategory} className="bg-indigo-100 hover:bg-indigo-200 text-indigo-700 px-3 rounded-xl font-bold shadow-sm" title="Add New Category">+</button>
                                                        </div>
                                                    </div>
                                                    <div>
                                                        <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1.5 ml-1">Current Stock Qty</label>
                                                        <input type="number" min="0" value={invFormData.stock} onChange={e=>setInvFormData({...invFormData, stock: e.target.value})} className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500/50 outline-none text-sm font-bold text-slate-800" />
                                                    </div>
                                                    <div>
                                                        <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1.5 ml-1">Purchase Price (₹)</label>
                                                        <input type="number" min="0" value={invFormData.purchasePrice} onChange={e=>setInvFormData({...invFormData, purchasePrice: e.target.value})} className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500/50 outline-none text-sm font-medium text-red-600" />
                                                    </div>
                                                    <div>
                                                        <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1.5 ml-1">Selling Price (₹) *</label>
                                                        <input type="number" min="0" value={invFormData.price} onChange={e=>setInvFormData({...invFormData, price: e.target.value})} className="w-full p-3 bg-indigo-50 border border-indigo-200 rounded-xl focus:ring-2 focus:ring-indigo-500/50 outline-none text-sm font-black text-indigo-700" />
                                                    </div>
                                                    <div>
                                                        <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1.5 ml-1">HSN Code</label>
                                                        <input type="text" value={invFormData.hsn} onChange={e=>setInvFormData({...invFormData, hsn: e.target.value})} className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500/50 outline-none text-sm font-medium text-slate-700" />
                                                    </div>
                                                    <div>
                                                        <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1.5 ml-1">GST %</label>
                                                        <select value={invFormData.gst} onChange={e=>setInvFormData({...invFormData, gst: e.target.value})} className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500/50 outline-none text-sm font-medium text-slate-700 cursor-pointer">
                                                            <option value="0">0% (Non-GST)</option>
                                                            <option value="5">5%</option>
                                                            <option value="12">12%</option>
                                                            <option value="18">18%</option>
                                                            <option value="28">28%</option>
                                                        </select>
                                                    </div>
                                                </div>
                                            </div>

                                            <div className="mt-8 flex gap-3 border-t border-slate-100 pt-6">
                                                <button onClick={() => setIsInvModalOpen(false)} className="flex-1 bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold py-3.5 rounded-xl transition-colors">Cancel</button>
                                                <button onClick={saveInventoryItem} className="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3.5 rounded-xl transition-colors shadow-lg shadow-indigo-200">
                                                    {invFormData.id ? 'Save Changes' : 'Add to Inventory'}
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                )}

                                {/* Inventory Top Stats */}
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                                    <div className="bg-gradient-to-br from-indigo-500 to-purple-600 p-6 rounded-3xl shadow-lg shadow-indigo-200 text-white flex flex-col justify-center relative overflow-hidden">
                                        <div className="absolute -right-4 -top-4 opacity-20 text-8xl">📦</div>
                                        <span className="text-sm font-bold uppercase tracking-wider mb-1 opacity-90">Total Products</span>
                                        <span className="text-4xl font-black">{inventory.length}</span>
                                    </div>
                                    <div className="bg-white p-6 rounded-3xl border border-slate-200 shadow-sm flex flex-col justify-center">
                                        <span className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">Total Stock Quantity</span>
                                        <span className="text-3xl font-black text-slate-800">{inventory.reduce((sum, item) => sum + (Number(item.stock) || 0), 0)} Units</span>
                                    </div>
                                    <div className="bg-white p-6 rounded-3xl border border-slate-200 shadow-sm flex flex-col justify-center">
                                        <span className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">Total Stock Value</span>
                                        <span className="text-3xl font-black text-emerald-600">₹ {inventory.reduce((sum, item) => sum + ((Number(item.stock) || 0) * (Number(item.price) || 0)), 0).toLocaleString('en-IN')}</span>
                                    </div>
                                </div>

                                {/* Controls & Actions */}
                                <div className="flex flex-col md:flex-row justify-between items-center gap-4 mb-6 bg-slate-50 p-4 rounded-2xl border border-slate-200">
                                    <div className="flex flex-1 w-full gap-3">
                                        <div className="relative flex-1 max-w-md">
                                            <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                                <svg className="h-5 w-5 text-slate-400" viewBox="0 0 20 20" fill="currentColor"><path fillRule="evenodd" d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z" clipRule="evenodd" /></svg>
                                            </div>
                                            <input type="text" placeholder="Search by name or SKU..." value={invSearch} onChange={e=>setInvSearch(e.target.value)} className="w-full pl-10 p-3 bg-white border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500/20 outline-none text-sm font-medium text-slate-700 shadow-sm" />
                                        </div>
                                        <select value={invCategoryFilter} onChange={e=>setInvCategoryFilter(e.target.value)} className="p-3 bg-white border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500/20 outline-none text-sm font-bold text-slate-700 shadow-sm cursor-pointer w-40">
                                            <option value="All">All Categories</option>
                                            {invCategories.map(c => <option key={c} value={c}>{c}</option>)}
                                        </select>
                                    </div>
                                    <button onClick={() => openInvModal()} className="w-full md:w-auto bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-6 rounded-xl shadow-lg shadow-indigo-200 transition-transform transform hover:-translate-y-0.5 flex items-center justify-center gap-2">
                                        <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fillRule="evenodd" d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z" clipRule="evenodd" /></svg>
                                        Add Product
                                    </button>
                                </div>

                                {/* Modern Table */}
                                <div className="overflow-x-auto border border-slate-200 rounded-2xl shadow-sm">
                                    <table className="w-full text-left border-collapse">
                                        <thead className="bg-slate-50 border-b border-slate-200 text-xs uppercase tracking-wider text-slate-500">
                                            <tr>
                                                <th className="p-4 font-bold">Product Info</th>
                                                <th className="p-4 font-bold">Category</th>
                                                <th className="p-4 font-bold text-center">Stock</th>
                                                <th className="p-4 font-bold text-right">Price (₹)</th>
                                                <th className="p-4 font-bold text-center w-24">Action</th>
                                            </tr>
                                        </thead>
                                        <tbody className="bg-white divide-y divide-slate-100">
                                            {filteredInventory.length === 0 ? (
                                                <tr><td colSpan="5" className="p-8 text-center text-slate-400 font-medium">No products found.</td></tr>
                                            ) : (
                                                filteredInventory.map(item => (
                                                    <tr key={item.id} className="hover:bg-slate-50 transition-colors group">
                                                        <td className="p-4">
                                                            <div className="flex items-center gap-4">
                                                                <div className="w-12 h-12 rounded-lg bg-slate-100 border border-slate-200 flex items-center justify-center overflow-hidden shrink-0">
                                                                    {item.image ? <img src={item.image} className="w-full h-full object-cover" alt={item.name} /> : <span className="text-xl opacity-50">👕</span>}
                                                                </div>
                                                                <div>
                                                                    <div className="font-bold text-slate-800">{item.name}</div>
                                                                    <div className="text-xs text-slate-500 font-mono mt-0.5 bg-slate-100 px-1.5 py-0.5 rounded inline-block">SKU: {item.sku}</div>
                                                                </div>
                                                            </div>
                                                        </td>
                                                        <td className="p-4 font-medium text-slate-600">
                                                            <span className="bg-indigo-50 text-indigo-700 px-2.5 py-1 rounded-md text-xs font-bold">{item.category}</span>
                                                        </td>
                                                        <td className="p-4 text-center">
                                                            <span className={`inline-flex items-center justify-center px-2.5 py-1 rounded-full text-xs font-bold ${
