                                {balanceAmount > 0 && (
                                    <div className="mt-3 flex items-center gap-2 border-2 border-slate-300 p-1.5 rounded-lg bg-slate-50 w-fit">
                                        <QRCodeRender data={`upi://pay?pa=9360232991@okbizaxis&pn=LOOKSTYLO%20FASHION&am=${balanceAmount.toFixed(2)}&cu=INR`} size={50} />
                                        <div>
                                            <p className="text-[9px] font-bold text-gray-900 leading-tight uppercase tracking-wider mb-0.5">Scan to Pay</p>
                                            <p className="text-[11px] font-black text-indigo-700">₹ {balanceAmount.toFixed(2)}</p>
                                        </div>
                                    </div>
                                )}
                            </div>
                            <div className="w-[45%]">
                                <div className="flex justify-between py-1"><span className="font-semibold">Sub Total:</span><span>₹ {subTotal.toFixed(2)}</span></div>
                                {billDiscount > 0 && <div className="flex justify-between py-1 text-gray-700"><span>Discount ({billDiscount}%):</span><span>- ₹ {discountAmount.toFixed(2)}</span></div>}
                                {billType === 'GST' && totalIncludedGstAmount > 0 && <div className="flex justify-between py-1 text-gray-700"><span>Includes GST:</span><span>₹ {totalIncludedGstAmount.toFixed(2)}</span></div>}
                                {roundOffAmount !== 0 && <div className="flex justify-between py-1 text-gray-700"><span>Round Off:</span><span>{roundOffAmount > 0 ? '+ ' : '- '}₹ {Math.abs(roundOffAmount).toFixed(2)}</span></div>}
                                <div className="flex justify-between text-sm font-bold border-t border-b border-gray-900 py-2 mt-1 bg-gray-50 px-1 mb-1"><span>Grand Total:</span><span>₹ {grandTotal.toFixed(2)}</span></div>
                                
                                {advancePayment > 0 && <div className="flex justify-between text-[11px] font-semibold text-gray-800 px-1 py-0.5"><span>Advance Paid:</span><span>₹ {(Number(advancePayment) || 0).toFixed(2)}</span></div>}
                                <div className="flex justify-between text-[11px] font-semibold text-gray-800 px-1 py-0.5"><span>Paid (GPay):</span><span>₹ {(Number(paidGpay) || 0).toFixed(2)}</span></div>
                                <div className="flex justify-between text-[11px] font-semibold text-gray-800 px-1 py-0.5"><span>Paid (Cash):</span><span>₹ {(Number(paidCash) || 0).toFixed(2)}</span></div>
                                
                                <div className="flex justify-between text-[12px] font-bold text-gray-900 mt-1 px-1 border-t border-b border-gray-300 py-1 mb-1">
                                    <span>Balance:</span><span>₹ {balanceAmount.toFixed(2)}</span>
                                </div>
                                {balanceAmount > 0 && (
                                    <div className="mt-1.5 flex justify-end no-print">
                                        <a href={`upi://pay?pa=9360232991@okbizaxis&pn=LOOKSTYLO%20FASHION&am=${balanceAmount}&cu=INR`} target="_blank" className="bg-indigo-600 hover:bg-indigo-700 text-white px-2 py-1.5 rounded shadow-sm text-[9px] font-bold flex items-center gap-1 uppercase tracking-wider transition-colors">
                                            <svg xmlns="http://www.w3.org/2000/svg" className="h-3 w-3" viewBox="0 0 20 20" fill="currentColor"><path fillRule="evenodd" d="M11.3 1.046A1 1 0 0112 2v5h4a1 1 0 01.82 1.573l-7 10A1 1 0 018 18v-5H4a1 1 0 01-.82-1.573l7-10a1 1 0 011.12-.381z" clipRule="evenodd" /></svg>
                                            Pay ₹{balanceAmount.toFixed(2)}
                                        </a>
                                    </div>
                                )}

                                <div className="text-[10px] text-gray-500 mt-1 px-1">Total Qty: {totalQty}</div>
                            </div>
                        </div>
                        
                        <div className="mt-2 pt-1.5 border-t border-gray-300 text-center text-[8px] font-extrabold text-gray-500 tracking-widest uppercase shrink-0">
                            Powered by Shariff Enterprises
                        </div>
                        
                        {balanceAmount <= 0 && grandTotal > 0 && (
                            <div className="paid-seal">PAID</div>
                        )}
                    </div>
                );
            };

            // ✨ RENDER LOGIN SCREEN IF LOCKED
            if (isAppLocked) {
                return (
                    <div className="min-h-screen bg-slate-900 flex items-center justify-center p-4 relative overflow-hidden font-sans">
                        <div className="absolute inset-0 z-0 overflow-hidden pointer-events-none">
                            <div className="absolute top-[-10%] left-[-10%] w-96 h-96 bg-indigo-600 rounded-full mix-blend-multiply filter blur-[120px] opacity-40 animate-blob"></div>
                            <div className="absolute top-[20%] right-[-10%] w-96 h-96 bg-purple-600 rounded-full mix-blend-multiply filter blur-[120px] opacity-40 animate-blob animation-delay-2000"></div>
                            <div className="absolute bottom-[-20%] left-[20%] w-96 h-96 bg-blue-600 rounded-full mix-blend-multiply filter blur-[120px] opacity-40 animate-blob animation-delay-4000"></div>
                        </div>
                        
                        <div className="bg-slate-900/50 backdrop-blur-2xl border border-white/10 p-10 rounded-[2rem] shadow-2xl w-full max-w-md z-10 flex flex-col items-center animate-fade-in">
                            <div className="w-20 h-20 bg-white rounded-2xl flex items-center justify-center shadow-lg mb-6 p-2 ring-1 ring-white/20">
                                {logoUrl ? <img src={logoUrl} alt="Logo" className="w-full h-full object-contain" /> : <StoreLogo className="w-10 h-10 text-slate-900" />}
                            </div>
                            <h2 className="text-2xl font-black text-white tracking-widest mb-2 text-center uppercase">LOOKSTYLO FASHION</h2>
                            <p className="text-slate-400 text-sm font-medium mb-8 text-center">Authenticate to access the terminal</p>

                            <form onSubmit={handleLogin} className="w-full space-y-5">
                                <div>
                                    <label className="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2 ml-1">User ID</label>
                                    <input type="text" value={loginId} onChange={e=>setLoginId(e.target.value)} className="w-full p-4 bg-slate-800/50 border border-slate-700 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all text-white font-medium placeholder-slate-500 shadow-inner" placeholder="Enter User ID" />
                                </div>
                                <div>
                                    <label className="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2 ml-1">Password</label>
                                    <input type="password" value={loginPass} onChange={e=>setLoginPass(e.target.value)} className="w-full p-4 bg-slate-800/50 border border-slate-700 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all text-white font-medium placeholder-slate-500 shadow-inner" placeholder="••••••••" />
                                </div>
                                
                                {authError && <p className="text-red-400 text-xs font-bold text-center bg-red-900/20 py-3 rounded-xl border border-red-500/20">{authError}</p>}
                                
                                <button type="submit" className="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-4 rounded-xl shadow-[0_0_20px_rgba(79,70,229,0.3)] transition-all transform hover:-translate-y-0.5 flex justify-center items-center gap-2 mt-4 text-sm tracking-wide">
                                    <Icons.CheckCircle className="w-5 h-5" />
                                    SECURE LOGIN
                                </button>
                            </form>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen flex flex-col relative animate-fade-in bg-[#f8fafc] font-sans">
                    {activeTab === 'reports' ? (
                        <style>{`@media print { @page { size: A4 portrait; margin: 15mm; } }`}</style>
                    ) : (
                        <style>{`@media print { @page { size: 148mm 210mm; margin: 0; } }`}</style>
                    )}

                    {notification && (
                        <div className="fixed bottom-6 right-6 bg-slate-900 text-white font-bold px-6 py-4 rounded-xl shadow-2xl z-[100] flex items-center gap-3 animate-fade-in border border-slate-700">
                            <Icons.CheckCircle className="w-5 h-5 text-emerald-400" /> {notification}
                        </div>
                    )}

                    {/* Delivery Updates Modal */}
                    {deliveryActionBill && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-md z-[300] flex items-center justify-center p-4 animate-fade-in" onClick={() => setDeliveryActionBill(null)}>
                            <div className="bg-white rounded-3xl shadow-2xl w-full max-w-sm p-8 transform transition-all border border-slate-200" onClick={e => e.stopPropagation()}>
                                <div className="flex justify-between items-center mb-6">
                                    <h3 className="text-xl font-extrabold text-slate-900">Delivery Status</h3>
                                    <button onClick={()=>setDeliveryActionBill(null)} className="text-slate-400 hover:text-slate-600 text-3xl leading-none">&times;</button>
                                </div>
                                <div className="bg-slate-50 p-5 rounded-2xl mb-6 border border-slate-200 text-center">
                                    <p className="text-[10px] text-slate-500 font-bold uppercase tracking-widest mb-1">Customer</p>
                                    <p className="font-bold text-slate-800 uppercase text-lg">{deliveryActionBill.customer || deliveryActionBill.name || 'Unknown'}</p>
                                    <p className="font-mono font-medium text-slate-600 mt-1 flex justify-center items-center gap-1.5">
                                        <Icons.CheckCircle className="w-3.5 h-3.5" /> {deliveryActionBill.phone || 'No Phone Attached'}
                                    </p>
                                </div>
                                <div className="space-y-3">
                                    <button onClick={() => handleDeliveryAction(deliveryActionBill, 'dispatch_today')} className="w-full bg-slate-900 hover:bg-slate-800 text-white font-bold py-3.5 rounded-xl transition-colors flex items-center justify-center gap-2 shadow-sm">
                                        <Icons.Package className="w-4 h-4" /> Dispatch Today
                                    </button>
                                    <button onClick={() => handleDeliveryAction(deliveryActionBill, 'dispatch_tomorrow')} className="w-full bg-white border border-slate-200 hover:bg-slate-50 text-slate-800 font-bold py-3.5 rounded-xl transition-colors flex items-center justify-center gap-2 shadow-sm">
                                        <Icons.Clock className="w-4 h-4" /> Dispatch Tomorrow
                                    </button>
                                    <button onClick={() => handleDeliveryAction(deliveryActionBill, 'out_for_delivery')} className="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3.5 rounded-xl transition-colors flex items-center justify-center gap-2 shadow-sm">
                                        <Icons.Truck className="w-4 h-4" /> Out For Delivery
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {showGpayModal && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-md z-[300] flex items-center justify-center p-4 animate-fade-in" onClick={() => setShowGpayModal(false)}>
                            <div className="bg-white rounded-3xl shadow-2xl p-8 transform transition-all max-w-sm w-full text-center" onClick={e => e.stopPropagation()}>
                                <div className="w-16 h-16 bg-blue-50 rounded-2xl flex items-center justify-center mx-auto mb-5 shadow-sm border border-blue-100">
                                    <Icons.Bank className="h-8 w-8 text-blue-600" />
                                </div>
                                <h3 className="text-2xl font-black text-slate-900 mb-2">Scan to Pay</h3>
                                <p className="text-slate-500 font-medium mb-6 flex items-center justify-center gap-2">
                                    Amount: <span className="text-3xl font-black text-blue-600">₹{paidGpay}</span>
                                </p>

                                <div className="bg-white p-4 rounded-2xl border border-slate-200 inline-block shadow-sm w-full flex justify-center overflow-hidden relative group">
                                    <QRCodeRender data={`upi://pay?pa=9360232991@okbizaxis&pn=LOOKSTYLO%20FASHION&am=${paidGpay}&cu=INR`} size={220} />
                                </div>
                                
                                <div className="mt-6 text-xs font-bold text-slate-400 flex items-center justify-center gap-3 border-t border-slate-100 pt-6 uppercase tracking-widest">
                                    <span>GPay</span> • <span>PhonePe</span> • <span>UPI</span>
                                </div>

                                <button onClick={() => setShowGpayModal(false)} className="mt-6 w-full bg-slate-900 hover:bg-slate-800 text-white font-bold py-4 rounded-xl transition-colors shadow-md">Complete</button>
                            </div>
                        </div>
                    )}

                    {paymentModal && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-md z-[200] flex items-center justify-center p-4">
                            <div className="bg-white rounded-3xl shadow-2xl w-full max-w-sm p-8 transform transition-all animate-fade-in border border-slate-200">
                                <div className="flex justify-between items-center mb-6">
                                    <h3 className="text-xl font-extrabold text-slate-900">Update Payment</h3>
                                    <button onClick={()=>setPaymentModal(null)} className="text-slate-400 hover:text-slate-600 text-3xl leading-none">&times;</button>
                                </div>
                                <div className="bg-slate-50 p-5 rounded-2xl mb-6 border border-slate-200">
                                    <p className="text-[10px] text-slate-500 font-bold uppercase tracking-widest mb-1">Invoice {paymentModal.id}</p>
                                    <div className="flex justify-between items-end">
                                        <span className="text-sm font-semibold text-slate-600">Bill Total:</span>
                                        <span className="text-xl font-black text-slate-900">₹ {paymentModal.total}</span>
                                    </div>
                                </div>
                                <div className="space-y-4">
                                    <ModernInput label="Advance Paid (₹)" type="number" min="0" value={editAdvance} onChange={e=>setEditAdvance(e.target.value)} className="text-purple-700 font-bold bg-white" />
                                    <ModernInput label="Total Cash Paid (₹)" type="number" min="0" value={editCash} onChange={e=>setEditCash(e.target.value)} className="text-emerald-700 font-bold bg-white" />
                                    <ModernInput label="Total G-Pay Paid (₹)" type="number" min="0" value={editGpay} onChange={e=>setEditGpay(e.target.value)} className="text-blue-700 font-bold bg-white" />
                                </div>
                                
                                <div className={`mt-6 p-5 rounded-2xl flex justify-between items-center border ${(paymentModal.total - (Number(editCash)||0) - (Number(editGpay)||0) - (Number(editAdvance)||0)) > 0 ? 'bg-amber-50 border-amber-200' : 'bg-emerald-50 border-emerald-200'}`}>
                                    <span className="text-sm font-bold text-slate-600">New Balance:</span>
                                    <span className={`text-2xl font-black ${(paymentModal.total - (Number(editCash)||0) - (Number(editGpay)||0) - (Number(editAdvance)||0)) > 0 ? 'text-amber-600' : 'text-emerald-600'}`}>
                                        ₹ {(paymentModal.total - (Number(editCash)||0) - (Number(editGpay)||0) - (Number(editAdvance)||0)).toFixed(2)}
                                    </span>
                                </div>

                                <div className="flex gap-3 mt-8">
                                    <button onClick={()=>setPaymentModal(null)} className="flex-1 bg-white border border-slate-200 hover:bg-slate-50 text-slate-700 font-bold py-3.5 rounded-xl transition-colors">Cancel</button>
                                    <button onClick={handleUpdatePayment} className="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3.5 rounded-xl transition-colors shadow-md">Save Update</button>
                                </div>
                            </div>
                        </div>
                    )}

                    <nav className="bg-[#0f172a] text-white p-4 shadow-lg sticky top-0 z-50 no-print border-b border-slate-800">
                        <div className="max-w-[1400px] mx-auto flex flex-col xl:flex-row justify-between items-center gap-6">
                            <div className="flex items-center justify-between w-full xl:w-auto">
                                <div className="flex items-center gap-3">
                                    <div className="bg-white p-1 rounded-lg">
                                        {logoUrl ? <img src={logoUrl} alt="Logo" className="h-8 w-8 object-contain rounded" /> : <StoreLogo className="w-8 h-8 text-slate-900" />}
                                    </div>
                                    <h1 className="text-xl font-black tracking-widest uppercase">
                                        LOOKSTYLO FASHION
                                    </h1>
                                </div>
                                <div className="flex items-center gap-2 xl:hidden">
                                    <button onClick={() => setIsAppLocked(true)} className="bg-slate-800 hover:bg-slate-700 text-white text-xs font-bold px-3 py-2 rounded-lg transition-colors border border-slate-700 flex items-center gap-2">
                                        <svg xmlns="http://www.w3.org/2000/svg" className="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}><path strokeLinecap="round" strokeLinejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" /></svg>
                                    </button>
                                </div>
                            </div>
                            
                            <div className="flex w-full xl:w-auto overflow-x-auto pb-2 xl:pb-0 hide-scroll">
                                <div className="flex bg-slate-800/50 p-1.5 rounded-2xl border border-slate-700/50 w-max mx-auto gap-1">
                                    <TabButton id="billing" label="Billing" activeTab={activeTab} setActiveTab={setActiveTab} />
                                    <TabButton id="inventory" label="Inventory" activeTab={activeTab} setActiveTab={setActiveTab} />
                                    <TabButton id="expenses" label="Expenses" activeTab={activeTab} setActiveTab={setActiveTab} />
                                    <TabButton id="reports" label="Reports" activeTab={activeTab} setActiveTab={setActiveTab} />
                                    <TabButton id="generator" label="Labels" activeTab={activeTab} setActiveTab={setActiveTab} />
                                    <TabButton id="scanner" label="Scanner" activeTab={activeTab} setActiveTab={setActiveTab} />
                                    <TabButton id="settings" label="Settings" activeTab={activeTab} setActiveTab={setActiveTab} />
                                </div>
                            </div>

                            <div className="hidden xl:flex items-center gap-3">
                                {installPrompt && (
                                    <button onClick={handleInstallApp} className="bg-indigo-600 hover:bg-indigo-500 text-white text-xs font-bold px-4 py-2 rounded-xl shadow-sm transition-colors flex items-center gap-2">
                                        <Icons.Download className="h-4 w-4" />
                                        Install App
                                    </button>
                                )}
                                <button onClick={() => setIsAppLocked(true)} className="bg-slate-800 hover:bg-slate-700 text-white text-xs font-bold px-4 py-2 rounded-xl transition-colors border border-slate-700 flex items-center gap-2">
                                    <svg xmlns="http://www.w3.org/2000/svg" className="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}><path strokeLinecap="round" strokeLinejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" /></svg>
                                    Lock
                                </button>
                            </div>
                        </div>
                    </nav>

                    <main className="flex-grow p-4 md:p-6 max-w-[1400px] mx-auto w-full flex flex-col lg:flex-row gap-6">
                        
                        {/* -------------------- TAB: BILLING -------------------- */}
                        {activeTab === 'billing' && (
                            <>
                                <div className="w-full lg:w-[55%] bg-white p-6 md:p-8 rounded-3xl shadow-sm border border-slate-200 h-fit flex flex-col gap-8 no-print">
                                    <div className="flex justify-between items-center border-b border-slate-100 pb-4">
                                        <div><h2 className="text-2xl font-black text-slate-900 tracking-tight">Invoice Generator</h2></div>
                                        <button onClick={handleNewBill} className="text-xs font-bold text-slate-500 hover:text-slate-800 bg-slate-50 hover:bg-slate-100 px-4 py-2 rounded-xl transition-colors border border-slate-200 flex items-center gap-2">
                                            <Icons.Refresh className="w-3.5 h-3.5" /> Clear Form
                                        </button>
                                    </div>

                                    <div className="grid grid-cols-1 md:grid-cols-3 gap-5">
                                        <ModernInput label="Invoice No." type="text" value={billInvoice} onChange={e=>setBillInvoice(e.target.value)} />
                                        <ModernInput label="Date" type="date" value={billDate} onChange={e=>setBillDate(e.target.value)} />
                                        <div>
                                            <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1.5 ml-1">Bill Type</label>
                                            <select value={billType} onChange={e=>setBillType(e.target.value)} className="w-full p-3 bg-white border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none transition-all text-sm font-bold text-slate-800 shadow-sm cursor-pointer">
                                                <option value="Non-GST">Non-GST</option>
                                                <option value="GST">GST Bill</option>
                                            </select>
                                        </div>
                                        <ModernInput label="Phone Number" type="text" value={billCustomerPhone} onChange={handlePhoneChange} placeholder="Enter Phone to Auto-Fill" className="md:col-span-1 border-slate-200 focus:border-indigo-500 font-mono" />
                                        <ModernInput label="Customer Name" type="text" value={billCustomerName} onChange={e=>setBillCustomerName(e.target.value)} placeholder="Walk-in Customer" className="md:col-span-2" />
                                    </div>

                                    <div className="bg-slate-50 rounded-2xl p-6 border border-slate-200 space-y-5">
                                        <div>
                                            <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1.5 ml-1">Delivery Type</label>
                                            <select value={billDelivery} onChange={e=>setBillDelivery(e.target.value)} className="w-full p-3 bg-white border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none transition-all font-bold text-slate-800 shadow-sm cursor-pointer">
                                                <option value="Store Walk-in">Store Walk-in</option>
                                                <option value="Courier">Courier Delivery (Generates Label)</option>
                                            </select>
                                        </div>
                                        
                                        {billDelivery === 'Courier' && (
                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-5 pt-4 border-t border-slate-200">
                                                <div>
                                                    <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1.5 ml-1">Select Courier</label>
                                                    <select value={billCourier} onChange={e=>setBillCourier(e.target.value)} className="w-full p-3 bg-white border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none transition-all text-sm font-medium shadow-sm">
                                                        <option value="Professional Courier">Professional Courier</option>
                                                        <option value="ST Courier">ST Courier</option>
                                                        <option value="India Post">India Post</option>
                                                    </select>
                                                </div>
                                                <ModernInput label="Tracking ID" type="text" value={billTracking} onChange={e=>setBillTracking(e.target.value)} placeholder="Tracking No." />
                                                <div className="md:col-span-2">
                                                    <div className="flex justify-between items-end mb-1.5 ml-1">
                                                        <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider">Shipping Address (For Label)</label>
                                                    </div>
                                                    <textarea rows="3" value={billCustomerAddress} onChange={e=>setBillCustomerAddress(e.target.value)} placeholder="Full Delivery Address" className="w-full p-4 bg-white border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none transition-all text-sm font-medium shadow-sm resize-none"></textarea>
                                                </div>
                                            </div>
                                        )}
                                    </div>

                                    <div className="border border-slate-200 rounded-2xl overflow-hidden">
                                        <div className="bg-slate-50 px-5 py-4 border-b border-slate-200 flex justify-between items-center">
                                            <h3 className="font-bold text-slate-800 uppercase tracking-wider text-xs">Particulars</h3>
                                            <span className="text-xs font-bold text-indigo-700 bg-indigo-100 px-2.5 py-1 rounded-lg">{billItems.length} Item(s)</span>
                                        </div>
                                        <div className="p-5 space-y-3 bg-white">
                                            <datalist id="preset-items">
                                                {inventory.map(item => <option key={item.id} value={item.name}>{item.sku}</option>)}
                                            </datalist>
                                            {billItems.map((item, index) => (
                                                <div key={item.id} className="flex gap-2 items-center group flex-wrap md:flex-nowrap">
                                                    <div className="w-6 text-center text-xs font-bold text-slate-400">{index + 1}.</div>
