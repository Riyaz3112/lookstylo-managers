<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Lookstylo Fashion</title>
    <link rel="manifest" id="dynamic-manifest" />
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode/html5-qrcode.min.js" type="text/javascript"></script>

    <style>
        body { background-color: #f8fafc; font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        /* Strict A5 Container (Screen View) */
        .a5-container {
            width: 148mm;
            height: 210mm;
            background: white;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            margin: 0 auto;
            padding: 8mm;
            box-sizing: border-box;
            position: relative;
            display: flex;
            flex-direction: column;
            color: black;
            overflow: hidden;
            border-radius: 4px;
        }

        /* Strict Print Settings */
        @media print {
            body, html { 
                background: white !important; 
                margin: 0 !important; 
                padding: 0 !important; 
                height: auto !important;
                min-height: auto !important;
                -webkit-print-color-adjust: exact; 
                print-color-adjust: exact; 
            }
            .no-print { display: none !important; }

            /* Disable flex/padding/overflow on wrappers during print */
            #root, .min-h-screen, main {
                display: block !important;
                padding: 0 !important;
                margin: 0 !important;
                max-width: none !important;
                height: auto !important;
                min-height: 0 !important;
                overflow: visible !important;
            }
            
            .print-section { 
                position: static !important; 
                width: 100% !important; 
                margin: 0 !important; 
                padding: 0 !important; 
                display: block !important; 
                background: white !important;
                box-shadow: none !important;
                border: none !important;
                overflow: visible !important;
            }
            
            /* A5 Specifics for Billing */
            .a5-container {
                width: 148mm !important;
                height: 209mm !important; /* Shave 1mm to prevent overflow blank page */
                box-sizing: border-box !important;
                box-shadow: none !important; 
                border: none !important;
                margin: 0 !important; 
                padding: 8mm !important; /* Safe printable margin */
                page-break-after: always; 
                break-after: page;
                page-break-inside: avoid;
                transform: none !important;
                overflow: hidden !important;
                border-radius: 0 !important;
                display: flex !important;
            }

            .a5-container:last-of-type,
            .print-section > div:last-child {
                page-break-after: auto !important;
                break-after: auto !important;
            }

            .print\:flex { display: flex !important; }
        }
        
        .text-brand-red { color: #d32f2f; }
        .text-brand-blue { color: #1976d2; }

        /* Remove number input spinners */
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }
        input[type=number] {
            -moz-appearance: textfield;
        }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="text-slate-800 antialiased selection:bg-indigo-200 selection:text-indigo-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // ✨ BULLETPROOF ID GENERATOR (Works on Local Desktop Files)
        const generateSafeId = () => {
            if (typeof crypto !== 'undefined' && crypto.randomUUID) {
                return crypto.randomUUID();
            }
            return 'id-' + Math.random().toString(36).substr(2, 9) + '-' + Date.now();
        };

        // --- DYNAMIC PWA MANIFEST ---
        const setupPWA = () => {
            const iconSvg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%234f46e5"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>`;
            const manifestJSON = {
                "name": "Lookstylo Billing App",
                "short_name": "Lookstylo",
                "start_url": window.location.href,
                "display": "standalone",
                "background_color": "#f8fafc",
                "theme_color": "#0f172a",
                "icons": [
                    {
                        "src": "data:image/svg+xml;charset=utf-8," + encodeURIComponent(iconSvg),
                        "sizes": "192x192",
                        "type": "image/svg+xml",
                        "purpose": "any maskable"
                    },
                    {
                        "src": "data:image/svg+xml;charset=utf-8," + encodeURIComponent(iconSvg),
                        "sizes": "512x512",
                        "type": "image/svg+xml",
                        "purpose": "any maskable"
                    }
                ]
            };
            const stringManifest = JSON.stringify(manifestJSON);
            const blob = new Blob([stringManifest], {type: 'application/json'});
            const manifestURL = URL.createObjectURL(blob);
            document.getElementById('dynamic-manifest').setAttribute('href', manifestURL);
        };
        setupPWA();

        // --- ICON COMPONENTS ---
        const StoreLogo = ({ className = "w-5 h-5" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path>
                <line x1="3" y1="6" x2="21" y2="6"></line>
                <path d="M16 10a4 4 0 0 1-8 0"></path>
            </svg>
        );

        const InstagramIcon = ({ className = "w-5 h-5" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect>
                <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path>
                <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line>
            </svg>
        );

        const WhatsAppIcon = ({ className = "w-5 h-5" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path>
            </svg>
        );

        // --- REUSABLE BARCODE & QR COMPONENTS ---
        const Barcode = ({ value }) => {
            const ref = useRef(null);
            useEffect(() => {
                if (ref.current && value) {
                    JsBarcode(ref.current, value, { format: "CODE128", displayValue: true, fontSize: 20, fontOptions: "bold", textMargin: 5, height: 60, margin: 0 });
                }
            }, [value]);
            return <canvas ref={ref}></canvas>;
        };

        const QRCodeRender = ({ data }) => {
            const ref = useRef(null);
            useEffect(() => {
                if (ref.current && data) {
                    ref.current.innerHTML = "";
                    new QRCode(ref.current, { text: data, width: 120, height: 120, colorDark: "#000000", colorLight: "#ffffff", correctLevel: QRCode.CorrectLevel.M });
                }
            }, [data]);
            return <div ref={ref} className="border border-gray-200 p-1 bg-white"></div>;
        };

        // Enhanced Tab Button Component
        const TabButton = ({ id, label, activeTab, setActiveTab }) => (
            <button 
                onClick={() => setActiveTab(id)} 
                className={`px-5 py-2.5 rounded-xl font-bold text-sm flex items-center gap-2 transition-all duration-300 ${activeTab === id ? 'bg-white text-indigo-900 shadow-md transform scale-105' : 'bg-white/10 hover:bg-white/20 text-white border border-transparent hover:border-white/10'}`}
            >
                {label}
            </button>
        );

        // Reusable Input Component
        const ModernInput = ({ label, ...props }) => (
            <div>
                <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1.5 ml-1">{label}</label>
                <input {...props} className={`w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-4 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none transition-all text-sm font-medium text-slate-800 shadow-sm ${props.className || ''}`} />
            </div>
        );

        // --- REUSABLE LABEL COMPONENT ---
        const LabelContent = ({ orderId, toName, toAddress, toPhone, billName, billAddress, billPhone, copyLabel, logoUrl }) => (
            <div className="border-2 border-gray-900 flex-grow flex flex-col text-black bg-white box-border w-full h-full p-4 relative">
                {copyLabel && (
                    <div className="absolute top-0 right-0 bg-indigo-600 text-white text-[9px] px-2 py-0.5 font-bold uppercase z-10">
                        {copyLabel}
                    </div>
                )}
                {/* Header */}
                <div className="flex items-center justify-between border-b-2 border-gray-900 pb-4 mb-4">
                    <div className="w-1/4 flex flex-col items-start justify-center">
                        {logoUrl ? <img src={logoUrl} alt="Logo" className="w-24 object-contain" /> : <StoreLogo className="w-16 h-16 text-gray-900" />}
                    </div>
                    <div className="text-center flex-1 px-2">
                        {!logoUrl && <div className="text-brand-red font-extrabold text-3xl tracking-wide uppercase">LOOKSTYLO FASHION</div>}
                        <div className="text-brand-blue font-bold text-xl tracking-wider uppercase mt-1">SHARIEF ENTERPRISES</div>
                    </div>
                    <div className="w-1/4 flex justify-end">
                        <QRCodeRender data={JSON.stringify({ id: orderId, name: toName, phone: toPhone })} />
                    </div>
                </div>

                {/* Body Content */}
                <div className="flex-grow flex flex-col">
                    <div className="mb-6">
                        <h3 className="font-extrabold text-2xl uppercase mb-1">FROM:</h3>
                        <div className="font-bold text-lg leading-snug uppercase">
                            LOOKSTYLO FASHION,<br/>SHOP NO 02, OPPOSITE POST OFFICE<br/>PAKKIRITHAKA JOLARPATTAI - 635851.<br/>📞 8680857511
                        </div>
                    </div>
                    
                    <div className="mb-4">
                        <h3 className="font-extrabold text-2xl uppercase mb-1">TO,</h3>
                        <div className="font-bold text-lg leading-snug uppercase">
                            {toName || ' '}<br/>
                            {toAddress ? toAddress.split('\n').map((line, i) => <React.Fragment key={i}>{line}<br/></React.Fragment>) : ' '}<br/>
                            {toPhone ? `📞 ${toPhone}` : ' '}
                        </div>
                    </div>

                    {(billName || billAddress || billPhone) && (
                        <div className="mb-4 pt-4 border-t border-dashed border-gray-400">
                            <h3 className="font-extrabold text-xl uppercase mb-1">BILL TO,</h3>
                            <div className="font-bold text-md leading-snug uppercase text-gray-700">
                                {billName || ' '}<br/>
                                {billAddress ? billAddress.split('\n').map((line, i) => <React.Fragment key={i}>{line}<br/></React.Fragment>) : ' '}<br/>
                                {billPhone || ' '}
                            </div>
                        </div>
                    )}
                </div>

                {/* Footer */}
                <div className="mt-auto flex flex-col items-center pt-4 border-t-2 border-gray-900">
                    <div className="mb-4 bg-white p-2 rounded">
                        <Barcode value={orderId || '0000'} />
                    </div>
                    <div className="flex items-center justify-between w-full font-bold text-lg text-brand-red uppercase px-4">
                        <div className="flex items-center gap-1.5"><InstagramIcon className="w-6 h-6" /> LOKSTLYO_FASHION</div>
                        <div className="flex items-center gap-1.5"><WhatsAppIcon className="w-6 h-6" /> 8680857511</div>
                    </div>
                </div>
            </div>
        );

        function App() {
            const [activeTab, setActiveTab] = useState('billing'); 
            const [sheetUrl, setSheetUrl] = useState(localStorage.getItem('googleSheetUrl') || '');
            const [serverUrl, setServerUrl] = useState(localStorage.getItem('serverUrl') || '/api/save-label');
            const [logoUrl, setLogoUrl] = useState(localStorage.getItem('logoUrl') || ''); 
            const [notification, setNotification] = useState(null); 
            
            // ✨ EDITING REF: Prevents auto-generating new IDs when loading old bills
            const isEditingRef = useRef(false);

            const showNotification = (msg) => {
                setNotification(msg);
                setTimeout(() => setNotification(null), 3000);
            };

            // ✨ PWA INSTALL STATE
            const [installPrompt, setInstallPrompt] = useState(null);

            useEffect(() => {
                const handleBeforeInstallPrompt = (e) => {
                    e.preventDefault();
                    setInstallPrompt(e);
                };
                window.addEventListener('beforeinstallprompt', handleBeforeInstallPrompt);
                return () => window.removeEventListener('beforeinstallprompt', handleBeforeInstallPrompt);
            }, []);

            const handleInstallApp = async () => {
                if (!installPrompt) return;
                installPrompt.prompt();
                const { outcome } = await installPrompt.userChoice;
                if (outcome === 'accepted') {
                    setInstallPrompt(null);
                    showNotification("App installed successfully! Check your home screen.");
                }
            };

            // --- CUSTOMER DATABASE (AUTO-FILL) ---
            const [customers, setCustomers] = useState(() => JSON.parse(localStorage.getItem('customers') || '{}'));

            // --- INVENTORY MANAGEMENT ---
            const DEFAULT_INVENTORY_RAW = {
                'IPL JERSEY MI - M': 280, 'IPL JERSEY MI - L': 280, 'IPL JERSEY MI - XL': 280,
                'IPL JERSEY RCB - M': 280, 'IPL JERSEY RCB - L': 280, 'IPL JERSEY RCB - XL': 280,
                'IPL JERSEY CSK - M': 280, 'IPL JERSEY CSK - L': 280, 'IPL JERSEY CSK - XL': 280,
                'FOOT BALL JERSEY - M': 280, 'FOOT BALL JERSEY - L': 280, 'FOOT BALL JERSEY - XL': 280,
                'BACKPRINT DROPSHOLDER - M': 380, 'BACKPRINT DROPSHOLDER - L': 380, 'BACKPRINT DROPSHOLDER - XL': 380, 'BACKPRINT DROPSHOLDER - XXL': 380,
                'DIS FAB POLO 0838 - M': 500, 'DIS FAB POLO 0838 - L': 500, 'DIS FAB POLO 0838 - XL': 500,
                'NET FOLDING DROPSHOLDER 0839 - M': 450, 'NET FOLDING DROPSHOLDER 0839 - L': 450, 'NET FOLDING DROPSHOLDER 0839 - XL': 450,
                'BAGGY TRACK BLACK - M': 280, 'BAGGY TRACK BLACK - L': 280, 'BAGGY TRACK BLACK - XL': 280, 'BAGGY TRACK BLACK - XXL': 280,
                'BAGGY TRACK RED - M': 280, 'BAGGY TRACK RED - L': 280, 'BAGGY TRACK RED - XL': 280, 'BAGGY TRACK RED - XXL': 280,
                'BAGGY TRACK SANDLE - M': 280, 'BAGGY TRACK SANDLE - L': 280, 'BAGGY TRACK SANDLE - XL': 280, 'BAGGY TRACK SANDLE - XXL': 280,
            };
            
            const DEFAULT_INVENTORY = Object.fromEntries(
                Object.entries(DEFAULT_INVENTORY_RAW).map(([k, v]) => [k, { price: v, hsn: '' }])
            );

            const [inventory, setInventory] = useState(() => {
                const stored = JSON.parse(localStorage.getItem('inventory'));
                if (!stored) return DEFAULT_INVENTORY;
                
                const migrated = {};
                for (const key in stored) {
                    if (typeof stored[key] === 'number') {
                        migrated[key] = { price: stored[key], hsn: '' };
                    } else {
                        migrated[key] = stored[key];
                    }
                }
                return migrated;
            });
            const [newItemName, setNewItemName] = useState('');
            const [newItemPrice, setNewItemPrice] = useState('');
            const [newItemHsn, setNewItemHsn] = useState(''); 

            const handleAddInventory = () => {
                if (!newItemName.trim() || !newItemPrice) return showNotification("Please enter item name and price.");
                const upperName = newItemName.trim().toUpperCase();
                const newInv = { ...inventory, [upperName]: { price: Number(newItemPrice), hsn: newItemHsn.trim() } };
                setInventory(newInv);
                localStorage.setItem('inventory', JSON.stringify(newInv));
                setNewItemName('');
                setNewItemPrice('');
                setNewItemHsn('');
                showNotification(`${upperName} added to inventory!`);
            };

            const handleDeleteInventory = (itemName) => {
                if(window.confirm(`Delete ${itemName} from inventory?`)) {
                    const newInv = { ...inventory };
                    delete newInv[itemName];
                    setInventory(newInv);
                    localStorage.setItem('inventory', JSON.stringify(newInv));
                    showNotification("Item deleted.");
                }
            };

            // --- SAVED BILLS FOR REPORTS (AUTO-GENERATES 1-19) ---
            const [savedBills, setSavedBills] = useState(() => {
                const existing = JSON.parse(localStorage.getItem('savedBills') || 'null');
                if (existing && existing.length > 0) return existing;

                // Auto-create bills 1 through 19 if database is empty
                const initialBills = [];
                for (let i = 1; i <= 19; i++) {
                    initialBills.push({
                        id: `LSF-APR-${String(i).padStart(3, '0')}`,
                        date: '2026-04-01', 
                        type: 'Non-GST',
                        customer: 'Pending Edit',
                        phone: '',
                        address: '',
                        delivery: 'Store Walk-in',
                        courier: 'Professional Courier',
                        tracking: '',
                        discount: 0,
                        promoCode: 'NO CODE',
                        items: [{ id: generateSafeId(), particular: 'PENDING BILL UPDATE', hsn: '', qty: 1, rate: 0 }],
                        total: 0,
                        cash: 0,
                        gpay: 0,
                        balance: 0
                    });
                }
                localStorage.setItem('savedBills', JSON.stringify(initialBills));
                
                // Set the counter so the next new bill is #20
                const counters = JSON.parse(localStorage.getItem('invoiceCounters') || '{}');
                counters['APR-2026'] = 20; 
                localStorage.setItem('invoiceCounters', JSON.stringify(counters));
                
                return initialBills;
            });

            // Helper to generate Auto Incrementing IDs based on Month/Year (e.g. LSF-APR-001)
            const getNextInvoiceId = (dateStr) => {
                const d = new Date(dateStr || new Date());
                if (isNaN(d.getTime())) return '';
                const month = d.toLocaleString('en-US', { month: 'short' }).toUpperCase();
                const year = d.getFullYear();
                const key = `${month}-${year}`;

                const counters = JSON.parse(localStorage.getItem('invoiceCounters') || '{}');
                const currentSeq = counters[key] || 1;
                return `LSF-${month}-${String(currentSeq).padStart(3, '0')}`;
            };

            const todayStr = new Date().toISOString().split('T')[0];

            // --- LOAD DRAFTS FOR CONTINUOUS AUTO-SAVE ---
            const lDraft = JSON.parse(localStorage.getItem('labelDraft') || '{}');
            const bDraft = JSON.parse(localStorage.getItem('billingDraft') || '{}');

            // --- GENERATOR STATE ---
            const [orderId, setOrderId] = useState(lDraft.orderId || getNextInvoiceId(todayStr));
            const [toName, setToName] = useState(lDraft.toName || '');
            const [toAddress, setToAddress] = useState(lDraft.toAddress || '');
            const [toPhone, setToPhone] = useState(lDraft.toPhone || '');
            const [billName, setBillName] = useState(lDraft.billName || '');
            const [billAddress, setBillAddress] = useState(lDraft.billAddress || '');
            const [billPhone, setBillPhone] = useState(lDraft.billPhone || '');

            // --- BILLING STATE ---
            const [billDate, setBillDate] = useState(bDraft.billDate || todayStr);
            const [billInvoice, setBillInvoice] = useState(bDraft.billInvoice || getNextInvoiceId(bDraft.billDate || todayStr));
            const [billType, setBillType] = useState(bDraft.billType || 'Non-GST'); 
            const [billCustomerName, setBillCustomerName] = useState(bDraft.billCustomerName || '');
            const [billCustomerPhone, setBillCustomerPhone] = useState(bDraft.billCustomerPhone || '');
            const [billCustomerAddress, setBillCustomerAddress] = useState(bDraft.billCustomerAddress || '');
            const [billDelivery, setBillDelivery] = useState(bDraft.billDelivery || 'Store Walk-in');
            const [billCourier, setBillCourier] = useState(bDraft.billCourier || 'Professional Courier');
            const [billTracking, setBillTracking] = useState(bDraft.billTracking || '');
            const [billDiscount, setBillDiscount] = useState(bDraft.billDiscount || 0);
            const [billPromoCode, setBillPromoCode] = useState(bDraft.billPromoCode || 'NO CODE');
            const [billItems, setBillItems] = useState(bDraft.billItems || [{ id: generateSafeId(), particular: '', hsn: '', qty: 1, rate: 0 }]);
            
            // --- SPLIT PAYMENT STATE ---
            const [paidGpay, setPaidGpay] = useState(bDraft.paidGpay || 0);
            const [paidCash, setPaidCash] = useState(bDraft.paidCash || 0);

            // --- UPDATE PAYMENT STATE ---
            const [paymentModal, setPaymentModal] = useState(null);
            const [editCash, setEditCash] = useState(0);
            const [editGpay, setEditGpay] = useState(0);

            const openPaymentModal = (bill) => {
                setPaymentModal(bill);
                setEditCash(bill.cash || 0);
                setEditGpay(bill.gpay || 0);
            };

            const handleUpdatePayment = () => {
                setSavedBills(prev => {
                    const updated = prev.map(b => {
                        if (b.id === paymentModal.id) {
                            const newCash = Number(editCash) || 0;
                            const newGpay = Number(editGpay) || 0;
                            return {
                                ...b,
                                cash: newCash,
                                gpay: newGpay,
                                balance: b.total - newCash - newGpay
                            };
                        }
                        return b;
                    });
                    localStorage.setItem('savedBills', JSON.stringify(updated));
                    return updated;
                });
                showNotification("Payment updated successfully!");
                setPaymentModal(null);
            };

            const deleteBill = (id) => {
                if(window.confirm("Are you sure you want to delete this bill?")) {
                    setSavedBills(prev => {
                        const updated = prev.filter(b => b.id !== id);
                        localStorage.setItem('savedBills', JSON.stringify(updated));
                        return updated;
                    });
                    showNotification("Bill deleted successfully!");
                }
            };

            // ✨ NEW: LOAD BILL TO EDIT (Safely loads old and new bills)
            const handleEditBill = (billToEdit) => {
                isEditingRef.current = true; // Prevent date-watcher from changing the Invoice ID automatically
                
                setBillInvoice(billToEdit.id);
                setBillDate(billToEdit.date);
                setBillType(billToEdit.type || 'Non-GST');
                setBillCustomerName(billToEdit.customer === 'Walk-in' ? '' : billToEdit.customer);
                
                setBillCustomerPhone(billToEdit.phone || '');
                setBillCustomerAddress(billToEdit.address || '');
                setBillDelivery(billToEdit.delivery || 'Store Walk-in');
                setBillCourier(billToEdit.courier || 'Professional Courier');
                setBillTracking(billToEdit.tracking || '');
                setBillDiscount(billToEdit.discount || 0);

                const parts = [{ text: prompt }];
                if (imageData) {
                    parts.push({ inlineData: { mimeType: imageData.mimeType, data: imageData.data } });
                }
                const payload = { contents: [{ parts: parts }] };

                const retries = [1000, 2000, 4000, 8000, 16000];
                for (let i = 0; i <= retries.length; i++) {
                    try {
                        const response = await fetch(url, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(payload)
                        });
                        if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                        const result = await response.json();
                        return result.candidates?.[0]?.content?.parts?.[0]?.text;
                    } catch (error) {
                        if (i === retries.length) {
                            showNotification("AI Feature unavailable right now.");
                            return null;

                        await new Promise(res => setTimeout(res, retries[i]));

                                <div>
                                    <p className="font-bold text-gray-800 mb-1">Terms & Conditions:</p>
                                    <ul className="list-disc pl-3 space-y-0.5">{terms.map((t, i) => <li key={i}>{t}</li>)}</ul>
                                    <p className="mt-2 text-xs italic">Thank you for shopping with us!</p>
                                    {billPromoCode !== 'NO CODE' && (
                                        <div className="mt-2 border-2 border-dashed border-gray-400 p-1.5 rounded bg-gray-50 text-center">
                                            <p className="font-bold text-gray-800 text-[10px] uppercase">🎁 Online Special</p>
                                            <p className="text-[9px] text-gray-600 mt-0.5">{promoDetails.title}</p>
                                            <p className="text-[8px] text-gray-500 font-semibold mt-0.5 uppercase">{promoDetails.subtitle}</p>
                                            <p className="text-[10px] font-bold mt-0.5">Use Code: <span className="text-brand-red text-xs">{billPromoCode}</span></p>
                                        </div>
                                    )}
                                </div>
                            </div>
                            <div className="w-[45%]">
                                <div className="flex justify-between py-1"><span className="font-semibold">Sub Total:</span><span>₹ {subTotal.toFixed(2)}</span></div>
                                {billDiscount > 0 && <div className="flex justify-between py-1 text-gray-700"><span>Discount ({billDiscount}%):</span><span>- ₹ {discountAmount.toFixed(2)}</span></div>}
                                {roundOffAmount !== 0 && <div className="flex justify-between py-1 text-gray-700"><span>Round Off:</span><span>{roundOffAmount > 0 ? '+ ' : '- '}₹ {Math.abs(roundOffAmount).toFixed(2)}</span></div>}
                                <div className="flex justify-between text-sm font-bold border-t border-b border-gray-900 py-2 mt-1 bg-gray-50 px-1 mb-1"><span>Grand Total:</span><span>₹ {grandTotal.toFixed(2)}</span></div>
                                
                                <div className="flex justify-between text-[11px] font-semibold text-gray-800 px-1 py-0.5"><span>Paid (GPay):</span><span>₹ {(Number(paidGpay) || 0).toFixed(2)}</span></div>
                                <div className="flex justify-between text-[11px] font-semibold text-gray-800 px-1 py-0.5"><span>Paid (Cash):</span><span>₹ {(Number(paidCash) || 0).toFixed(2)}</span></div>
                                
                                <div className="flex justify-between text-[12px] font-bold text-gray-900 mt-1 px-1 border-t border-b border-gray-300 py-1 mb-1">
                                    <span>Balance:</span><span>₹ {balanceAmount.toFixed(2)}</span>
                                </div>

                                <div className="text-[10px] text-gray-500 mt-1 px-1">Total Qty: {totalQty}</div>
                            </div>
                        </div>
                        
                        {/* ✨ Powered By Tag for Bill */}
                        <div className="mt-2 pt-1.5 border-t border-gray-300 text-center text-[8px] font-extrabold text-gray-500 tracking-widest uppercase shrink-0">
                            Powered by Shariff Enterprises
                        </div>
                    </div>
                );
            };

            return (
                <div className="min-h-screen flex flex-col relative">
                    {/* Dynamic CSS for Print Sizes based on Tab */}
                    {activeTab === 'reports' ? (
                        <style>{`@media print { @page { size: A4 portrait; margin: 15mm; } }`}</style>
                    ) : (
                        <style>{`@media print { @page { size: 148mm 210mm; margin: 0; } }`}</style>
                    )}

                    {/* Custom Notification UI */}
                    {notification && (
                        <div className="fixed bottom-6 right-6 bg-slate-900 text-white font-bold px-6 py-4 rounded-2xl shadow-2xl z-[100] flex items-center gap-3 animate-bounce">
                            <span className="text-2xl">✨</span> {notification}
                        </div>
                    )}

                    {/* ✨ Update Payment Modal */}
                    {paymentModal && (
                        <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-[200] flex items-center justify-center p-4">
                            <div className="bg-white rounded-3xl shadow-2xl w-full max-w-sm p-6 transform transition-all animate-fade-in">
                                <div className="flex justify-between items-center mb-4">
                                    <h3 className="text-xl font-extrabold text-slate-800">Update Payment</h3>
                                    <button onClick={()=>setPaymentModal(null)} className="text-slate-400 hover:text-slate-600 text-2xl leading-none">&times;</button>
                                </div>
                                <div className="bg-slate-50 p-4 rounded-2xl mb-5 border border-slate-100">
                                    <p className="text-xs text-slate-500 font-bold uppercase tracking-wider mb-1">Invoice {paymentModal.id}</p>
                                    <div className="flex justify-between items-end">
                                        <span className="text-sm font-medium text-slate-600">Bill Total:</span>
                                        <span className="text-lg font-black text-slate-800">₹ {paymentModal.total}</span>
                                    </div>
                                </div>
                                <div className="space-y-4">
                                    <ModernInput label="Total Cash Paid (₹)" type="number" min="0" value={editCash} onChange={e=>setEditCash(e.target.value)} className="text-emerald-700 font-bold bg-white" />
                                    <ModernInput label="Total G-Pay Paid (₹)" type="number" min="0" value={editGpay} onChange={e=>setEditGpay(e.target.value)} className="text-blue-700 font-bold bg-white" />
                                </div>
                                
                                <div className={`mt-5 p-4 rounded-2xl flex justify-between items-center border ${(paymentModal.total - (Number(editCash)||0) - (Number(editGpay)||0)) > 0 ? 'bg-amber-50 border-amber-100' : 'bg-emerald-50 border-emerald-100'}`}>
                                    <span className="text-sm font-bold text-slate-600">New Balance:</span>
                                    <span className={`text-xl font-black ${(paymentModal.total - (Number(editCash)||0) - (Number(editGpay)||0)) > 0 ? 'text-amber-600' : 'text-emerald-600'}`}>
                                        ₹ {(paymentModal.total - (Number(editCash)||0) - (Number(editGpay)||0)).toFixed(2)}
                                    </span>
                                </div>

                                <div className="flex gap-3 mt-6">
                                    <button onClick={()=>setPaymentModal(null)} className="flex-1 bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold py-3.5 rounded-xl transition-colors">Cancel</button>
                                    <button onClick={handleUpdatePayment} className="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3.5 rounded-xl transition-colors shadow-lg shadow-indigo-200">Save Update</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Navigation - Hidden on Print */}
                    <nav className="bg-gradient-to-r from-slate-900 via-indigo-950 to-slate-900 text-white p-4 shadow-xl sticky top-0 z-50 border-b border-indigo-900/50 no-print">
                        <div className="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
                            <div className="flex items-center gap-4">
                                <h1 className="text-2xl font-black tracking-tight flex items-center gap-3 bg-clip-text text-transparent bg-gradient-to-r from-white to-indigo-200">
                                    {logoUrl ? <img src={logoUrl} alt="Logo" className="h-10 w-10 object-contain rounded-lg bg-white p-0.5" /> : <StoreLogo className="w-8 h-8 text-indigo-400" />}
                                    Lookstylo Fashion
                                </h1>
                                {installPrompt && (
                                    <button onClick={handleInstallApp} className="bg-emerald-500 hover:bg-emerald-600 text-white text-xs font-bold px-3 py-1.5 rounded-lg shadow-sm flex items-center gap-1.5 transition-colors animate-pulse border border-emerald-400">
                                        <svg xmlns="http://www.w3.org/2000/svg" className="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}><path strokeLinecap="round" strokeLinejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" /></svg>
                                        Install App
                                    </button>
                                )}
                            </div>
                            <div className="flex flex-wrap justify-center gap-2 md:gap-3">
                                <TabButton id="billing" label="Billing" activeTab={activeTab} setActiveTab={setActiveTab} />
                                <TabButton id="inventory" label="Inventory" activeTab={activeTab} setActiveTab={setActiveTab} />
                                <TabButton id="reports" label="Sales Reports" activeTab={activeTab} setActiveTab={setActiveTab} />
                                <TabButton id="generator" label="Manual Label" activeTab={activeTab} setActiveTab={setActiveTab} />
                                <TabButton id="scanner" label="Scanner" activeTab={activeTab} setActiveTab={setActiveTab} />
                                <TabButton id="settings" label="Settings" activeTab={activeTab} setActiveTab={setActiveTab} />
                            </div>
                        </div>
                    </nav>

                    <main className="flex-grow p-4 md:p-8 max-w-[1400px] mx-auto w-full flex flex-col lg:flex-row gap-8">
                        
                        {/* -------------------- TAB: BILLING -------------------- */}
                        {activeTab === 'billing' && (
                            <>
                                <div className="w-full lg:w-[55%] bg-white p-6 md:p-8 rounded-3xl shadow-xl shadow-slate-200/50 border border-slate-100 h-fit flex flex-col gap-8 no-print">
                                    <div className="flex justify-between items-center border-b border-slate-100 pb-4">
                                        <div>
                                            <h2 className="text-3xl font-extrabold bg-clip-text text-transparent bg-gradient-to-r from-indigo-700 to-purple-600">Billing</h2>
                                        </div>
                                    </div>

                                    {/* General Info */}
                                    <div className="grid grid-cols-1 md:grid-cols-3 gap-5">
                                        <ModernInput label="Invoice No." type="text" value={billInvoice} onChange={e=>setBillInvoice(e.target.value)} />
                                        <ModernInput label="Date" type="date" value={billDate} onChange={e=>setBillDate(e.target.value)} />
                                        <div>
                                            <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1.5 ml-1">Bill Type</label>
                                            <select value={billType} onChange={e=>setBillType(e.target.value)} className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-4 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none transition-all text-sm font-bold text-indigo-700 shadow-sm cursor-pointer">
                                                <option value="Non-GST">Non-GST</option>
                                                <option value="GST">GST Bill</option>
                                            </select>
                                        </div>
                                        <ModernInput label="Phone Number" type="text" value={billCustomerPhone} onChange={handlePhoneChange} placeholder="Enter Phone to Auto-Fill" className="md:col-span-1 border-indigo-200 focus:border-indigo-500 font-mono" />
                                        <ModernInput label="Customer Name" type="text" value={billCustomerName} onChange={e=>setBillCustomerName(e.target.value)} placeholder="Walk-in Customer" className="md:col-span-2" />
                                    </div>

                                    {/* Delivery Info */}
                                    <div className="bg-slate-50 rounded-2xl p-5 border border-slate-100 shadow-sm space-y-5">
                                        <div>
                                            <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1.5 ml-1">Delivery Type</label>
                                            <select value={billDelivery} onChange={e=>setBillDelivery(e.target.value)} className="w-full p-3.5 bg-white border border-slate-200 rounded-xl focus:ring-4 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none transition-all font-bold text-indigo-700 shadow-sm cursor-pointer">
                                                <option value="Store Walk-in">🛍️ Store Walk-in</option>
                                                <option value="Courier">🚚 Courier Delivery (Generates Label)</option>
                                            </select>
                                        </div>
                                        
                                        {/* Courier Extras */}
                                        {billDelivery === 'Courier' && (
                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-5 pt-2 border-t border-slate-200">
                                                <div>
                                                    <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1.5 ml-1">Select Courier</label>
                                                    <select value={billCourier} onChange={e=>setBillCourier(e.target.value)} className="w-full p-3 bg-white border border-slate-200 rounded-xl focus:ring-4 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none transition-all text-sm font-medium shadow-sm">
                                                        <option value="Professional Courier">Professional Courier</option>
                                                        <option value="ST Courier">ST Courier</option>
                                                        <option value="India Post">India Post</option>
                                                    </select>
                                                </div>
                                                <ModernInput label="Tracking ID" type="text" value={billTracking} onChange={e=>setBillTracking(e.target.value)} placeholder="Tracking No." />
                                                <div className="md:col-span-2">
                                                    <div className="flex justify-between items-end mb-1.5 ml-1">
                                                        <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider">Shipping Address (For Label)</label>
                                                        <button onClick={handleFormatAddress} disabled={isFormattingAddress} className="text-xs font-bold text-indigo-600 hover:text-indigo-800 transition-colors flex items-center gap-1 disabled:opacity-50">
                                                            {isFormattingAddress ? '✨ Formatting...' : '✨ Auto-Format'}
                                                        </button>
                                                    </div>
                                                    <textarea rows="3" value={billCustomerAddress} onChange={e=>setBillCustomerAddress(e.target.value)} placeholder="Full Delivery Address" className="w-full p-3 bg-white border border-slate-200 rounded-xl focus:ring-4 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none transition-all text-sm font-medium shadow-sm resize-none"></textarea>
                                                </div>
                                            </div>
                                        )}
                                    </div>

                                    {/* Particulars */}
                                    <div className="border border-slate-200 rounded-2xl overflow-hidden shadow-sm">
                                        <div className="bg-slate-50/80 px-5 py-4 border-b border-slate-200 flex justify-between items-center">
                                            <h3 className="font-bold text-slate-700 uppercase tracking-wider text-xs">Particulars</h3>
                                            <span className="text-xs font-semibold text-indigo-500 bg-indigo-50 px-2 py-1 rounded-md">{billItems.length} Item(s)</span>
                                        </div>
                                        <div className="p-5 space-y-3 bg-white">
                                            <datalist id="preset-items">
                                                {/* ✨ Mapped dynamically from Inventory instead of hardcoded */}
                                                {Object.keys(inventory).map(item => <option key={item} value={item} />)}
                                            </datalist>
                                            {billItems.map((item, index) => (
                                                <div key={item.id} className="flex gap-2 items-center group">
                                                    <div className="w-6 text-center text-xs font-bold text-slate-400">{index + 1}.</div>
                                                    <input list="preset-items" type="text" placeholder="Item Name / Product" value={item.particular} onChange={e=>updateBillItem(item.id, 'particular', e.target.value)} className="flex-grow p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm uppercase outline-none focus:ring-2 focus:ring-indigo-500/50 transition-all shadow-sm" />
                                                    
                                                    {/* ✨ HSN Input displays conditionally */}
                                                    {billType === 'GST' && (
                                                        <input type="text" placeholder="HSN" value={item.hsn || ''} onChange={e=>updateBillItem(item.id, 'hsn', e.target.value)} className="w-20 p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm outline-none focus:ring-2 focus:ring-indigo-500/50 transition-all shadow-sm text-center font-semibold text-slate-700" />
                                                    )}

                                                    <input type="number" min="1" value={item.qty} placeholder="Qty" onChange={e=>updateBillItem(item.id, 'qty', e.target.value)} className="w-16 p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm outline-none focus:ring-2 focus:ring-indigo-500/50 transition-all shadow-sm text-center font-semibold text-slate-700" />
                                                    <input type="number" min="0" value={item.rate} placeholder="Rate ₹" onChange={e=>updateBillItem(item.id, 'rate', e.target.value)} className="w-24 p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm outline-none focus:ring-2 focus:ring-indigo-500/50 transition-all shadow-sm text-right font-semibold text-slate-700" />
                                                    <button onClick={()=>removeBillItem(item.id)} className={`text-slate-400 hover:text-red-500 hover:bg-red-50 p-2.5 rounded-xl transition-all ${billItems.length === 1 ? 'invisible' : ''}`} title="Remove Row">
                                                        <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fillRule="evenodd" d="M9 2a1 1 0 00-.894.553L7.382 4H4a1 1 0 000 2v10a2 2 0 002 2h8a2 2 0 002-2V6a1 1 0 100-2h-3.382l-.724-1.447A1 1 0 0011 2H9zM7 8a1 1 0 012 0v6a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v6a1 1 0 102 0V8a1 1 0 00-1-1z" clipRule="evenodd" /></svg>
                                                    </button>
                                                </div>
                                            ))}
                                            <button onClick={addBillItem} className="mt-2 text-sm font-bold text-indigo-600 bg-indigo-50 hover:bg-indigo-100 hover:text-indigo-700 px-5 py-2.5 rounded-xl transition-all flex items-center gap-2 border border-indigo-100">
                                                <svg xmlns="http://www.w3.org/2000/svg" className="h-4 w-4" viewBox="0 0 20 20" fill="currentColor"><path fillRule="evenodd" d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z" clipRule="evenodd" /></svg>
                                                Add New Item
                                            </button>
                                        </div>
                                    </div>

                                    {/* Payments & Discounts */}
                                    <div className="grid grid-cols-2 md:grid-cols-4 gap-4 bg-white p-5 rounded-2xl border border-slate-200 shadow-inner">
                                        <ModernInput label="Discount (%)" type="number" min="0" max="100" value={billDiscount} onChange={e=>setBillDiscount(e.target.value)} className="bg-white" />
                                        <ModernInput label="Paid GPay (₹)" type="number" min="0" value={paidGpay} onChange={e=>setPaidGpay(e.target.value)} className="bg-white text-blue-700" />
                                        <ModernInput label="Paid Cash (₹)" type="number" min="0" value={paidCash} onChange={e=>setPaidCash(e.target.value)} className="bg-white text-emerald-700" />
                                        <div>
                                            <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1.5 ml-1">Next Promo</label>
                                            <select value={billPromoCode} onChange={e=>setBillPromoCode(e.target.value)} className="w-full p-3 bg-white border border-slate-200 rounded-xl focus:ring-4 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none transition-all text-sm font-bold text-indigo-600 shadow-sm cursor-pointer">
                                                <option value="NO CODE">None</option>
                                                <option value="FREESHIP">FREESHIP</option>
                                                <option value="GET350 SHIRT">GET350 SHIRT</option>
                                                <option value="10%DIS">10% OFF</option>
                                                <option value="5%DIS">5% OFF</option>
                                            </select>
                                        </div>
                                    </div>
                                    
                                    {/* Balance Highlights */}
                                    <div className="flex justify-between items-center p-5 bg-gradient-to-r from-slate-50 to-indigo-50/50 rounded-2xl border border-slate-200 shadow-sm">
                                        <div className="flex flex-col">
                                            <span className="text-slate-500 font-bold uppercase text-xs tracking-widest">Balance Remaining</span>
                                            <span className="text-sm font-medium text-slate-400">Total: ₹{grandTotal.toFixed(2)}</span>
                                        </div>
                                        <span className={`text-4xl font-black tracking-tight drop-shadow-sm ${balanceAmount > 0 ? "text-red-500" : balanceAmount < 0 ? "text-amber-500" : "text-emerald-500"}`}>
                                            ₹ {balanceAmount.toFixed(2)}
                                        </span>
                                    </div>

                                    {/* Action Buttons */}
                                    <div className="flex gap-4 mt-2">
                                        <button onClick={handlePrint} className="w-1/2 bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-700 hover:to-purple-700 text-white font-bold py-4 px-4 rounded-2xl shadow-xl shadow-indigo-200 transition-all transform hover:-translate-y-0.5 active:translate-y-0 active:shadow-md flex justify-center items-center gap-2 text-lg">
                                            <svg xmlns="http://www.w3.org/2000/svg" className="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}><path strokeLinecap="round" strokeLinejoin="round" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z" /></svg>
                                            Print Bill
                                        </button>
                                        <button onClick={handleNewBill} className="w-1/2 bg-slate-800 hover:bg-slate-900 text-white font-bold py-4 px-4 rounded-2xl shadow-xl transition-all transform hover:-translate-y-0.5 active:translate-y-0 active:shadow-md flex justify-center items-center gap-2 text-lg">
                                            <svg xmlns="http://www.w3.org/2000/svg" className="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}><path strokeLinecap="round" strokeLinejoin="round" d="M12 4v16m8-8H4" /></svg>
                                            New Bill
                                        </button>
                                    </div>
                                </div>

                                {/* PREVIEW PANEL */}
                                <div className="w-full lg:w-[45%] flex flex-col gap-8 items-center bg-slate-200/50 p-6 md:p-8 print:p-0 print:bg-white rounded-3xl border border-slate-200 shadow-inner overflow-y-auto h-fit print-section print:overflow-visible print:h-auto print:block print:border-none print:shadow-none">
                                    <div className="w-full text-center print:hidden mb-2">
                                        <span className="inline-block bg-slate-300 text-slate-600 font-bold text-[10px] uppercase tracking-widest px-4 py-1.5 rounded-full">Print Previews</span>
                                    </div>
                                    
                                    {/* Copy 1: Buyer's Bill */}
                                    <div className="a5-container relative print:scale-100 transform origin-top scale-[0.85] md:scale-95 transition-all hover:shadow-2xl">
                                        {renderBillContent("Original - Buyer's Copy")}
                                    </div>

                                    {/* Copy 2: Shop Bill (Hidden on screen to save space, visible on print) */}
                                    <div className="a5-container relative hidden print:flex">
                                        {renderBillContent("Duplicate - Shop Copy")}
                                    </div>

                                    {/* Copy 3: Shipping Label (Conditional based on Delivery Mode) */}
                                    {billDelivery === 'Courier' && (
                                        <div className="a5-container relative print:scale-100 transform origin-top scale-[0.85] md:scale-95 transition-all hover:shadow-2xl print:flex">
                                            <LabelContent 
                                                copyLabel="Shipping Label"
                                                orderId={billTracking || billInvoice} 
                                                toName={billCustomerName} 
                                                toAddress={billCustomerAddress} 
                                                toPhone={billCustomerPhone} 
                                                logoUrl={logoUrl}
                                            />
                                        </div>
                                    )}
                                </div>
                            </>
                        )}

                        {/* -------------------- TAB: INVENTORY ✨ -------------------- */}
                        {activeTab === 'inventory' && (
                            <div className="w-full max-w-5xl mx-auto bg-white p-8 rounded-3xl shadow-xl shadow-slate-200/50 border border-slate-100">
                                <div className="flex justify-between items-center border-b border-slate-100 pb-4 mb-6">
                                    <h2 className="text-3xl font-extrabold text-slate-800">Inventory Management</h2>
                                    <span className="bg-indigo-50 text-indigo-600 font-bold px-3 py-1 rounded-lg text-sm">{Object.keys(inventory).length} Items</span>
                                </div>
                                
                                <div className="bg-slate-50 p-6 rounded-2xl border border-slate-200 mb-8 flex flex-col md:flex-row gap-4 items-end">
                                    <div className="flex-1 w-full">
                                        <ModernInput label="Product Name" type="text" placeholder="e.g., BLACK T-SHIRT - M" value={newItemName} onChange={e=>setNewItemName(e.target.value)} className="uppercase" />
                                    </div>
                                    <div className="w-full md:w-32">
                                        <ModernInput label="HSN Code" type="text" placeholder="e.g., 6109" value={newItemHsn} onChange={e=>setNewItemHsn(e.target.value)} />
                                    </div>
                                    <div className="w-full md:w-32">
                                        <ModernInput label="Default Price (₹)" type="number" min="0" placeholder="e.g., 350" value={newItemPrice} onChange={e=>setNewItemPrice(e.target.value)} />
                                    </div>
                                    <button onClick={handleAddInventory} className="w-full md:w-auto bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3.5 px-6 rounded-xl shadow-lg shadow-indigo-200 transition-transform transform hover:-translate-y-0.5">

                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>

                        {activeTab === 'reports' && (

                                {/* Print Header for Reports */}
                                <div className="hidden print:block text-center mb-6 border-b-2 border-gray-800 pb-4">
                                    <h1 className="text-3xl font-extrabold tracking-wider text-gray-900 uppercase">LOOKSTYLO FASHION</h1>
                                    <h2 className="text-xl font-bold mt-2">Sales Report</h2>

                                    <div>
                                        <h2 className="text-3xl font-extrabold text-slate-800">Sales Reports</h2>

                                    </div>
                                    <div className="flex flex-wrap items-center gap-3">
                                        <div className="bg-slate-50 p-2 rounded-2xl border border-slate-200 shadow-sm flex items-center gap-3 flex-wrap">
                                            <select value={reportType} onChange={e=>setReportType(e.target.value)} className="p-2 bg-white border border-slate-200 rounded-lg outline-none focus:ring-2 focus:ring-indigo-500/50 font-bold text-slate-700 cursor-pointer">
                                                <option value="daily">Daily</option>
                                                <option value="monthly">Monthly</option>
                                                <option value="yearly">Yearly</option>
                                            </select>
                                            
                                            {reportType === 'daily' && (
                                                <input type="date" value={reportDate} onChange={e=>setReportDate(e.target.value)} className="p-2 bg-white border border-slate-200 rounded-lg outline-none focus:ring-2 focus:ring-indigo-500/50 font-bold text-indigo-700" />

                                            {reportType === 'monthly' && (
                                                <input type="month" value={reportMonth} onChange={e=>setReportMonth(e.target.value)} className="p-2 bg-white border border-slate-200 rounded-lg outline-none focus:ring-2 focus:ring-indigo-500/50 font-bold text-indigo-700" />
                                            )}
                                            {reportType === 'yearly' && (
                                                <select value={reportYear} onChange={e=>setReportYear(e.target.value)} className="p-2 bg-white border border-slate-200 rounded-lg outline-none focus:ring-2 focus:ring-indigo-500/50 font-bold text-indigo-700 cursor-pointer">

                                                        return <option key={y} value={y}>{y}</option>;
                                                    })}

                                            )}

                                                <option value="GST">GST Only</option>
                                                <option value="Non-GST">Non-GST Only</option>
                                            </select>
                                        </div>

                                        </button>

                                            <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}><path strokeLinecap="round" strokeLinejoin="round" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z" /></svg>
                                            Print Report
                                        </button>
                                    </div>
                                </div>

                                        <span className="text-xs font-bold text-indigo-500 uppercase tracking-wider mb-1">Total Sales</span>
                                        <span className="text-3xl font-black text-indigo-700">₹ {totalReportSales.toFixed(2)}</span>
                                    </div>

                                                <span className="text-3xl font-black text-purple-700">₹ {totalGSTSales.toFixed(2)}</span>

                                                <span className="text-3xl font-black text-slate-700">₹ {totalNonGSTSales.toFixed(2)}</span>
                                            </div>
                                        </>
                                    )}

                                    <div className="bg-emerald-50 p-5 rounded-2xl border border-emerald-100 flex flex-col justify-center">
                                        <span className="text-xs font-bold text-emerald-600 uppercase tracking-wider mb-1">Cash Received</span>
                                        <span className="text-3xl font-black text-emerald-700">₹ {totalReportCash.toFixed(2)}</span>
                                    </div>
                                    <div className="bg-blue-50 p-5 rounded-2xl border border-blue-100 flex flex-col justify-center">
                                        <span className="text-xs font-bold text-blue-600 uppercase tracking-wider mb-1">G-Pay Received</span>
                                        <span className="text-3xl font-black text-blue-700">₹ {totalReportGpay.toFixed(2)}</span>
                                    </div>
                                    <div className="bg-amber-50 p-5 rounded-2xl border border-amber-100 flex flex-col justify-center">
                                        <span className="text-xs font-bold text-amber-600 uppercase tracking-wider mb-1">Pending Balance</span>
                                        <span className="text-3xl font-black text-amber-700">₹ {totalReportBalance.toFixed(2)}</span>
                                    </div>
                                </div>

                                <div className="border border-slate-200 rounded-2xl overflow-hidden shadow-sm print:border-none print:shadow-none">

                                        <h3 className="font-bold text-slate-700 uppercase tracking-wider text-xs">Invoices Breakdown</h3>
                                        <span className="text-xs font-semibold text-indigo-500 bg-indigo-50 px-2 py-1 rounded-md print:hidden">{reportBills.length} Bill(s)</span>

                                    <div className="overflow-x-auto max-h-[500px] print:max-h-none print:overflow-visible">

                                                    <th className="p-4 font-bold">Invoice ID</th>

                                                    <th className="p-4 font-bold text-right">Total</th>
                                                    <th className="p-4 font-bold text-right">Cash</th>
                                                    <th className="p-4 font-bold text-right">G-Pay</th>
                                                    <th className="p-4 font-bold text-right">Balance</th>
                                                    <th className="p-4 font-bold text-center no-print">Action</th>

                                                            <td className="p-4 text-sm font-medium text-slate-600 print:text-black">{bill.customer}</td>

                                                            <td className="p-4 text-sm font-medium text-right text-emerald-600 print:text-black">₹ {bill.cash}</td>
                                                            <td className="p-4 text-sm font-medium text-right text-blue-600 print:text-black">₹ {bill.gpay}</td>
                                                            <td className="p-4 text-sm font-bold text-right text-amber-600 print:text-black">₹ {bill.balance}</td>

                                                                    {/* ✨ NEW: Load Full Bill for Editing */}

                                                                    </button>
                                                                    <button onClick={() => openPaymentModal(bill)} className="text-emerald-500 hover:text-emerald-700 hover:bg-emerald-50 p-1.5 rounded transition-colors" title="Update Payment Only">

                                                                    </button>
                                                                    <button onClick={() => deleteBill(bill.id)} className="text-red-500 hover:text-red-700 hover:bg-red-50 p-1.5 rounded transition-colors" title="Delete Bill">
                                                                        <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5 mx-auto" viewBox="0 0 20 20" fill="currentColor"><path fillRule="evenodd" d="M9 2a1 1 0 00-.894.553L7.382 4H4a1 1 0 000 2v10a2 2 0 002 2h8a2 2 0 002-2V6a1 1 0 100-2h-3.382l-.724-1.447A1 1 0 0011 2H9zM7 8a1 1 0 012 0v6a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v6a1 1 0 102 0V8a1 1 0 00-1-1z" clipRule="evenodd" /></svg>
                                                                    </button>
                                                                </div>
                                                            </td>
                                                        </tr>
                                                    ))
                                                )}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>

                                        <ModernInput label="Phone Number(s)" type="text" value={toPhone} onChange={(e) => setToPhone(e.target.value)} className="uppercase font-mono" />
                                        
                                        <div className="pt-4 grid grid-cols-1 md:grid-cols-2 gap-4">

                                    </div>

                                <div className="w-full lg:w-[60%] flex justify-center bg-slate-200/50 p-6 md:p-8 rounded-3xl border border-slate-200 shadow-inner print-section print:overflow-visible print:h-auto print:block print:p-0 print:bg-white print:border-none print:shadow-none">
                                    <div className="a5-container hover:shadow-2xl transition-shadow">
                                        <LabelContent orderId={orderId} toName={toName} toAddress={toAddress} toPhone={toPhone} logoUrl={logoUrl} />
                                    </div>
                                </div>
                            </>
                        )}

                        {/* -------------------- TAB: SCANNER -------------------- */}
                        {activeTab === 'scanner' && (
                            <div className="w-full max-w-5xl mx-auto flex flex-col gap-8">
                                {/* Scanner UI */}
                                <div className="bg-white p-8 rounded-3xl shadow-xl shadow-slate-200/50 border border-slate-100 flex flex-col items-center">
                                    <div className="w-16 h-16 bg-indigo-50 rounded-2xl flex items-center justify-center mb-6 shadow-inner">
                                        <span className="text-3xl">📷</span>
                                    </div>

                                    {!scanResult && (
                                        <div className="w-full max-w-md bg-slate-50 p-4 rounded-3xl border-2 border-dashed border-slate-300">
                                            <div id="reader" className="w-full rounded-2xl overflow-hidden min-h-[250px]"></div>
                                        </div>
                                    )}

                                    {scanResult && (
                                        <div className="w-full max-w-md mt-2 bg-emerald-50 p-6 rounded-2xl border border-emerald-200 shadow-sm animate-fade-in">
                                            <div className="flex items-center gap-3 mb-4">

                                                <h3 className="font-bold text-xl text-emerald-800">Scan Successful & Saved!</h3>
                                            </div>
                                            <div className="bg-white p-4 rounded-xl border border-emerald-100 space-y-3 mb-6 shadow-sm">
                                                <p className="text-sm"><span className="text-slate-500 font-medium uppercase text-xs tracking-wider block mb-0.5">Order ID</span> <strong className="text-lg font-mono text-slate-800">{scanResult.id}</strong></p>

                                            </div>
                                            <div className="flex flex-col md:flex-row gap-3">
                                                <button onClick={syncToGoogleSheets} className="flex-1 bg-gradient-to-r from-emerald-500 to-teal-500 hover:from-emerald-600 hover:to-teal-600 text-white font-bold py-3 px-4 rounded-xl shadow-lg shadow-emerald-200 transition-transform transform hover:-translate-y-0.5">💾 Sync to Sheets</button>

                                            </div>
                                            {syncStatus && <p className={`mt-4 text-center text-sm font-bold bg-white py-2 rounded-lg ${syncStatus.includes('Successfully') ? 'text-emerald-600 border border-emerald-100' : 'text-red-500 border border-red-100'}`}>{syncStatus}</p>}
                                        </div>
                                    )}
                                </div>

                                {/* Database UI */}
                                <div className="bg-white p-8 rounded-3xl shadow-xl shadow-slate-200/50 border border-slate-100">
                                    <div className="flex justify-between items-center border-b border-slate-100 pb-4 mb-4">
                                        <h3 className="text-2xl font-extrabold text-slate-800">Scanned Database</h3>
                                        <button onClick={clearScanDatabase} className="text-xs font-bold text-red-500 bg-red-50 px-3 py-1.5 rounded-lg hover:bg-red-100 transition-colors">Clear History</button>
                                    </div>
                                    <div className="overflow-x-auto max-h-[400px]">
                                        <table className="w-full text-left border-collapse">
                                            <thead className="sticky top-0 bg-white shadow-sm">

                                                    <th className="p-4 font-bold">Order ID</th>
                                                    <th className="p-4 font-bold">Customer</th>
                                                    <th className="p-4 font-bold">Phone</th>
                                                    <th className="p-4 font-bold text-center">Action</th>

                                                                    <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5 mx-auto" viewBox="0 0 20 20" fill="currentColor"><path fillRule="evenodd" d="M9 2a1 1 0 00-.894.553L7.382 4H4a1 1 0 000 2v10a2 2 0 002 2h8a2 2 0 002-2V6a1 1 0 100-2h-3.382l-.724-1.447A1 1 0 0011 2H9zM7 8a1 1 0 012 0v6a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v6a1 1 0 102 0V8a1 1 0 00-1-1z" clipRule="evenodd" /></svg>
                                                                </button>
                                                            </td>
                                                        </tr>
                                                    ))
                                                )}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
